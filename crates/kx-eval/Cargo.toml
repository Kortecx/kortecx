[package]
name         = "kx-eval"
version      = "0.1.0"
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
authors      = { workspace = true }
repository   = { workspace = true }
description  = "kortecx RC1 (D172) agentic-evaluation harness — the measure-first yardstick. A thin, FFI-free leaf that scores a run's TRANSCRIPT (task success / tool-call correctness / RAG groundedness / loop efficiency) plus a cross-format tool-call parse matrix, and composes kx-profile's Gate/Spike report for the trend. Every scorer is a PURE, TOTAL function of a Transcript; a Gate verdict is an exact INTEGER per-mille comparison, never a float (SN-8). Off the journal + identity path + frozen trio: a measurement leaf, never a committed fact. The gating baseline is a COMMITTED corpus (corpus/golden-v1/baseline.json), not the gitignored docs/benchmarks (SN-2)."

[lib]
path = "src/lib.rs"

[dependencies]
# The ONE authority-gated tool-call parser (parse_tool_call / ToolCall / DecodeError).
# The format_coverage scorer runs it over raw per-format model strings to measure the
# current (T-GEMMA-PAREN) parse coverage — the "before" baseline RC2 raises.
kx-toolcall = { workspace = true }
# WarrantSpec + tool_grants — the fixed grant set the format_coverage scorer parses
# against (parse_tool_call resolves names against warrant.tool_grants, SN-8).
kx-warrant  = { workspace = true }
# ToolName / ToolVersion — the grant + expected-call identity vocabulary.
kx-mote     = { workspace = true }
serde       = { workspace = true }
# Corpus (golden suite + format cases + baseline) load/serialize. Validation only —
# values are never decoded to floats on the GATE decision path (per-mille integers).
serde_json  = { workspace = true }
# Content-address the versioned corpus (suite_digest) so a corpus change is visible
# in every report and forces a deliberate re-baseline — the kx-dataset discipline.
blake3      = { workspace = true }
thiserror   = { workspace = true }

[lints]
workspace = true
