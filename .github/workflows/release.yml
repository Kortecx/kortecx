name: Release

# Tag-triggered: publish SHA-256-verified prebuilt FFI-free `kx` binaries on a `v*`
# tag (the tag is cut from an already-green `main`). This is NOT a pull-request /
# branch check, so it adds NO branch-protection status context. `scripts/install.sh`
# downloads these assets.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build a release for"
        required: true

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  # ---------------------------------------------------------------------------
  # build — one FFI-free `kx` per target, on a NATIVE runner (no cross-compile):
  # linux-x86_64 (ubuntu), linux-aarch64 (ubuntu-arm), macos-arm64 (macos-14).
  # Asset names are the target triples, so adding a future target (e.g.
  # x86_64-pc-windows-msvc, x86_64-apple-darwin) is a localized matrix add — the
  # install-script detection already has the seams.
  # ---------------------------------------------------------------------------
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - name: Checkout (NO submodules — the prebuilt `kx` is FFI-free)
        uses: actions/checkout@v6

      - name: Toolchain (from rust-toolchain.toml)
        run: cargo --version

      # D139: the prebuilt binary ships the EMBEDDED WEB CONSOLE — the `console`
      # feature embeds `ui/dist` at compile time, so the SPA (and the TS SDK it
      # depends on) is built here first. Node is a RELEASE-RUNNER tool only;
      # plain `cargo build/install -p kx-cli` stays node-free (feature off).
      - name: Set up Node (console embed input)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build the TS SDK + the web console dist
        run: |
          npm --prefix bindings/typescript ci
          npm --prefix bindings/typescript run build
          npm --prefix ui ci
          npm --prefix ui run build

      # The FFI wall, asserted on the EXACT feature set this job ships: none of
      # `console` / `hnsw` / `serve-engine` / `hosted-apps` may ever drag the llama.cpp
      # FFI into the closure (serve-engine adds the FFI-FREE Ollama backend; the
      # in-process llama.cpp path stays the opt-in `inference` build — PR-A.1;
      # hosted-apps adds only tokio/process + tokio/io-util and zero crates). The
      # required `build-serve-engine` CI job re-proves this on a toolchain-free runner.
      - name: FFI wall (console,hnsw,serve-engine,hosted-apps stays llama.cpp-free)
        shell: bash
        run: |
          if cargo tree -p kx-cli --features console,hnsw,serve-engine,hosted-apps -e normal | grep -qE 'kx-llamacpp'; then
            echo "::error::the console/hnsw/serve-engine/hosted-apps features dragged the FFI into kx-cli"; exit 1
          fi

      # PR-A.1: the prebuilt now ships `serve-engine` (FFI-free), so a toolchain-free
      # `curl | install.sh` install AUTO-DETECTS a running Ollama daemon and serves
      # local models out of the box. llama.cpp stays the opt-in `--features inference`
      # build (needs a C++ toolchain).
      #
      # D213: `hosted-apps` ships too. Without it the four hosted RPCs answer
      # `unimplemented` on the released binary, so a user can create a hosted App in the
      # console and never start one. It is FFI-free by construction (see the wall above)
      # and adds no BUILD dependency — serving a hosted App needs Node/npm at RUN time.
      - name: Build kx (FFI-free; embedded console + datasets + Ollama serve + hosted Apps)
        run: cargo build --release -p kx-cli --features console,hnsw,serve-engine,hosted-apps

      - name: Package + checksum
        shell: bash
        run: |
          asset="kx-${{ matrix.target }}"
          cp target/release/kx "$asset"
          strip "$asset" || true
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
          cat "$asset.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kx-${{ matrix.target }}
          path: |
            kx-${{ matrix.target }}
            kx-${{ matrix.target }}.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # publish — gather the per-target binaries, assemble one `checksums.txt`, and
  # create (or update) the GitHub Release via the gh CLI (no third-party action).
  # ---------------------------------------------------------------------------
  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Assemble checksums.txt
        shell: bash
        run: |
          cd dist
          cat kx-*.sha256 > checksums.txt
          rm -f kx-*.sha256
          echo "=== release assets ==="; ls -la
          echo "=== checksums.txt ==="; cat checksums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --repo "${{ github.repository }}" --clobber
          else
            gh release create "$tag" dist/* \
              --repo "${{ github.repository }}" \
              --title "$tag" \
              --generate-notes
          fi
