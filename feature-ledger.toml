# feature-ledger.toml — the OSS-lane feature registry (Golden Rule 25).
#
# One source of truth for what is in-flight / merged on the OSS shared surface +
# the cross-lane SEAMS, so concurrent sessions can SEE state and INHERIT/EXTEND
# prior work instead of re-building or colliding. Read this BEFORE starting a
# feature; update the entry's `state` as it progresses; declare `inherits` so the
# dependency graph is explicit.
#
# This file carries only OSS-public + seam entries (no cloud internals). The cloud
# lane has its own ledger in the cloud repo; the PRIVATE master ledger
# (docs/feature-ledger.md, corpus) reconciles BOTH lanes.
#
# Fields:
#   id        stable kebab-case identifier
#   lane      "oss" (public shared surface) | "seam" (cloud→OSS push-the-seam)
#   state     "planned" | "in-progress" | "in-review" | "merged"
#   pr        OSS PR number, once opened
#   branch    working branch
#   covers    capabilities this feature provides (what a later feature can reuse)
#   inherits  feature ids this builds on
schema = 1

[[feature]]
id       = "oss-cloud-sync-infra"
lane     = "oss"
state    = "merged"
pr       = "262"
branch   = "feat/oss-cloud-sync-infra"
covers   = [
  "shared-paths.toml boundary manifest (shared/private_only/divergent)",
  "scripts/shared-paths.sh reader",
  "just port / cmp-shared / leak-check / shared-lane-status",
  "crates/kx-cli/tests/shared_boundary.rs guard",
  "scripts/lane-guard.sh no-cross-merge gate",
  "feature-ledger.toml registry",
]
inherits = []

[[feature]]
id       = "serve-engine-public-seam"
lane     = "seam"
state    = "planned"
covers   = [
  "pub trait ServeEngine",
  "EngineRegistration + ServeEngineFactory",
  "extra_engine_factories hook in build_serve_runtime / GatewayConfig",
]
inherits = ["oss-cloud-sync-infra"]
notes    = "Lets an external/cloud crate register a serve engine without editing OSS gateway per-engine. Digest-invariant; frozen trio untouched. The canonical cloud→OSS push-the-seam instance."

[[feature]]
id       = "connector-extension-sdk"
lane     = "seam"
state    = "merged"
pr       = "264"
branch   = "feat/seam-extension-sdk"
covers   = [
  "crates/kx-extension-sdk: FFI-free leaf crate (D167 E0)",
  "prelude: curated + api_surface-pinned re-export of the connector seams",
  "conformance: run_conformance + the 10-pt-gate subset (items 3/5/7/10)",
  "kx-connector-example reference connector ([[bin]]) — author template + positive control",
  "flow().with_mcp() / flow().withMcp() — connectors reachable from the chaining entry point",
  "kx.connections.{add,list,test,remove,discover} sub-client (Py + TS)",
  "just test-connector / test-connector-real / test-connector-live",
  "connector-conformance CI gate (pinned real external MCP, offline)",
  "gateway-admin feature: opt-in McpGatewayAdmin/ToolRegistryAdmin (host authoring)",
]
inherits = ["oss-cloud-sync-infra"]
notes    = "D167 E0 / D170 foundation seam #1. Curates the (already-pub, scattered) connector seams as a semver'd contract so parallel sidecars build against a stable surface. Digest 7d22d4bd invariant (leaf crate, re-exports + with_mcp add no journal facts); frozen trio untouched; no proto/journal change; additive-only."

[[feature]]
id       = "connector-live-toolcalling"
lane     = "oss"
state    = "in-progress"
branch   = "feat/connector-live-toolcalling"
covers   = [
  "T-CONNECTOR-AUTOGRANT-LIVE-DEADLETTER fix: ambiguity is a precise DecodeError::Ambiguous (candidate full-ids) → disambiguating A2 re-prompt, not a silent dead-letter",
  "kx-toolcall markerless-paren format slice (T-GEMMA-PAREN): NAME(kwargs) for dialed <server>/<remote> tools",
  "view-layer dead-letter reason synthesis (kx-gateway-core react.rs) — every dead-letter carries a reason",
  "CallMcpTool RPC: operator diagnostic live-fire of one dialed tool through the broker (SN-8 re-enforced; no journal fact)",
  "cross-surface: kx connections fire | kx.connections.fire (Py) | connections.fire (TS) | UI ConnectionsPanel live-fire",
]
inherits = ["connector-extension-sdk"]
notes    = "Makes a runtime-dialed external connector actually FIRE in the live react-auto loop (was a turn-0 dead-letter), plus a model-free CallMcpTool diagnostic. Digest 7d22d4bd invariant (react turns edge-free; advisory reason bytes off-digest); frozen trio untouched; additive-only proto + codegen-fresh."
