name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

# ============================================================================
# The CI gate is SPLIT into parallel jobs so a single failure isolates the
# affected gate cleanly and developers don't wait for unrelated checks.
#
#   fmt         — cargo fmt --all -- --check
#   clippy      — cargo clippy --workspace --all-targets -- -D warnings
#   test        — cargo test --workspace
#   deny        — cargo deny check (advisories + licenses + bans + sources)
#   doc         — RUSTDOCFLAGS=-D warnings cargo doc --workspace --no-deps
#   ffi-link    — explicit C++ FFI link path; CACHE OMITS target/ so a
#                 broken native link cannot hide behind a cache hit. This is
#                 the load-bearing gate against "a green Rust build masks a
#                 broken native build" (see Item 6 of the baseline-config
#                 sweep). The kx-llamacpp-sys build script runs CMake every
#                 invocation here.
#   reproducible — workspace-wide byte-determinism check (I1.c).
#
# `smoke-test-with-model` depends on `test` + `ffi-link` (the FFI must build
# before the E2E inference smoke test can run).
# ============================================================================

jobs:
  # ---------------------------------------------------------------------------
  # fmt — cheap, no compilation needed; runs first and fastest.
  # ---------------------------------------------------------------------------
  fmt:
    name: fmt-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # No submodules — fmt-check doesn't need llama.cpp.

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # frozen-trio — the thesis-test guard. The single-node execution kernel
  # (kx-scheduler / kx-executor / kx-inference) is the stable spine: layers added
  # ON TOP (distribution, gateway/AL1, SDKs, Docker) must NOT reach down and edit
  # it. This job FAILS a PR whose diff touches the trio's `src/`. Touching the
  # kernel is a deliberate, signed-off act of kernel evolution (e.g. a dedicated
  # inference PR for continuous batching / GBNF) — such a PR updates THIS guard in
  # the same change. Cheap (no toolchain); pull_request-only (needs a base to diff).
  # ---------------------------------------------------------------------------
  frozen-trio:
    name: frozen-trio (kernel src unchanged)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the base diff)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Assert kx-inference / kx-executor / kx-scheduler src is unchanged
        run: |
          set -euo pipefail
          BASE="${{ github.base_ref }}"
          git fetch --no-tags origin "$BASE"
          CHANGED="$(git diff --name-only "origin/$BASE...HEAD" -- \
            crates/kx-inference/src crates/kx-executor/src crates/kx-scheduler/src)"
          if [ -n "$CHANGED" ]; then
            echo "::error::Frozen-trio source changed (thesis test). The kernel" \
                 "(kx-inference/kx-executor/kx-scheduler) must not be edited by a" \
                 "layer-on-top PR. If this is deliberate kernel evolution, update" \
                 "this guard in the same PR."
            echo "Changed files:"; echo "$CHANGED"
            exit 1
          fi
          echo "frozen trio unchanged ✓"

  # ---------------------------------------------------------------------------
  # clippy — needs the full build graph (build scripts + bindgen output).
  # ---------------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-clippy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            cargo-clippy-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # test — full workspace test pass.
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            cargo-test-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: cargo test --workspace
        run: cargo test --workspace -- --nocapture

  # ---------------------------------------------------------------------------
  # deny — RustSec advisories + license allowlist + bans + sources.
  # No native build needed; deny works off Cargo.lock alone.
  # ---------------------------------------------------------------------------
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # No submodules — cargo deny works off Cargo.lock + deny.toml.

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install cargo-deny (precompiled binary)
        # Use the precompiled binary action for fast install (~5s) vs.
        # `cargo install` (~1min). Pinning the action to a major version is
        # the conventional GitHub Actions discipline.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny check
        run: cargo deny check

  # ---------------------------------------------------------------------------
  # doc — workspace-wide rustdoc with -D warnings (catches broken intra-doc
  # links + missing docs at the workspace policy level).
  # ---------------------------------------------------------------------------
  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-doc-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            cargo-doc-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: cargo doc --workspace --no-deps
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  # ---------------------------------------------------------------------------
  # ffi-link — the LOAD-BEARING C++ FFI link gate.
  #
  # Why a separate job: a green `cargo build --workspace` can mask a broken
  # native link if the target/ cache hits and the kx-llamacpp-sys build
  # script never re-runs CMake. This job DEFEATS that masking by:
  #
  #   - Caching ONLY ~/.cargo/registry (download cache). target/ is NOT
  #     cached, so kx-llamacpp-sys's build.rs runs CMake against the
  #     vendored llama.cpp submodule on every CI run.
  #   - Building `kx-llamacpp-sys` (the FFI bindings + cmake build) and
  #     `kx-llamacpp` (the safe wrapper that LINKS against the static
  #     archives) explicitly, in --release for production link semantics.
  #   - Printing static-archive sizes at the end so a regression in
  #     CMake build flags (e.g., a feature flag flip that removes Metal
  #     support) surfaces visibly in the job log.
  #
  # C++ dep strategy (settled): git submodule at crates/kx-llamacpp-sys/llama.cpp,
  # pinned via SHA in the workspace tree. See `crates/kx-llamacpp-sys/PIN.md` for
  # the upgrade-audit ritual. The build.rs pin echo (`cargo:warning=...`)
  # surfaces the pinned SHA in this job's log.
  # ---------------------------------------------------------------------------
  ffi-link:
    name: C++ FFI link (kx-llamacpp-sys → kx-llamacpp)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      # CRITICAL: do NOT cache target/. Caching the bindgen output + static
      # archives would hide a broken native build. We still cache the
      # registry (download cache) — those are deterministic.
      - name: Cache Cargo download registry only (NOT target/)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ffi-link-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-ffi-link-registry-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: Build kx-llamacpp-sys (runs CMake on the submodule)
        run: cargo build -p kx-llamacpp-sys --release

      - name: Build kx-llamacpp (links against the static archives)
        run: cargo build -p kx-llamacpp --release

      - name: Print produced static archive sizes (regression signal)
        run: |
          set -euo pipefail
          echo "Static archives produced by the CMake build:"
          find target/release/build -name "libllama*.a" -o -name "libggml*.a" \
            | sort | xargs -I {} sh -c 'printf "%10s  %s\n" "$(stat -c%s "{}")" "{}"'

  # ---------------------------------------------------------------------------
  # build-no-inference — the OSS Adoption & Trust install gate (Step 1.1).
  #
  # Proves `cargo install kx-runtime` needs NO C++ toolchain: this job
  # deliberately checks out WITHOUT submodules and installs NO native build
  # deps (no libclang/clang/cmake). If the runtime's dependency closure ever
  # pulls the llama.cpp FFI back in, the build fails here (CMake/submodule
  # absent) — and the explicit `cargo tree` assertion fails first with a clear
  # message. Also builds kx-inference --no-default-features (the
  # bring-your-own-`InferenceBackend` path) to keep the feature-off gate honest.
  # ---------------------------------------------------------------------------
  build-no-inference:
    name: build-no-inference (kx-runtime installs without a C++ toolchain)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the FFI must not be needed)
        uses: actions/checkout@v6
        # Deliberately NO submodules and NO C++ toolchain install below.

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-noinfer-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-noinfer-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: Install just
        uses: extractions/setup-just@v4

      - name: just build-no-inference
        run: just build-no-inference

  # ---------------------------------------------------------------------------
  # verify-quickstart — docs-as-test gate (R7). Runs `just verify-quickstart`,
  # which builds the FFI-free `kx` binary and drives the README quickstart
  # (run → crash → replay → digest), asserting the canonical projection digest at
  # every step. Keeps the docs from silently drifting from the CLI. Deliberately
  # FFI-free (NO submodules, NO C++ toolchain), mirroring build-no-inference, so a
  # regression that leaked the FFI into kx-cli would also fail here. NON-REQUIRED:
  # this is a new context, not in branch protection — promote it to required once
  # it is green across a few runs (a separate, authorized branch-protection change).
  # ---------------------------------------------------------------------------
  verify-quickstart:
    name: verify-quickstart (docs-as-test; FFI-free)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the quickstart path is FFI-free)
        uses: actions/checkout@v6
        # Deliberately NO submodules and NO C++ toolchain install below.

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          cargo --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-quickstart-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-quickstart-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: Install just
        uses: extractions/setup-just@v4

      - name: just verify-quickstart
        run: just verify-quickstart

  # ---------------------------------------------------------------------------
  # docker-smoke — in-container docs-as-test (the Docker track, Scope A). Builds the
  # FFI-free `kx` image and reproduces the canonical projection digest THROUGH the
  # container: a clean run, a crash-then-replay over a PERSISTED volume, and a
  # read-only rootfs. This proves exactly-once durability survives the container
  # boundary — a measured green/red claim, not a "runs in Docker" badge.
  # FFI-free (NO submodules, NO C++ toolchain — the image needs neither).
  # NON-REQUIRED: a new context, not in branch protection — promote to required once
  # green across a few runs (a separate, authorized change). Mirrors verify-quickstart.
  # ---------------------------------------------------------------------------
  docker-smoke:
    name: docker-smoke (in-container digest reproduction; FFI-free)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the FFI-free image needs none)
        uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v4

      # ubuntu-latest ships Docker + BuildKit. The script builds the image and drives
      # run → crash → replay → digest in-container, asserting the canonical digest.
      - name: just docker-smoke
        run: just docker-smoke
  # `kx` (serve + client), checks the vendored protobuf stubs are still fresh
  # against the FROZEN proto (codegen-fresh), then runs ruff + mypy + the unit and
  # contract-e2e suites (which spin up a real `kx serve` and compare the SDK's
  # results to the `kx` CLI, byte-for-byte). Pure client + packaging — NO submodules,
  # NO C++ toolchain. NON-REQUIRED: a new context, not in branch protection (promote
  # to required once green, via a separate authorized change). Mirrors verify-quickstart.
  # ---------------------------------------------------------------------------
  sdk-python:
    name: sdk-python (gRPC client SDK — contract tests + codegen-fresh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the SDK is pure gRPC, FFI-free)
        uses: actions/checkout@v6

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: cargo --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-sdkpy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-sdkpy-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Build the FFI-free kx (serve + client) for the contract tests
        run: cargo build -p kx-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the SDK (dev extras — pinned grpcio-tools)
        working-directory: bindings/python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: codegen-fresh (vendored stubs match the frozen proto)
        working-directory: bindings/python
        run: |
          ./codegen.sh
          if ! git diff --quiet -- src/kortecx/v1; then
            echo "::error::generated stubs drifted from the proto — run bindings/python/codegen.sh and commit"
            git --no-pager diff -- src/kortecx/v1
            exit 1
          fi

      - name: Lint + type-check (ruff + mypy)
        working-directory: bindings/python
        run: |
          ruff check .
          ruff format --check src tests examples
          mypy src

      - name: Tests (unit + contract e2e against a real `kx serve`)
        working-directory: bindings/python
        env:
          KX_BIN: ${{ github.workspace }}/target/debug/kx
        run: pytest -q

  # ---------------------------------------------------------------------------
  # sdk-typescript — the TypeScript/JS gRPC client SDK (bindings/typescript).
  # Builds the FFI-free `kx`, checks the vendored Connect/protobuf stubs are still
  # fresh against the FROZEN proto (codegen-fresh), then runs biome + tsc + the
  # unit and contract-e2e suites (which spin up a real `kx serve` and reproduce the
  # `kx` CLI output byte-for-byte). Pure gRPC client — NO submodules, NO C++, NO
  # napi. NON-REQUIRED: a new context, not in branch protection (promote once
  # green via a separate authorized change). Mirrors sdk-python.
  # ---------------------------------------------------------------------------
  sdk-typescript:
    name: sdk-typescript (gRPC client SDK — contract tests + codegen-fresh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the SDK is pure gRPC, FFI-free)
        uses: actions/checkout@v6

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: cargo --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-sdkts-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-sdkts-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Build the FFI-free kx (serve + client) for the contract tests
        run: cargo build -p kx-cli

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install the SDK (clean, from the committed lockfile)
        working-directory: bindings/typescript
        run: npm ci

      - name: codegen-fresh (vendored stubs match the frozen proto)
        working-directory: bindings/typescript
        run: |
          ./codegen.sh
          if ! git diff --quiet -- src/gen; then
            echo "::error::generated TS stubs drifted from the proto — run bindings/typescript/codegen.sh and commit"
            git --no-pager diff -- src/gen
            exit 1
          fi

      - name: Lint + format + type-check (biome + tsc)
        working-directory: bindings/typescript
        run: |
          npx biome ci .
          npx tsc --noEmit

      - name: Tests (unit + contract e2e against a real `kx serve`)
        working-directory: bindings/typescript
        env:
          KX_BIN: ${{ github.workspace }}/target/debug/kx
        run: npx vitest run

  # ---------------------------------------------------------------------------
  # reproducible — byte-determinism check (I1.c). Runs `just check-reproducible`
  # which performs two clean release builds and diffs the output. Expensive
  # (~6+ minutes) but the load-bearing reproducibility gate.
  # ---------------------------------------------------------------------------
  reproducible:
    name: byte-determinism (I1.c)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      # No target/ cache — the reproducibility check ALREADY does `cargo clean`
      # between its two builds; caching would be wasted.
      - name: Cache Cargo download registry only
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-reproducible-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-reproducible-registry-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: just check-reproducible
        run: just check-reproducible

  # ---------------------------------------------------------------------------
  # smoke-test-with-model — full E2E inference smoke. Needs both the test
  # suite green AND the FFI link verified, since this exercises the full
  # `load model → tokenize → decode → sample → detokenize` chain.
  # ---------------------------------------------------------------------------
  smoke-test-with-model:
    name: smoke-test-with-model (kx-llamacpp E2E inference)
    runs-on: ubuntu-latest
    needs: [test, ffi-link]
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-smoke-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            cargo-smoke-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: just smoke-test-with-model
        run: just smoke-test-with-model

  # NOTE (PR-2): the IMAGE pipeline is intentionally NOT a CI job. A 2 B VLM
  # (~1.6 GB download + a CPU inference run, twice for the determinism check)
  # would add 20-40 min + network flakiness for marginal unique value: `ffi-link`
  # already proves `mtmd` LINKS on Linux, `build-no-inference` proves the
  # feature-gating, and the no-model tests in `cargo test --workspace` (the sniff,
  # the fail-closed dispatch gates, the assembler exclusion, the harness
  # `Multimodal` routing) prove the logic. Real-VLM image→text is validated
  # LOCALLY/manually via `just smoke-test-multimodal` (a release / FFI-touch
  # gate), the same place the heavy validation belongs — see the recipe in the
  # justfile. (The text smoke stays in CI because stories260K is ~1.2 MB.)

  # ---------------------------------------------------------------------------
  # scale-smoke — M2.1 + M2.2 + M2.x-E / D92 resume-availability gate. Folds a
  # 25k+ Mote journal in RELEASE and asserts the incremental children-index re-fold
  # stays ~linear (M2.1) AND that resume-from-FoldCheckpoint reproduces the full
  # fold exactly with cost bounded by live-state under churn (M2.2) AND that offline
  # schema migration (migrate_to, IMP-2/M2.x-E) stays O(entries) so resume-after-
  # upgrade is not an outage. A super-linear resume is an outage. Promoted to a
  # required status check via an explicitly-authorized branch-protection PATCH once
  # green on a couple of runs (Golden Rule 4). Needs the test suite green first.
  # ---------------------------------------------------------------------------
  # NOTE: the job `name:` below is the **required status-check context** in
  # branch protection — do NOT rename it (a rename orphans the required check
  # and blocks merges). M2.2 / M2.x-E extend the recipe body, not the context name.
  scale-smoke:
    name: scale-smoke (M2.1 incremental children-index re-fold)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-scale-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-scale-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: just scale-smoke
        run: just scale-smoke
