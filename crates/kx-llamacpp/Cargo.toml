[package]
name         = "kx-llamacpp"
version      = "0.1.1"
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
authors      = { workspace = true }
repository   = { workspace = true }
description  = "Safe Rust wrapper over kx-llamacpp-sys. Contains all unsafe behind a safe public API."
build        = "build.rs"

[lib]
path = "src/lib.rs"

[features]
# Default: no model is downloaded; only API-shape unit tests run.
default = []

# Enable to make `build.rs` download the stories260K GGUF and the
# `tests/smoke.rs` integration test exercise the full inference pipeline
# (load → tokenize → decode → sample → detokenize). Used in CI's
# `smoke-test-with-model` job. Local devs can opt in with
# `cargo test -p kx-llamacpp --features model-smoke-test`.
model-smoke-test = []

# Enable to make `build.rs` download a small VLM (Qwen2-VL-2B-Instruct GGUF +
# its mmproj projector, ~1.6 GB) and run `tests/smoke_multimodal.rs` — the full
# IMAGE pipeline (load → mtmd projector → decode bitmap → tokenize → mtmd
# prefill → generate). A LOCAL / manual gate (run via `just smoke-test-multimodal`
# before a release or when touching the FFI) — deliberately NOT a CI job: a 2B
# VLM (multi-GB download + a CPU inference run, twice for determinism) is far too
# heavy for the runner, and `ffi-link` + the no-model tests already cover the
# Linux link + the dispatch/sniff/routing logic. NEVER part of default `just ci`.
model-smoke-test-multimodal = []

[dependencies]
kx-llamacpp-sys = { workspace = true }
thiserror       = { workspace = true }
tracing         = { workspace = true }

[build-dependencies]
ureq = { workspace = true }
sha2 = { workspace = true }

[dev-dependencies]
tempfile           = { workspace = true }
tracing-subscriber = { workspace = true }
proptest           = { workspace = true }

[lints]
workspace = true
