name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

# ============================================================================
# The CI gate is SPLIT into parallel jobs so a single failure isolates the
# affected gate cleanly and developers don't wait for unrelated checks.
#
#   fmt         — cargo fmt --all -- --check
#   clippy      — cargo clippy --workspace --all-targets -- -D warnings
#   test        — cargo test --workspace
#   deny        — cargo deny check (advisories + licenses + bans + sources)
#   doc         — RUSTDOCFLAGS=-D warnings cargo doc --workspace --no-deps
#   ffi-link    — explicit C++ FFI link path; CACHE OMITS target/ so a
#                 broken native link cannot hide behind a cache hit. This is
#                 the load-bearing gate against "a green Rust build masks a
#                 broken native build" (see Item 6 of the baseline-config
#                 sweep). The kx-llamacpp-sys build script runs CMake every
#                 invocation here.
#   reproducible — workspace-wide byte-determinism check (I1.c).
#
# `smoke-test-with-model` depends on `test` + `ffi-link` (the FFI must build
# before the E2E inference smoke test can run).
# ============================================================================

jobs:
  # ---------------------------------------------------------------------------
  # fmt — cheap, no compilation needed; runs first and fastest.
  # ---------------------------------------------------------------------------
  fmt:
    name: fmt-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # No submodules — fmt-check doesn't need llama.cpp.

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # frozen-trio — the thesis-test guard. The single-node EXECUTION kernel
  # (kx-scheduler / kx-executor) is the stable spine: layers added ON TOP
  # (distribution, gateway/AL1, SDKs, Docker) — and even a dedicated capability
  # PR — must NOT reach down and edit it. kx-inference's dispatch CONTROL FLOW
  # (`dispatcher.rs` — the D35 routing, byte-stable since D50) is frozen for the
  # same reason. The ONE sanctioned exception (D108.2) is kx-inference's
  # CAPABILITY seams — the backend traits, the llama.cpp backend impl + model
  # cache, and additive input/output types: a dedicated inference PR MAY evolve
  # them (multimodal, embedding, future GBNF / continuous batching). Such a PR is
  # a deliberate, signed-off act of kernel evolution; the unchanged-EXECUTION-
  # behaviour invariant is then enforced by the a0_guard canonical-digest test
  # (`7d22d4bd…`), not a blanket kx-inference/src freeze. This job FAILS a PR whose
  # diff touches the execution kernel or the dispatch control flow. Cheap (no
  # toolchain); pull_request-only (needs a base to diff).
  # ---------------------------------------------------------------------------
  frozen-trio:
    name: frozen-trio (kernel src unchanged)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the base diff)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Assert kx-executor / kx-scheduler src + kx-inference dispatch control-flow are unchanged
        run: |
          set -euo pipefail
          BASE="${{ github.base_ref }}"
          git fetch --no-tags origin "$BASE"
          CHANGED="$(git diff --name-only "origin/$BASE...HEAD" -- \
            crates/kx-executor/src crates/kx-scheduler/src \
            crates/kx-inference/src/dispatcher.rs)"
          if [ -n "$CHANGED" ]; then
            echo "::error::Frozen kernel source changed (thesis test). The execution" \
                 "kernel (kx-executor/kx-scheduler) and the kx-inference dispatch" \
                 "control flow (dispatcher.rs) must not be edited by a layer-on-top" \
                 "or capability PR. A sanctioned kx-inference CAPABILITY change" \
                 "(D108.2) must stay OUT of dispatcher.rs and keep the a0_guard" \
                 "digest invariant; if this is deliberate kernel evolution, update" \
                 "this guard in the same PR."
            echo "Changed files:"; echo "$CHANGED"
            exit 1
          fi
          echo "frozen execution kernel + dispatch control-flow unchanged ✓"

  # ---------------------------------------------------------------------------
  # clippy — needs the full build graph (build scripts + bindgen output).
  # ---------------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-clippy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            cargo-clippy-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      # The installed-binary feature matrix (the v0.1.0 campaign guard): the
      # Tier-2 `cargo install -p kx-cli --features inference,hnsw` and the
      # FFI-free `--features hnsw` must both stay buildable. Lives in this job
      # because the inference check runs the llama.cpp build script (needs the
      # submodule + cmake this job already has).
      - name: feature matrix guard (kx-cli hnsw / inference,hnsw)
        run: |
          if cargo tree -p kx-cli --features hnsw -e normal | grep -qE 'kx-llamacpp'; then
            echo "::error::the hnsw feature dragged the FFI into kx-cli"; exit 1
          fi
          cargo check -p kx-cli --features hnsw
          cargo check -p kx-cli --features inference,hnsw
          # The gateway-only / external-coordinator config (SN-6): `kx-gateway`
          # --no-default-features (embedded-worker OFF ⇒ kx-coordinator unlinked)
          # must stay buildable, so a feature-independent path never references a
          # feature-gated import. Mirrors `just features-guard` (local) — keeping
          # this in CI prevents the local/CI divergence that let an ungated
          # kx_coordinator reference merge red on this config.
          cargo check -p kx-gateway --no-default-features

  # ---------------------------------------------------------------------------
  # test — full workspace test pass.
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      # The full-workspace debug target (incl. the llama.cpp FFI build) plus
      # the restored cargo-test cache (~4 GiB compressed, 3-5x extracted) no
      # longer fit in a standard runner's ~14 GB free disk — the job died with
      # "No space left on device" at cache restore. Drop the preinstalled
      # bundles this job never uses (~25-30 GB reclaimed in under a minute).
      - name: Free runner disk space (the test target + cache need the headroom)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force > /dev/null 2>&1 || true
          df -h /

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            cargo-test-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: cargo test --workspace
        run: cargo test --workspace -- --nocapture

  # ---------------------------------------------------------------------------
  # deny — RustSec advisories + license allowlist + bans + sources.
  # No native build needed; deny works off Cargo.lock alone.
  # ---------------------------------------------------------------------------
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # No submodules — cargo deny works off Cargo.lock + deny.toml.

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install cargo-deny (precompiled binary)
        # Use the precompiled binary action for fast install (~5s) vs.
        # `cargo install` (~1min). Pinning the action to a major version is
        # the conventional GitHub Actions discipline.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny check
        run: cargo deny check

  # ---------------------------------------------------------------------------
  # eval — the measure-first quality GATE (RC1+, D172). Scores the embedded
  # golden-v1 corpus (scripted transcripts: task success / tool-call F1 /
  # groundedness / retrieval quality / loop efficiency) and fails CLOSED on any
  # regression vs the COMMITTED baseline or on corpus drift. FFI-free + flake-proof
  # (no model / network / clock), so the GitHub gate matches `just ci` — GR23: no
  # local-vs-CI gap on the eval ratchet every later RC PR must hold.
  # ---------------------------------------------------------------------------
  eval:
    name: eval (golden-v1 regression gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # No submodules — kx-eval is FFI-free (no llama.cpp).

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show active-toolchain

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-eval-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-eval-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: cargo run -p kx-eval -- run
        run: cargo run -q -p kx-eval -- run

  # ---------------------------------------------------------------------------
  # doc — workspace-wide rustdoc with -D warnings (catches broken intra-doc
  # links + missing docs at the workspace policy level).
  # ---------------------------------------------------------------------------
  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-doc-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            cargo-doc-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: cargo doc --workspace --no-deps
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  # ---------------------------------------------------------------------------
  # ffi-link — the LOAD-BEARING C++ FFI link gate.
  #
  # Why a separate job: a green `cargo build --workspace` can mask a broken
  # native link if the target/ cache hits and the kx-llamacpp-sys build
  # script never re-runs CMake. This job DEFEATS that masking by:
  #
  #   - Caching ONLY ~/.cargo/registry (download cache). target/ is NOT
  #     cached, so kx-llamacpp-sys's build.rs runs CMake against the
  #     vendored llama.cpp submodule on every CI run.
  #   - Building `kx-llamacpp-sys` (the FFI bindings + cmake build) and
  #     `kx-llamacpp` (the safe wrapper that LINKS against the static
  #     archives) explicitly, in --release for production link semantics.
  #   - Printing static-archive sizes at the end so a regression in
  #     CMake build flags (e.g., a feature flag flip that removes Metal
  #     support) surfaces visibly in the job log.
  #
  # C++ dep strategy (settled): git submodule at crates/kx-llamacpp-sys/llama.cpp,
  # pinned via SHA in the workspace tree. See `crates/kx-llamacpp-sys/PIN.md` for
  # the upgrade-audit ritual. The build.rs pin echo (`cargo:warning=...`)
  # surfaces the pinned SHA in this job's log.
  # ---------------------------------------------------------------------------
  ffi-link:
    name: C++ FFI link (kx-llamacpp-sys → kx-llamacpp)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      # CRITICAL: do NOT cache target/. Caching the bindgen output + static
      # archives would hide a broken native build. We still cache the
      # registry (download cache) — those are deterministic.
      - name: Cache Cargo download registry only (NOT target/)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ffi-link-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-ffi-link-registry-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: Build kx-llamacpp-sys (runs CMake on the submodule)
        run: cargo build -p kx-llamacpp-sys --release

      - name: Build kx-llamacpp (links against the static archives)
        run: cargo build -p kx-llamacpp --release

      - name: Print produced static archive sizes (regression signal)
        run: |
          set -euo pipefail
          echo "Static archives produced by the CMake build:"
          find target/release/build -name "libllama*.a" -o -name "libggml*.a" \
            | sort | xargs -I {} sh -c 'printf "%10s  %s\n" "$(stat -c%s "{}")" "{}"'

  # ---------------------------------------------------------------------------
  # build-no-inference — the OSS Adoption & Trust install gate (Step 1.1).
  #
  # Proves `cargo install kx-runtime` needs NO C++ toolchain: this job
  # deliberately checks out WITHOUT submodules and installs NO native build
  # deps (no libclang/clang/cmake). If the runtime's dependency closure ever
  # pulls the llama.cpp FFI back in, the build fails here (CMake/submodule
  # absent) — and the explicit `cargo tree` assertion fails first with a clear
  # message. Also builds kx-inference --no-default-features (the
  # bring-your-own-`InferenceBackend` path) to keep the feature-off gate honest.
  # ---------------------------------------------------------------------------
  build-no-inference:
    name: build-no-inference (kx-runtime installs without a C++ toolchain)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the FFI must not be needed)
        uses: actions/checkout@v6
        # Deliberately NO submodules and NO C++ toolchain install below.

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-noinfer-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-noinfer-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: Install just
        uses: extractions/setup-just@v4

      - name: just build-no-inference
        run: just build-no-inference

  # ---------------------------------------------------------------------------
  # build-serve-engine — the PR-A.1 dual-engine adoption gate (GR24).
  #
  # Proves the prebuilt release feature set (`console,hnsw,serve-engine`) is
  # GENUINELY FFI-free: this job deliberately checks out WITHOUT submodules and
  # installs NO native build deps (no libclang/clang/cmake), then asserts via
  # `cargo tree` that `console,hnsw,serve-engine` pulls no `kx-llamacpp`, and
  # compiles the serve loop (`--features serve-engine,hnsw`) toolchain-free. So a
  # `curl | install.sh` user serves local models via Ollama with zero toolchain,
  # while llama.cpp stays the opt-in `inference` build. The non-required
  # serve-engine step in `inference-checks` runs WITH the toolchain; this is the
  # clean-room FFI-FREE complement.
  #
  # REQUIRED: promote it to a branch-protection check once green across a few runs
  # (a separate, explicitly-authorized branch-protection change), mirroring
  # build-no-inference / ui / sdk-* / scale-smoke.
  # ---------------------------------------------------------------------------
  build-serve-engine:
    name: build-serve-engine (kx serves via Ollama without a C++ toolchain)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — serve-engine must stay FFI-free)
        uses: actions/checkout@v6
        # Deliberately NO submodules and NO C++ toolchain install below.

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-serveengine-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-serveengine-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: Install just
        uses: extractions/setup-just@v4

      - name: just build-serve-engine
        run: just build-serve-engine

  # ---------------------------------------------------------------------------
  # verify-quickstart — docs-as-test gate (R7). Runs `just verify-quickstart`,
  # which builds the FFI-free `kx` binary and drives the README quickstart
  # (run → crash → replay → digest), asserting the canonical projection digest at
  # every step. Keeps the docs from silently drifting from the CLI. Deliberately
  # FFI-free (NO submodules, NO C++ toolchain), mirroring build-no-inference, so a
  # regression that leaked the FFI into kx-cli would also fail here. NON-REQUIRED:
  # this is a new context, not in branch protection — promote it to required once
  # it is green across a few runs (a separate, authorized branch-protection change).
  # ---------------------------------------------------------------------------
  verify-quickstart:
    name: verify-quickstart (docs-as-test; FFI-free)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the quickstart path is FFI-free)
        uses: actions/checkout@v6
        # Deliberately NO submodules and NO C++ toolchain install below.

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          cargo --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-quickstart-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-quickstart-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: Install just
        uses: extractions/setup-just@v4

      - name: just verify-quickstart
        run: just verify-quickstart

  # ---------------------------------------------------------------------------
  # docker-smoke — in-container docs-as-test (the Docker track, Scope A). Builds the
  # FFI-free `kx` image and reproduces the canonical projection digest THROUGH the
  # container: a clean run, a crash-then-replay over a PERSISTED volume, and a
  # read-only rootfs. This proves exactly-once durability survives the container
  # boundary — a measured green/red claim, not a "runs in Docker" badge.
  # FFI-free (NO submodules, NO C++ toolchain — the image needs neither).
  # NON-REQUIRED: a new context, not in branch protection — promote to required once
  # green across a few runs (a separate, authorized change). Mirrors verify-quickstart.
  # ---------------------------------------------------------------------------
  docker-smoke:
    name: docker-smoke (in-container digest reproduction; FFI-free)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the FFI-free image needs none)
        uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v4

      # ubuntu-latest ships Docker + BuildKit. The script builds the image and drives
      # run → crash → replay → digest in-container, asserting the canonical digest.
      - name: just docker-smoke
        run: just docker-smoke
  # `kx` (serve + client), checks the vendored protobuf stubs are still fresh
  # against the FROZEN proto (codegen-fresh), then runs ruff + mypy + the unit and
  # contract-e2e suites (which spin up a real `kx serve` and compare the SDK's
  # results to the `kx` CLI, byte-for-byte). Pure client + packaging — NO submodules,
  # NO C++ toolchain. REQUIRED: promoted to a branch-protection check once green.
  # Mirrors verify-quickstart.
  # ---------------------------------------------------------------------------
  sdk-python:
    name: sdk-python (gRPC client SDK — contract tests + codegen-fresh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the SDK is pure gRPC, FFI-free)
        uses: actions/checkout@v6

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: cargo --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-sdkpy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-sdkpy-${{ runner.os }}-
            cargo-${{ runner.os }}-

      # `--features hnsw` adds the Datasets data-plane (RAG) — still FFI-FREE
      # (pure-Rust kx-dataset-hnsw + rusqlite, no llama.cpp) — so the contract tests
      # can exercise the client-vector ingest/query path on Linux with no model.
      - name: Build the FFI-free kx (serve + client) for the contract tests
        run: cargo build -p kx-cli --features hnsw

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the SDK (dev extras — pinned grpcio-tools)
        working-directory: bindings/python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: codegen-fresh (vendored stubs match the frozen proto)
        working-directory: bindings/python
        run: |
          ./codegen.sh
          if ! git diff --quiet -- src/kortecx/v1; then
            echo "::error::generated stubs drifted from the proto — run bindings/python/codegen.sh and commit"
            git --no-pager diff -- src/kortecx/v1
            exit 1
          fi

      - name: Lint + type-check (ruff + mypy)
        working-directory: bindings/python
        run: |
          ruff check .
          ruff format --check src tests examples
          mypy src

      - name: Tests (unit + contract e2e against a real `kx serve`)
        working-directory: bindings/python
        env:
          KX_BIN: ${{ github.workspace }}/target/debug/kx
        run: pytest -q

  # ---------------------------------------------------------------------------
  # sdk-typescript — the TypeScript/JS gRPC client SDK (bindings/typescript).
  # Builds the FFI-free `kx`, checks the vendored Connect/protobuf stubs are still
  # fresh against the FROZEN proto (codegen-fresh), then runs biome + tsc + the
  # unit and contract-e2e suites (which spin up a real `kx serve` and reproduce the
  # `kx` CLI output byte-for-byte). Pure gRPC client — NO submodules, NO C++, NO
  # napi. REQUIRED: promoted to a branch-protection check once green. Mirrors
  # sdk-python.
  # ---------------------------------------------------------------------------
  sdk-typescript:
    name: sdk-typescript (gRPC client SDK — contract tests + codegen-fresh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the SDK is pure gRPC, FFI-free)
        uses: actions/checkout@v6

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: cargo --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-sdkts-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-sdkts-${{ runner.os }}-
            cargo-${{ runner.os }}-

      # `--features hnsw` adds the Datasets data-plane (RAG) — still FFI-FREE
      # (pure-Rust kx-dataset-hnsw + rusqlite, no llama.cpp) — so the contract tests
      # can exercise the client-vector ingest/query path on Linux with no model.
      - name: Build the FFI-free kx (serve + client) for the contract tests
        run: cargo build -p kx-cli --features hnsw

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install the SDK (clean, from the committed lockfile)
        working-directory: bindings/typescript
        run: npm ci

      - name: codegen-fresh (vendored stubs match the frozen proto)
        working-directory: bindings/typescript
        run: |
          ./codegen.sh
          if ! git diff --quiet -- src/gen; then
            echo "::error::generated TS stubs drifted from the proto — run bindings/typescript/codegen.sh and commit"
            git --no-pager diff -- src/gen
            exit 1
          fi

      - name: Lint + format + type-check (biome + tsc)
        working-directory: bindings/typescript
        run: |
          npx biome ci .
          npx tsc --noEmit

      - name: Tests (unit + contract e2e against a real `kx serve`)
        working-directory: bindings/typescript
        env:
          KX_BIN: ${{ github.workspace }}/target/debug/kx
        run: npx vitest run

  # ---------------------------------------------------------------------------
  # ui — the React/Vite dashboard shell (ui/). Builds the FFI-free `kx`, builds the
  # TS SDK (the UI depends on its dist/ via a `file:` dependency), then lints
  # (biome), type-checks (tsc), runs the unit/component/contract suites (vitest —
  # the contract test drives a real `kx serve`), builds the production bundle, and
  # runs the browser E2E (Playwright/chromium against a real CORS-enabled gateway,
  # deterministic no-model echo path). Pure gRPC-web client — NO submodules, NO C++.
  # REQUIRED: promoted to a branch-protection check once green. Mirrors
  # sdk-typescript / verify-quickstart.
  # ---------------------------------------------------------------------------
  ui:
    name: ui (React/Vite dashboard shell — biome + tsc + vitest + build + Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the UI is pure gRPC-web, FFI-free)
        uses: actions/checkout@v6

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: cargo --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-ui-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-ui-${{ runner.os }}-
            cargo-${{ runner.os }}-

      # D139: node + the SPA build come FIRST — the `console` feature embeds
      # `ui/dist` at compile time, so the dist must exist before cargo builds kx.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build the TS SDK (the UI depends on its built dist via a file dependency)
        working-directory: bindings/typescript
        run: |
          npm ci
          npm run build

      - name: Install the UI (clean, from the committed lockfile)
        working-directory: ui
        run: npm ci

      - name: Lint + format + type-check (biome + tsc)
        working-directory: ui
        run: |
          npx biome ci .
          npx tsc --noEmit

      - name: Production build (proves the SPA bundles; the console embed input)
        working-directory: ui
        run: npm run build

      - name: Eager-JS bundle gate (entry + modulepreload ≤ 600 KiB)
        working-directory: ui
        run: npm run size

      # `--features console,hnsw` (BOTH FFI-FREE — no llama.cpp): hnsw wires the
      # Datasets data-plane; console (D139) embeds the dist built above so the
      # Playwright suite can ALSO drive the real installed flow (no vite server).
      - name: Build kx (serve) with the embedded console for the contract + E2E tests
        run: cargo build -p kx-cli --features console,hnsw

      # The ONLY job that can lint/test the console feature (it needs the dist) —
      # this IS the console feature-guard; the justfile features-guard stays
      # node-free by design.
      - name: Clippy + tests for the console feature (kx-gateway)
        run: |
          cargo clippy -p kx-gateway --features console --all-targets -- -D warnings
          cargo test -p kx-gateway --features console

      - name: Unit + component + contract tests (vitest; contract vs a real `kx serve`)
        working-directory: ui
        env:
          KX_BIN: ${{ github.workspace }}/target/debug/kx
        run: npx vitest run

      - name: Install the Playwright browser (chromium only)
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Browser E2E (deterministic no-model echo path, CORS-enabled serve)
        working-directory: ui
        env:
          KX_BIN: ${{ github.workspace }}/target/debug/kx
          # The kx above carries the console feature → also run the embedded-
          # console spec (the REAL installed flow: kx serves the SPA, no vite).
          KX_CONSOLE_E2E: "1"
        run: npx playwright test

      - name: Upload the Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report
          retention-days: 7

  # ---------------------------------------------------------------------------
  # reproducible — byte-determinism check (I1.c). Runs `just check-reproducible`
  # which performs two clean release builds and diffs the output. Expensive
  # (~6+ minutes) but the load-bearing reproducibility gate.
  # ---------------------------------------------------------------------------
  reproducible:
    name: byte-determinism (I1.c)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      # No target/ cache — the reproducibility check ALREADY does `cargo clean`
      # between its two builds; caching would be wasted.
      - name: Cache Cargo download registry only
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-reproducible-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-reproducible-registry-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: just check-reproducible
        run: just check-reproducible

  # ---------------------------------------------------------------------------
  # smoke-test-with-model — full E2E inference smoke. Needs both the test
  # suite green AND the FFI link verified, since this exercises the full
  # `load model → tokenize → decode → sample → detokenize` chain.
  # ---------------------------------------------------------------------------
  smoke-test-with-model:
    name: smoke-test-with-model (kx-llamacpp E2E inference)
    runs-on: ubuntu-latest
    needs: [test, ffi-link]
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-smoke-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            cargo-smoke-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: just smoke-test-with-model
        run: just smoke-test-with-model

  # ---------------------------------------------------------------------------
  # inference-checks — clippy (-D warnings) + the MODEL-FREE test suite under the
  # `inference` feature. Closes two coverage gaps the default jobs miss: the
  # `clippy`/`test` jobs build DEFAULT features, so `#[cfg(feature="inference")]`
  # code is NEVER linted and its model-free tests NEVER run (the with-model jobs
  # need a GGUF + don't run clippy). Builds the llama.cpp FFI once and runs both
  # checks; the `#[ignore]` live-model tests stay skipped (no GGUF here — those run
  # in smoke-test-with-model / real-model-e2e). A REQUIRED context once green.
  # ---------------------------------------------------------------------------
  inference-checks:
    name: inference-checks (clippy + model-free tests under --features inference)
    runs-on: ubuntu-latest
    needs: [test, ffi-link]
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-infcheck-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            cargo-infcheck-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      # NOTE: deliberately NO `console` feature — its build.rs embeds the built
      # `ui/dist`, which this job does not build (that is covered by the `ui` +
      # `verify-quickstart` jobs). The inference-gated code under test
      # (model lifecycle / cache / model_exec) lives under inference/embedded-worker.
      - name: clippy under --features inference (the cfg(inference) lint gap)
        run: |
          cargo clippy -p kx-gateway --features inference,embedded-worker,hnsw \
            --all-targets -- -D warnings
          cargo clippy -p kx-inference --features llamacpp --all-targets -- -D warnings

      - name: model-free tests under --features inference (the cfg(inference) test gap)
        run: |
          cargo test -p kx-gateway --features inference,embedded-worker,hnsw -- --nocapture

      # PR-A (pluggable inference engine): exercise the FFI-FREE `serve-engine` path —
      # the Ollama backend + the host RoutingBackend + the re-gated serve loop — so the
      # feature is never merged unbuilt. This runs WITH the toolchain (it just compiles
      # + tests the FFI-free feature here); the no-toolchain FFI-FREE PROOF (a
      # build-no-inference-style `build-serve-engine` gate) + the release-artifact flip
      # land in the immediate PR-A.1 follow-up.
      - name: clippy + lib tests under --features serve-engine (FFI-free serve loop)
        run: |
          cargo clippy -p kx-ollama --all-targets -- -D warnings
          cargo clippy -p kx-gateway --features serve-engine,hnsw --all-targets -- -D warnings
          cargo test -p kx-gateway --features serve-engine,hnsw --lib -- --nocapture

  # ---------------------------------------------------------------------------
  # real-model-e2e — the GR15 real-model behavioral gate. Serves the public
  # Qwen3-0.6B stand-in through the FULL serve path (invoke kx/recipes/chat →
  # worker → real in-process inference → commit → GetContent) and asserts the
  # completion is CLEAN (no ChatML scaffolding leak — the §2.199 parse_special
  # guard at the e2e level — no `kx demo result` placeholder) AND greedy decode is
  # deterministic across independent gateways. Real inference on EVERY PR (GR15).
  # Builds the llama.cpp FFI; the GGUF is SHA-pinned + cached so it downloads at
  # most once. A REQUIRED status-check context (Golden Rule 4) — promoted via branch
  # protection once green on `main` (the job `name:` below is that context string;
  # do not rename it). `build-no-inference` + `verify-quickstart` stay FFI-free (the
  # installability proof is preserved).
  # ---------------------------------------------------------------------------
  real-model-e2e:
    name: real-model-e2e (Qwen3 chat behavioral gate)
    runs-on: ubuntu-latest
    needs: [test, ffi-link]
    steps:
      - name: Checkout (with submodules for crates/kx-llamacpp-sys/llama.cpp)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install bindgen + CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake build-essential

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-realmodel-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml', '.gitmodules') }}
          restore-keys: |
            cargo-realmodel-${{ runner.os }}-
            cargo-smoke-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Cache the Qwen3-0.6B GGUF (SHA-pinned ⇒ downloads at most once)
        uses: actions/cache@v5
        with:
          path: target/models
          key: model-qwen3-0.6b-q4km-ac2d9771

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: just real-model-e2e (fetch Qwen3-0.6B + run the GR15 gate)
        run: just real-model-e2e

  # NOTE (PR-2): the IMAGE pipeline is intentionally NOT a CI job. A 2 B VLM
  # (~1.6 GB download + a CPU inference run, twice for the determinism check)
  # would add 20-40 min + network flakiness for marginal unique value: `ffi-link`
  # already proves `mtmd` LINKS on Linux, `build-no-inference` proves the
  # feature-gating, and the no-model tests in `cargo test --workspace` (the sniff,
  # the fail-closed dispatch gates, the assembler exclusion, the harness
  # `Multimodal` routing) prove the logic. Real-VLM image→text is validated
  # LOCALLY/manually via `just smoke-test-multimodal` (a release / FFI-touch
  # gate), the same place the heavy validation belongs — see the recipe in the
  # justfile. (The text smoke stays in CI because stories260K is ~1.2 MB.)

  # ---------------------------------------------------------------------------
  # scale-smoke — M2.1 + M2.2 + M2.x-E / D92 resume-availability gate. Folds a
  # 25k+ Mote journal in RELEASE and asserts the incremental children-index re-fold
  # stays ~linear (M2.1) AND that resume-from-FoldCheckpoint reproduces the full
  # fold exactly with cost bounded by live-state under churn (M2.2) AND that offline
  # schema migration (migrate_to, IMP-2/M2.x-E) stays O(entries) so resume-after-
  # upgrade is not an outage. A super-linear resume is an outage. Promoted to a
  # required status check via an explicitly-authorized branch-protection PATCH once
  # green on a couple of runs (Golden Rule 4). Needs the test suite green first.
  # ---------------------------------------------------------------------------
  # NOTE: the job `name:` below is the **required status-check context** in
  # branch protection — do NOT rename it (a rename orphans the required check
  # and blocks merges). M2.2 / M2.x-E extend the recipe body, not the context name.
  scale-smoke:
    name: scale-smoke (M2.1 incremental children-index re-fold)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-scale-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-scale-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Configure RUSTFLAGS for path-stripping
        run: |
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}= -Cmetadata=kortecx-v0" >> $GITHUB_ENV

      - name: just scale-smoke
        run: just scale-smoke

  # ---------------------------------------------------------------------------
  # connector-conformance — the D167 Connector/Extension SDK gate (E0). Dials a
  # PINNED REAL third-party MCP server (the official filesystem server) through the
  # real gateway path and runs the Extension Acceptance Gate subset (items 3/5/7/10:
  # out-of-process · warrant/SN-8 · secret-by-ref · on/off). `npm ci` restores the
  # EXACT committed lockfile (the only network op — cached); the dial + every
  # assertion run OFFLINE over a stdio subprocess, so no network flakiness enters the
  # gate (GR12). REQUIRED: promote to a branch-protection check once green.
  # ---------------------------------------------------------------------------
  connector-conformance:
    name: connector-conformance (D167 — real external MCP through the gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — the SDK is FFI-free)
        uses: actions/checkout@v6

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: cargo --version

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up Node (cache the pinned MCP-server lockfile)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/kx-extension-sdk/tests/fixtures/real-connector/package-lock.json

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-connconf-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-connconf-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Dial a pinned REAL external MCP server through the conformance gate
        run: just test-connector-real

      # The DECLARATIVE-family gate — every in-tree skills/** pack through
      # run_skill_conformance (pack loads · canonical roundtrip · authority
      # deny-keys · wish grammar · bounded instructions · declarative-only ·
      # empty-grant-binds-to-zero). Offline, no model, <10s on the warm cache —
      # rides this job rather than paying a fresh ~5-8 min build in its own.
      - name: Skill-pack conformance (all skills/** reference packs)
        run: just test-skill

  # ---------------------------------------------------------------------------
  # registry-consistency: registry/index.json
  # must agree with the tree (skills/** ⟷ skill entries · integrations/kx-connector-*
  # ⟷ integration entries · sources exist · ledger ids real · per-pack name/version
  # match). Closes the "merge green while missing from an index" hole. Pure local
  # file reads (python3 stdlib) — no Rust build, no network, <30s.
  # ---------------------------------------------------------------------------
  registry-consistency:
    name: registry-consistency (index ⟷ tree)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — file reads only)
        uses: actions/checkout@v6

      # The registry validator script is a maintainer-local helper and is not
      # bundled in the public repo; registry/index.json itself ships here. This
      # step runs the validator when present and skips honestly when it is not.
      - name: Verify registry/index.json against the tree
        run: |
          if [ -f scripts/registry-check.sh ]; then
            bash scripts/registry-check.sh
          else
            echo "registry-check.sh not present — skipped; registry/index.json ships in this repo"
          fi

  # cargo-semver-checks: a breaking public-API change on a Cargo 0.x crate is a MINOR bump (0.1.x -> 0.2.0),
  # never a patch. #307 retyped kx-coordinator/kx-worker public signatures but bumped 0.1.1 -> 0.1.2 and
  # every gate passed (the merge gate proves CI + review, not semver — L-077.a). This job fails when the
  # public API changed with no matching version bump. FFI-free: the llama.cpp crates are excluded (they
  # need the C++ toolchain + submodule). Git-rev baseline (origin/main) — no crates.io publish required.
  semver-checks:
    name: semver-checks (a breaking public API change needs a minor bump — L-077.a)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with history (origin/main is the API baseline)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Make origin/main available as the baseline rev
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: |
          rustup show active-toolchain
          cargo --version

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-semver-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-semver-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: cargo-semver-checks vs origin/main (FFI-free public library crates)
        run: |
          set -euo pipefail
          # --baseline-rev compares this PR's public API against origin/main (no published crate needed).
          # This job is FFI-FREE (no llama.cpp submodule / C++ toolchain), so a `--workspace` check aborts
          # building rustdoc for a crate that transitively needs the FFI (e.g. kx-cli). Instead we check an
          # EXPLICIT set of FFI-free public LIBRARY crates — the durable contracts consumers build on. No
          # binaries (a CLI has no semver-relevant public API) and no FFI/inference crates. Adding the
          # FFI-dependent crates needs a separate with-submodule variant (a follow-up). The gRPC contract is
          # additionally guarded by the proto-breaking job. "Advisory first; promote to a required check once
          # green a few runs."
          cargo semver-checks \
            --baseline-rev origin/main \
            --package kx-proto \
            --package kx-mote \
            --package kx-journal \
            --package kx-content \
            --package kx-warrant \
            --package kx-planner \
            --package kx-projection \
            --package kx-workflow \
            --package kx-toolcall \
            --package kx-critic-types

  # Fuzz-smoke (risk-burndown Batch B): builds + briefly runs the cargo-fuzz targets over the untrusted-byte
  # parse paths (decode_plan / decode_entry / fold_checkpoint). A short per-PR smoke catches a NEW crash a
  # change introduces; deep/long fuzzing is a separate scheduled run (see fuzz/README.md). FFI-free targets
  # only (no llama.cpp submodule). Nightly is required for the sanitizer/coverage instrumentation.
  fuzz-smoke:
    name: fuzz-smoke (untrusted-byte parse paths)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (NO submodules — FFI-free fuzz targets)
        uses: actions/checkout@v6

      - name: Install nightly (required by cargo-fuzz sanitizers)
        run: |
          rustup toolchain install nightly --profile minimal
          rustup run nightly rustc --version

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Cache Cargo registry + fuzz target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: cargo-fuzz-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'fuzz/Cargo.toml') }}
          restore-keys: |
            cargo-fuzz-${{ runner.os }}-

      - name: Ensure the gnu (dynamic-libc) target for nightly
        # cargo-binstall installs a MUSL-built cargo-fuzz, whose default build target is musl —
        # static libc, which the ASAN sanitizer refuses ("sanitizer is incompatible with statically
        # linked libc") and which isn't installed. Force the standard dynamic-libc gnu target below.
        run: rustup target add --toolchain nightly x86_64-unknown-linux-gnu

      - name: Build fuzz targets (compiles against the real parse APIs)
        env:
          RUSTUP_TOOLCHAIN: nightly    # the repo pins stable via rust-toolchain.toml; fuzz needs nightly
        run: cargo fuzz build --target x86_64-unknown-linux-gnu

      - name: Smoke each target (fail on any crash/panic)
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: |
          set -euo pipefail
          for t in decode_plan decode_entry fold_checkpoint; do
            echo "── fuzz-smoke: $t ──"
            cargo fuzz run --target x86_64-unknown-linux-gnu "$t" -- -max_total_time=45 -print_final_stats=1
          done
          echo "✅ fuzz-smoke clean — no crash in the smoke window (deep fuzzing is a separate scheduled run)."

  # proto-breaking: the kortecx.v1 gRPC contract (KxGateway + Coordinator) is additive-only (D120.6). That
  # was convention-only + the codegen-fresh guards; this makes it a mechanical gate — a removed / renumbered
  # / renamed / retyped field on a released message fails against origin/main. Only on a PR (the baseline is
  # main). Config: crates/kx-proto/proto/buf.yaml (breaking: FILE). A deliberate break bumps kortecx.v2.
  proto-breaking:
    name: proto-breaking (kx-proto additive-only — D120.6)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with history (origin/main is the proto baseline)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Make origin/main available as the baseline
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}
      - name: buf breaking (kx-proto) vs origin/main
        run: buf breaking crates/kx-proto/proto --against '.git#ref=refs/remotes/origin/main,subdir=crates/kx-proto/proto'
