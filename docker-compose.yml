services:
  # ── PostgreSQL (Neon-compatible) ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: kortecx_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kortecx
      POSTGRES_PASSWORD: kortecx
      POSTGRES_DB: kortecx_dev
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./frontend/scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kortecx -d kortecx_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Qdrant Vector Database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kortecx_qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'   # REST API
      - '6334:6334'   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:6333/healthz']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  qdrant_data:
