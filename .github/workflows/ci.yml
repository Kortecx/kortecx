name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  GO_VERSION: '1.22'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ═══════════════════════════════════════════════════════
  # Frontend
  # ═══════════════════════════════════════════════════════
  frontend-lint:
    name: Frontend · Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx next lint

  frontend-test:
    name: Frontend · Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=verbose --reporter=junit --outputFile=test-results.xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results.xml
      - name: Publish test results
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Test Results
          path: frontend/test-results.xml
          reporter: jest-junit
          fail-on-error: true
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json');
              const t = c.total;
              console.log('## Frontend Coverage');
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Statements | ' + t.statements.pct + '% |');
              console.log('| Branches | ' + t.branches.pct + '% |');
              console.log('| Functions | ' + t.functions.pct + '% |');
              console.log('| Lines | ' + t.lines.pct + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi
      - name: Check coverage threshold
        run: |
          npx vitest run --coverage 2>/dev/null || true
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json');
              const lines = c.total.lines.pct;
              console.log('Line coverage: ' + lines + '%');
              if (lines < 30) {
                console.error('Coverage ' + lines + '% is below 30% threshold');
                process.exit(1);
              }
            "
          fi

  frontend-build:
    name: Frontend · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx next build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          DB_MODE: local

  # ═══════════════════════════════════════════════════════
  # Engine
  # ═══════════════════════════════════════════════════════
  engine-lint:
    name: Engine · Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/

  engine-test:
    name: Engine · Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: Run tests with coverage
        run: uv run pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=engine --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-coverage
          path: engine/coverage.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-test-results
          path: engine/test-results.xml
      - name: Publish test results
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        with:
          name: Engine Test Results
          path: engine/test-results.xml
          reporter: java-junit
          fail-on-error: true
      - name: Coverage summary
        if: always()
        run: |
          uv run python -c "
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('coverage.xml')
              rate = float(tree.getroot().get('line-rate', 0))
              pct = round(rate * 100, 1)
              print(f'## Engine Coverage')
              print(f'| Metric | Coverage |')
              print(f'|--------|----------|')
              print(f'| Lines | {pct}% |')
          except Exception as e:
              print(f'Coverage parse error: {e}')
          " >> $GITHUB_STEP_SUMMARY
      - name: Check coverage threshold
        run: |
          uv run python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().get('line-rate', 0))
          pct = round(rate * 100, 1)
          print(f'Line coverage: {pct}%')
          if pct < 20:
              raise SystemExit(f'Coverage {pct}% is below 20% threshold')
          "

  # ═══════════════════════════════════════════════════════
  # Go Client
  # ═══════════════════════════════════════════════════════
  go-lint:
    name: Go Client · Lint & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go vet ./...
      - run: go build ./...

  go-test:
    name: Go Client · Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests with coverage
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out -json > test-results.json 2>&1 || true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: go-client/coverage.out
      - name: Coverage summary
        if: always()
        run: |
          echo "## Go Client Coverage" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -1 | awk '{print "| Lines | " $3 " |"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage |" | cat - $GITHUB_STEP_SUMMARY > /tmp/summary && mv /tmp/summary $GITHUB_STEP_SUMMARY || true
          go tool cover -func=coverage.out | tail -1

  # ═══════════════════════════════════════════════════════
  # Integration (requires services)
  # ═══════════════════════════════════════════════════════
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint, engine-lint, go-lint]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kortecx
          POSTGRES_PASSWORD: kortecx
          POSTGRES_DB: kortecx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Push DB schema
        working-directory: frontend
        run: npx drizzle-kit push
        env:
          DATABASE_URL: postgresql://kortecx:kortecx@localhost:5432/kortecx_test
      - name: Install engine
        working-directory: engine
        run: uv sync --frozen
      - name: Run integration tests
        working-directory: frontend
        run: npx vitest run --config vitest.integration.config.ts --reporter=verbose --reporter=junit --outputFile=integration-results.xml
        env:
          DATABASE_URL: postgresql://kortecx:kortecx@localhost:5432/kortecx_test
          DB_MODE: local
      - name: Publish integration results
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        with:
          name: Integration Test Results
          path: frontend/integration-results.xml
          reporter: jest-junit
          fail-on-error: true

  # ═══════════════════════════════════════════════════════
  # Final gate — all checks must pass for merge
  # ═══════════════════════════════════════════════════════
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - frontend-lint
      - frontend-test
      - frontend-build
      - engine-lint
      - engine-test
      - go-lint
      - go-test
      - integration
    steps:
      - name: Check all jobs passed
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint | ${{ needs.frontend-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Engine Lint | ${{ needs.engine-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Engine Tests | ${{ needs.engine-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go Lint | ${{ needs.go-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go Tests | ${{ needs.go-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY

          # Fail if any required job failed
          if [[ "${{ needs.frontend-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-test.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-build.result }}" == "failure" ]] || \
             [[ "${{ needs.engine-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.engine-test.result }}" == "failure" ]] || \
             [[ "${{ needs.go-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.go-test.result }}" == "failure" ]] || \
             [[ "${{ needs.integration.result }}" == "failure" ]]; then
            echo ""
            echo "❌ One or more checks failed. PR cannot be merged."
            exit 1
          fi
          echo ""
          echo "✅ All checks passed."
