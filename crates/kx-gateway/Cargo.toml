# SPDX-License-Identifier: Apache-2.0
[package]
name         = "kx-gateway"
version      = "0.1.1"
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
authors      = { workspace = true }
repository   = { workspace = true }
description  = "kortecx single-system gateway server (R1, D130): a tonic gRPC binary hosting the FROZEN KxGateway service over kx-gateway-core, with an embedded loopback coordinator + local worker so a hosted SubmitRun reaches Committed. The auth seam is a deny-all stub (serving requires --dev-allow-local). FFI-free by default."

[lib]
path = "src/lib.rs"

[[bin]]
name = "kx-gateway"
path = "src/main.rs"

[dependencies]
# The KxGateway backend (read-fold + propose-proxy) being hosted + the generated
# tonic server/client stubs. Always required (the gateway is always hosted).
kx-gateway-core = { workspace = true }
kx-proto        = { workspace = true }
# Read-only seams the gateway folds over (a SECOND journal handle + the content store).
kx-journal      = { workspace = true }
kx-content      = { workspace = true }
# The Morphic Data Engine (campaign Batch 2): the OFF-TRUTH-PATH, ActionsOnly
# capture scope discipline (StepRecord::action / CaptureConsent::actions_only).
# The HOST folds the journal into a durable capture.db sidecar through this — the
# crate's `tests/boundary.rs` forbids only the GUARANTEE-path crates from
# depending on it; kx-gateway (the host) is allowed. Pure-Rust (no FFI).
kx-capture      = { workspace = true }
# ExecutorClass (worker registration + the platform-default class). A tiny FFI-free leaf.
kx-warrant      = { workspace = true }
# R2a: the signature catalog (the 3 catalog RPCs) — FFI-free (pulls kx-dataset /
# kx-tool-registry / rusqlite, none of which link llama.cpp; the dep_wall pins it).
# `bincode` (+ canonical_config from kx-catalog) round-trips a SignatureEntry to
# the opaque wire `manifest` bytes and server-derives its id.
kx-catalog      = { workspace = true }
# UI-3: the membership ledger (teams) — the durable SqliteMembershipLedger seeded
# with a demo team + the GovernedFleet resolve surface (membership ∩ grant). FFI-free
# (kx-fleet depends only on kx-catalog/kx-warrant + rusqlite, already in the closure;
# the dep_wall forbids only the llama.cpp FFI crates). The view seams it backs live in
# this host binary so kx-gateway-core stays off kx-fleet (the dependency wall).
kx-fleet        = { workspace = true }
bincode         = { workspace = true }
# R2b: the inbound recipe-by-handle execution path (resolve→validate→bind→
# intersect) + the recipe types the host provisions the demo library from. All
# FFI-free (the dep_wall pins it).
kx-invoke       = { workspace = true }
kx-mote         = { workspace = true }
kx-workflow     = { workspace = true }
# PR-2c-3 (critic-live): the shared whole-DAG submission validator + the R-15
# native-critic SHAPE gate (`native_critic_shape`). FFI-free (dep-wall-safe);
# NON-optional because the SubmitRun ingress runs it in BOTH builds — to enforce
# the cross-Mote critic refusals live (B3) and to refuse a critic-bearing DAG on a
# non-inference serve build that cannot compute verdicts (H5, fail-closed).
kx-refusal      = { workspace = true }
# PR-2d-1: the model-proposed tool-call AUTHORITY GATE — the react turn arm's
# pre-commit fence decodes through the ONE shared crate (never a byte-mirror).
kx-toolcall     = { workspace = true }
# Inline parent-edge storage for the PURE Mote built by `pure_run_request`
# (`Mote::new`'s `parents` is a `SmallVec<[ParentRef; 4]>`). Promoted from a dev-dep
# (R3) so the helper is a NORMAL public library fn. FFI-free (the dep_wall forbids
# only the llama.cpp FFI crates).
smallvec        = { workspace = true }
# The embedded single-system engine (D129-sanctioned single-process worker management),
# behind a default-on feature so R13's `cluster` story can disable it for a lib consumer.
# kx-executor -> kx-inference is `default-features = false` at the workspace root, so this
# closure stays FFI-free (no llama.cpp toolchain) — the dep_wall test pins it.
kx-coordinator  = { workspace = true, optional = true }
kx-worker       = { workspace = true, optional = true }
kx-executor     = { workspace = true, optional = true }
kx-capability   = { workspace = true, optional = true }
# PR-9b: per-Mote input tempfile for the real, sandboxed body-exec router
# (`real_exec.rs`). FFI-free + already in the lock (a dev-dep here + a normal dep
# of kx-executor); gated under `embedded-worker` so the gateway-only closure that
# `build-no-inference` asserts stays unchanged.
tempfile        = { workspace = true, optional = true }
# AL1 (the live `kx serve` LLM loop): the in-process inference backend + model
# registry/validator, all OPTIONAL + behind the `inference` feature so the DEFAULT
# build stays FFI-free (`build-no-inference` + the dep-wall). We depend on
# `kx-inference` WITH its `llamacpp` feature — pulling the C++ FFI transitively
# WITHOUT naming the FFI crate here (the dep-wall manifest scan forbids that name).
kx-inference       = { workspace = true, optional = true, features = ["llamacpp"] }
kx-model-store     = { workspace = true, optional = true }
kx-model-validator = { workspace = true, optional = true }
# PR-2b (T1.1): the planner's decode→budget→lower trust boundary for the LIVE shaper
# arm (model proposal → vetted TopologyDecision). FFI-free (dep-wall-safe); behind
# `inference` so the default build is unaffected.
kx-planner         = { workspace = true, optional = true }
# PR-2c-3 (critic-live): the FFI-free deterministic-critic evaluator
# (`kx_critic::evaluate` + `CriticVerdict`). The live verdict arm in
# `model_exec.rs::run_critic` mirrors the FROZEN `run_native_critic_mote`; behind
# `inference` because that arm lives in the inference-gated executor (a critic DAG
# is refused on a non-inference serve, H5). Pure-Rust — the dep-wall stays green.
kx-critic          = { workspace = true, optional = true }
# PR-2d-2 (react-tools-live): the FIRST gateway→MCP edge — the hand-rolled sync
# MCP adapter whose `McpCapability` + `StdioTransport` fire the bundled
# deterministic stdio tool (`mcp-echo@1`) for the live ReAct loop. Pure-Rust /
# FFI-free (ureq/serde_json/url only — the dep-wall subtree check pins it);
# OPTIONAL + behind `inference` (the react decode arm lives in the
# inference-gated executor), so the DEFAULT build is byte-unchanged.
kx-mcp             = { workspace = true, optional = true }
# PR-6b-1 (D159): the EXTERNAL MCP gateway — dials external MCP servers (stdio +
# Streamable-HTTP) over kx-mcp's session seam, discovers their tools into the
# durable tools.db, and governs them via an off-journal connections.db sidecar.
# FFI-free (kx-mcp/ureq/rusqlite only — the dep-wall subtree check pins it).
# Behind the `mcp-gateway` feature (ON by default); the live untrusted-egress
# surface is the registry + dial-time SSRF + per-server rate-limit (GR8).
kx-mcp-gateway     = { workspace = true, optional = true }
# PR-2d-2: the typed ToolDef/inputSchema vocabulary for the bundled tool's
# registry entry (shared with the coordinator so the settle's validate-at-freeze
# and the broker dispatch see the SAME schema). FFI-free. NON-optional since
# W1.A5: the always-on advisory toolscout view lists the registry's builtin
# manifests on every build (it was ALREADY in the default closure via
# kx-catalog, so this adds no build edge).
kx-tool-registry   = { workspace = true }
# T3.7: the FFI-free durable vector substrate (the Datasets data-plane). kx-dataset
# (the RetrievalIndex trait + Hit + the exact InMemoryRetrievalIndex) +
# kx-dataset-hnsw (the in-process HNSW ANN index). Both pure-Rust (hnsw_rs /
# thiserror only) — NO llama.cpp, so the dep-wall holds. `rusqlite` (already in
# the closure via kx-catalog/kx-fleet) is the durable, crash-safe store; the
# HNSW graph is rebuilt from the rows on open. kx-dataset is NON-optional since
# W1.A5 (the toolscout ToolManifestIndex composes its exact in-memory index;
# already in the default closure via kx-catalog — no new build edge);
# kx-dataset-hnsw stays OPTIONAL behind the `hnsw` feature so the DEFAULT build
# is byte-unchanged. The client-vector path works under `hnsw` ALONE.
kx-dataset         = { workspace = true }
kx-dataset-hnsw    = { workspace = true, optional = true }
# W1.A5: the advisory MCP-intelligence surface — TaskBundle (kx-bundle) +
# manifest ranking / the fail-closed lowering dry-run (kx-toolscout). Both
# pure-Rust, FFI-free, ALWAYS-ON (the manifests/score RPCs answer on every
# build; the verdict degrades to UNAVAILABLE without a react runtime).
# SN-8: both crates are advisory by construction — neither is reachable from
# the broker/admission authority path.
kx-bundle          = { workspace = true }
kx-toolscout       = { workspace = true }
# POC-4: the App envelope type (kortecx.app/v1) — a pure leaf (serde/serde_json/
# thiserror only, NO llama.cpp / NO journal), used by the apps.db host store to
# validate + canonicalize an envelope and derive its summary + app_ref. The
# dep-wall subtree check pins it.
kx-app             = { workspace = true }
# rusqlite is NON-optional: the always-on Morphic Data Engine capture.db sidecar
# (campaign Batch 2) needs it unconditionally, and it is ALREADY in the default
# closure (kx-catalog/kx-fleet pull it for the durable ledgers). Pure-Rust C
# (SQLite), NOT the llama.cpp FFI — the `build-no-inference` gate stays green.
rusqlite           = { workspace = true }
# A1: `tls` enables in-binary rustls TLS on the gRPC listener (reuses the rustls
# 0.23 + ring already in the lock via ureq — no new crypto provider). Server cert/
# key via `--tls-cert`/`--tls-key`; plaintext stays the default (TLS opt-in).
tonic              = { workspace = true, features = ["tls"] }
# A2: serve the standard `grpc.health.v1.Health` service (liveness/readiness) on the
# gRPC listener, alongside the KxGateway service (NOT behind the auth interceptor —
# a health probe is unauthenticated by design).
tonic-health       = { workspace = true }
# R9.5: the gRPC-web shim (GrpcWebLayer) so a browser SPA can make unary RPCs over
# HTTP/1.1 (tonic is HTTP/2-only otherwise). Binary-only; FFI-free; the native h2
# gRPC path is unchanged (accept_http1 is additive).
tonic-web          = { workspace = true }
# R9.5: the deny-by-default CORS layer for the gRPC-web shim (`--cors-origin`
# allowlist; never a wildcard). `cors` feature only; tower/http already locked via
# tonic. Outermost layer so OPTIONS preflight is answered before the auth interceptor.
tower-http         = { workspace = true }
# The hyper http1 stack backs TWO loopback listeners: the embedded web console
# (D139, `console` feature — serves the compile-time-embedded SPA, GET/HEAD only,
# no runtime filesystem) AND the W1a (T-OBS2) Prometheus `/metrics` endpoint
# (always available, opt-in via `--metrics-listen`). NON-optional since W1a so the
# metrics surface works on EVERY build (default/inference/hnsw) without requiring
# the console feature. All are tonic/tower-http transitives already in the lock:
# zero new crate entries, deny.toml untouched, the dep wall holds (no FFI).
hyper              = { workspace = true }
hyper-util         = { workspace = true }
http-body-util     = { workspace = true }
http               = { workspace = true }
bytes              = { workspace = true }
# W1a (T-OBS2): RED metrics folded from the read-only journal + Prometheus text
# render. FFI-free, no build.rs (the dep-wall + check-reproducible stay green).
kx-otel            = { workspace = true }
# W1a (T-OBS1): the JSONL operator audit sink for the serve path (the gateway
# constructs it from `--audit-log` and injects it into the embedded coordinator).
# Off the truth path; FFI-free (the dep-wall keeps it off the guarantee crates).
kx-audit           = { workspace = true }
# Additive feature bump over the workspace tokio (rt-multi-thread/macros/net):
# `signal` for graceful Ctrl-C shutdown, `time` for the worker poll/backoff +
# connect-retry + the R5 live-tail poll interval, `sync` for the R5 per-subscriber
# bounded mpsc. Member-level feature additions are honored (unlike default-features).
tokio              = { workspace = true, features = ["signal", "time", "sync"] }
# R5: `ReceiverStream` adapts the live-tail mpsc into the tonic server stream.
# Already a transitive dep (tonic) — promoting it adds no new crate.
tokio-stream       = { workspace = true }
# R5: the WebSocket bridge transport (the browser StreamEvents surface). MIT;
# hyper/tower already locked via tonic. Lives in the binary only (the dep wall
# keeps kx-gateway-core a passive read-fold).
tokio-tungstenite  = { workspace = true }
# R5: split the WS into read/write halves (push frames while handling Close/Ping).
futures-util       = { workspace = true }
# R5: parse the WS upgrade request's query string (instance_id + since_seq) +
# the JSON hex wire DTO. Both already workspace deps (no new crate).
url                = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror          = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio    = { workspace = true, features = ["time"] }
# `nix::sys::signal::raise(SIGTERM)` (a SAFE wrapper — kx-gateway is
# `#![forbid(unsafe_code)]`) for the graceful-shutdown signal test. Unix-only,
# test-only; stays out of the FFI-free normal closure `build-no-inference` asserts.
nix      = { workspace = true }
# A1: generate a self-signed cert/key for the TLS handshake integration test.
rcgen    = { workspace = true }
# A1: a tonic TLS client (Endpoint + ClientTlsConfig) to drive the TLS gateway in
# the handshake test; `transport` is already on via tonic's default features.
tonic    = { workspace = true, features = ["tls"] }

[features]
default = ["embedded-worker", "mcp-gateway"]
# PR-6b-1 (D159): the EXTERNAL MCP gateway (dial external MCP servers + the
# Connections govern surface + the 5 MCP-server RPCs). FFI-free (kx-mcp/ureq/
# rusqlite), so it stays in the DEFAULT build without breaking `build-no-inference`
# or the FFI-link gate. Requires the embedded broker (to register a dialed tool's
# firing capability). The autonomous ReAct loop's auto-grant of dialed tools ships
# in PR-6b-2; here a dialed tool is registered + directly fireable through a
# granting warrant (SN-8). OAuth/device-flow + a credential marketplace = CLOUD.
mcp-gateway = ["dep:kx-mcp", "dep:kx-mcp-gateway", "embedded-worker"]
# The in-process coordinator + local worker (single-system OSS, D129). On by default so
# the binary is genuinely reachable end-to-end (SubmitRun -> Committed). A future library
# consumer can disable it to embed a gateway-only front end (then `serve` requires an
# external coordinator — a later step; R1 refuses without the feature).
embedded-worker = ["dep:kx-coordinator", "dep:kx-worker", "dep:kx-executor", "dep:kx-capability", "dep:tempfile"]
# AL1: the in-process model dispatch path for `kx serve` — the embedded worker can
# execute model Motes through the in-process inference backend. OFF by default so
# the default `kx serve` stays FFI-free (`build-no-inference` + the dep-wall stay
# green); a toolchain build opts in with `--features inference`. Implies the
# embedded worker (the loop runs in the in-process worker).
inference = [
    "embedded-worker",
    "dep:kx-inference",
    "dep:kx-model-store",
    "dep:kx-model-validator",
    "dep:kx-planner",
    "dep:kx-critic",
    "dep:kx-mcp",
    "mcp-gateway",
]
# T3.7: the Datasets data-plane (RAG) read/write surface. The client-provided-vector
# path is FFI-FREE + deterministic (CI-exercisable on Linux with no model). Pulls only
# pure-Rust crates (the dep-wall + `build-no-inference` stay green). The server-embed
# path ADDITIONALLY needs `inference` (an EmbeddingBackend); without it, server-embed
# requests return FAILED_PRECONDITION. Independent of `inference` — they compose.
hnsw = ["dep:kx-dataset-hnsw"]
# D139: `kx serve` hosts the embedded web console (the built React SPA) on a third
# loopback listener (default 127.0.0.1:8888). OFF by default: the dist is embedded
# at COMPILE time by build.rs, so a console build needs `ui/dist` (a repo checkout
# with node, or the prebuilt release which ships it) — plain `cargo build/install`
# stays node-free and byte-identical. FFI-free (hyper stack only); composes with
# `hnsw`/`inference`. Release binaries ship `--features console,hnsw` (D139.4). The
# hyper stack is now NON-optional (shared with the always-on `/metrics` endpoint),
# so this feature only gates the console module + build.rs SPA embedding.
console = []

[lints]
workspace = true
