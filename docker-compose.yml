services:
  # ── PostgreSQL (Neon-compatible) ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: kortecx_db
    restart: unless-stopped
    shm_size: '256mb'
    command: >
      postgres
      -c wal_level=replica
      -c fsync=on
      -c synchronous_commit=on
      -c full_page_writes=on
      -c checkpoint_timeout=300
    environment:
      POSTGRES_USER: kortecx
      POSTGRES_PASSWORD: kortecx
      POSTGRES_DB: kortecx_dev
      # Prevent data loss on unclean shutdown
      POSTGRES_INITDB_ARGS: '--data-checksums'
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./frontend/scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
      - ./backups:/backups        # mount for backup scripts
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kortecx -d kortecx_dev']
      interval: 5s
      timeout: 5s
      retries: 5
    # Graceful shutdown — give postgres time to flush WAL
    stop_grace_period: 30s

  # ── Qdrant Vector Database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest      # pin after initial deploy; downgrade breaks storage format
    container_name: kortecx_qdrant
    restart: unless-stopped
    shm_size: '128mb'
    ports:
      - '6333:6333'   # REST API
      - '6334:6334'   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "echo > /dev/tcp/localhost/6333"']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: kortecx_mlflow
    restart: unless-stopped
    ports:
      - '5050:5050'
    volumes:
      - mlflow_data:/mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5050
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:5050/health\")"']
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Automated Database Backup (every 15 minutes) ───────────────────────────
  db-backup:
    image: postgres:16-alpine
    container_name: kortecx_db_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    environment:
      PGHOST: db
      PGPORT: '5432'
      PGUSER: kortecx
      PGPASSWORD: kortecx
      PGDATABASE: kortecx_dev
      BACKUP_RETENTION: '48'
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Backup cron starting — every 15 minutes, retaining last $${BACKUP_RETENTION} dumps"
        while true; do
          sleep 900
          STAMP=$$(date +%Y%m%d_%H%M%S)
          FILE="/backups/kortecx_dev_$${STAMP}.sql.gz"
          pg_dump -h db -U kortecx -d kortecx_dev --clean --if-exists | gzip > "$$FILE"
          SIZE=$$(du -h "$$FILE" | cut -f1)
          echo "[$$STAMP] backup saved: $$FILE ($$SIZE)"
          ls -t /backups/kortecx_dev_*.sql.gz 2>/dev/null | tail -n +$$((BACKUP_RETENTION + 1)) | xargs -r rm -f
        done

  # ── Python Executor (sandboxed script execution) ───────────────────────────
  executor-python:
    image: python:3.11-slim
    container_name: kortecx_executor_python
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - executor_python:/workspace
      - ./engine/steps:/steps:ro
    environment:
      PYTHONDONTWRITEBYTECODE: '1'
    command: >
      sh -c "pip install --quiet numpy pandas requests httpx pydantic duckdb &&
             echo 'Python executor ready' &&
             tail -f /dev/null"
    healthcheck:
      test: ['CMD', 'python', '-c', 'print("ok")']
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # ── TypeScript/React Executor (sandboxed script execution) ────────────────
  executor-typescript:
    image: node:20-slim
    container_name: kortecx_executor_ts
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - executor_ts:/workspace
      - ./engine/steps:/steps:ro
    command: >
      sh -c "npm init -y > /dev/null 2>&1 &&
             npm install --quiet tsx esbuild react react-dom @types/react > /dev/null 2>&1 &&
             echo 'TypeScript executor ready' &&
             tail -f /dev/null"
    healthcheck:
      test: ['CMD', 'node', '-e', 'console.log("ok")']
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

# ── Named volumes (persist across container recreation) ────────────────────
# Crash-proof guarantees:
#   - PostgreSQL: WAL durability (fsync, synchronous_commit, full_page_writes)
#   - All volumes use Docker named volumes backed by the host filesystem
#   - Data survives container restarts, crashes, and recreations
# WARNING: Do NOT use 'docker compose down -v' — it deletes these volumes!
# Use 'docker compose down' (without -v) to stop containers safely.
volumes:
  pgdata:
    labels:
      com.kortecx.description: "PostgreSQL data — all platform state"
      com.kortecx.backup: "required"
  qdrant_data:
    labels:
      com.kortecx.description: "Qdrant vector embeddings"
      com.kortecx.backup: "required"
  kortecx_data:
    labels:
      com.kortecx.description: "Local datasets, uploads, and generated assets"
      com.kortecx.backup: "required"
  mlflow_data:
    labels:
      com.kortecx.description: "MLflow tracking data, experiments, and artifacts"
      com.kortecx.backup: "required"
  executor_python:
    labels:
      com.kortecx.description: "Python executor workspace — sandboxed script execution"
  executor_ts:
    labels:
      com.kortecx.description: "TypeScript executor workspace — sandboxed script execution"
