[workspace]
resolver = "2"
members = ["kx-mote", "kx-content", "kx-journal", "kx-projection", "kx-llamacpp-sys", "kx-llamacpp", "kx-model-validator", "kx-warrant", "kx-tool-registry", "kx-context-assembler", "kx-memoizer", "kx-normalizer"]
exclude = ["kx-cloud"]

[workspace.package]
edition      = "2021"
rust-version = "1.94.0"
license      = "Apache-2.0"
authors      = ["kortecx contributors"]
repository   = "https://github.com/Kortecx/kortecx"

[workspace.dependencies]
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
thiserror          = "1"
bincode            = { version = "2", features = ["serde"] }
blake3             = "1"
bytes              = { version = "1", features = ["serde"] }
smallvec           = { version = "1", features = ["serde"] }
serde              = { version = "1", features = ["derive"] }
proptest           = "1"
tempfile           = "3"
rkyv               = "0.8"
rusqlite           = { version = "0.32", features = ["bundled"] }
kx-mote            = { path = "kx-mote" }
kx-content         = { path = "kx-content" }
kx-journal         = { path = "kx-journal" }
kx-projection      = { path = "kx-projection" }
kx-llamacpp-sys    = { path = "kx-llamacpp-sys" }
kx-llamacpp        = { path = "kx-llamacpp" }
kx-model-validator = { path = "kx-model-validator" }
kx-warrant         = { path = "kx-warrant" }
kx-tool-registry   = { path = "kx-tool-registry" }
kx-context-assembler = { path = "kx-context-assembler" }
kx-memoizer        = { path = "kx-memoizer" }
kx-normalizer      = { path = "kx-normalizer" }
bindgen            = "0.70"
cmake              = "0.1"
ureq               = { version = "2", default-features = false, features = ["tls"] }
sha2               = "0.10"

[profile.release]
strip         = "symbols"
debug         = false
lto           = "fat"
codegen-units = 1
incremental   = false
panic         = "abort"

[profile.dev]
incremental = false

[workspace.metadata.deb]
# Placeholder. Real cargo-deb packaging lands at P1.13 (kx-runtime binary).
# Convention noted here so future contributors find it in the expected place.
