# SPDX-License-Identifier: LicenseRef-Kortecx-Sustainable-Use-1.0
[package]
name         = "kx-connector-slack"
version      = "0.1.0"
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
authors      = { workspace = true }
repository   = { workspace = true }
description  = "kortecx bundled Slack MCP connector — a standalone MCP stdio server (initialize -> tools/list -> tools/call) exposing slack/{post_message,read_channel,search,list_channels}. Authenticates by-reference (D81): a Slack bot token (xoxb-) is injected out-of-band BY NAME (KX_SLACK_CREDENTIAL) and used INSIDE this process; the secret value never appears in a reply, a log, or the runtime. An external process the runtime DIALS via `kx connections add` — never linked into the gateway or the frozen trio (no kx-* dependency)."

[lib]
path = "src/lib.rs"

# The Slack MCP connector binary — a full initialize -> tools/list -> tools/call
# stdio server the runtime dials via `kx connections add --command kx-connector-slack`.
[[bin]]
name = "kx-connector-slack"
path = "src/main.rs"

[dependencies]
# JSON-RPC request/response + tool argument decoding (fail-closed).
serde      = { workspace = true }
# `raw_value` lets us keep `tools/call` arguments as opaque JSON (decoded per tool).
serde_json = { workspace = true, features = ["raw_value"] }
# Blocking HTTP to the Slack Web API (TLS; no json feature).
ureq       = { workspace = true }
# Typed connector errors (mapped to fail-closed JSON-RPC errors; never leak the token).
thiserror  = { workspace = true }

[dev-dependencies]
# The conformance harness (dials THIS bin through the real register_server path).
kx-extension-sdk = { path = "../../crates/kx-extension-sdk", version = "0.1.0" }

[lints]
workspace = true
