[package]
name = "kx-model-harness"
version = "0.1.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Real-model validation seam: runs an InferenceBackend-backed GGUF model through the kx-runtime orchestrator (via run_with_seams) to prove the runtime guarantees hold under a non-deterministic model."

[dependencies]
kx-mote.workspace = true
kx-content.workspace = true
kx-journal.workspace = true
kx-projection.workspace = true
kx-executor.workspace = true
kx-capability.workspace = true
kx-warrant.workspace = true
# The model-proposed tool-call authority gate (IMP-5) — EXTRACTED to a pure leaf
# in PR-2d-1 so gateway + coordinator share the one gate; re-exported below as
# `toolcall` so every harness call site is unchanged.
kx-toolcall.workspace = true
# The harness is the only crate that constructs the concrete in-process
# `LlamaInferenceBackend`, so it opts back into the FFI (the workspace default is
# `default-features = false` / no llama.cpp, to keep `cargo install kx-runtime`
# toolchain-free). This is what keeps `cargo {build,test} --workspace` exercising
# the real model path.
kx-inference = { workspace = true, features = ["llamacpp"] }
kx-context-assembler.workspace = true
kx-tool-registry.workspace = true
kx-memoizer.workspace = true
kx-runtime.workspace = true
kx-workflow.workspace = true
# M6: the planner — lower a committed plan FACT into a registered Mote DAG. The
# model-runs-once + read-the-plan-back wiring lives HERE (the harness), keeping
# kx-planner a pure lowering lib with no projection/inference coupling.
kx-planner.workspace = true
# M-agent: register the campaign model's descriptor + ProvidedCapabilities and
# type-check it against the kortecx agent's RequiredCapabilities (Apache-2.0,
# Text, native tool-calling). Both are FFI-free leaves.
kx-model-store.workspace = true
kx-model-validator.workspace = true
kx-dataset.workspace = true
# RC4c: hybrid RAG (BM25 sparse leg) + the LLM-rerank grammar carrier. Both are
# FFI-free leaves; the BM25 edge gives the harness the same hybrid retrieval the
# live serve `HostDatasetView` already runs (`query_corpus_hybrid`).
kx-dataset-bm25.workspace = true
kx-grammar.workspace = true
kx-critic-types.workspace = true
kx-capture.workspace = true
blake3.workspace = true
smallvec.workspace = true
serde.workspace = true
thiserror.workspace = true
# `raw_value` carries a model-proposed tool call's args verbatim (opaque bytes,
# never a dynamic `Value`/floats) in `toolcall::parse_tool_call` (M5.2, IMP-5).
serde_json = { workspace = true, features = ["raw_value"] }
tracing.workspace = true

[build-dependencies]
ureq.workspace = true
sha2.workspace = true

[dev-dependencies]
tempfile.workspace = true
# Canonical-bincode staging of a planner-produced TopologyDecision / WarrantSpec
# in the M6 replan e2e (same content-addressing the materializer decodes).
bincode.workspace = true
# The deterministic-critic evaluator — used by tests to independently re-derive a
# verdict over a producer's bytes and confirm byte-identity with the committed one.
kx-critic.workspace = true
# M5.2: the concrete McpCapability + StdioTransport the model-driven-tool-step tests
# register on a LocalCapabilityBroker. A DEV-dependency only — the harness lib stays
# decoupled from the MCP client (it routes through `dyn CapabilityBroker`).
kx-mcp.workspace = true
# RC4c: the second inference engine for the gated dual-engine `rerank_live` e2e
# (Ollama ∥ llama.cpp, GR24). A DEV-dependency only — the harness lib uses the
# `dyn InferenceBackend` seam, never the concrete Ollama backend.
kx-ollama.workspace = true

[features]
# Gates the GGUF download (build.rs) + the real-model integration tests. Off by
# default so `cargo test --workspace` stays network-free and green; the campaign
# runs `--features with-model`.
with-model = []

[lints]
workspace = true

[[bin]]
name = "kx-model-harness"
path = "src/bin/harness.rs"
