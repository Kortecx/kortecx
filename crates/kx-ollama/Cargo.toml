# SPDX-License-Identifier: Apache-2.0
[package]
name         = "kx-ollama"
version      = "0.1.0"
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
authors      = { workspace = true }
repository   = { workspace = true }
description  = "kortecx Ollama inference backend — an out-of-process, FFI-FREE InferenceBackend over the Ollama REST API (ureq). Implements the same kx-inference seam as the in-process llama.cpp backend WITHOUT a C++ toolchain, so a toolchain-free install can serve local models by talking to a running Ollama daemon (loopback by default; non-loopback is operator opt-in, SN-8). Carries NO journal / gateway / frozen-trio dependency (the dep_wall pins it FFI-free)."

[lib]
path = "src/lib.rs"

[dependencies]
# The model-serving seam + its public types. Pulled FFI-FREE: the workspace root
# sets `kx-inference = { default-features = false }`, so this edge carries the
# `InferenceBackend`/`EmbeddingBackend` traits + types WITHOUT the `llamacpp`
# feature (no kx-llamacpp, no C++). The `tests/dep_wall.rs` pins that.
kx-inference = { workspace = true }
# `ContentRef` + `sniff_image_format` (PR-B2 vision): the Multimodal arm fetches an
# image `content_ref`'s bytes (via the ungated `kx_inference::ContentFetcher` seam)
# and sniffs the format BEFORE egress. An FFI-free leaf already in the tree via the
# kx-inference edge; `tests/dep_wall.rs` keeps the whole crate FFI-free.
kx-content   = { workspace = true }
# `ModelId` (the dispatch route identity) + `WarrantSpec` (the model-route /
# ceiling the backend enforces, SN-8 / D35). Both FFI-free leaves.
kx-mote      = { workspace = true }
kx-warrant   = { workspace = true }
# RC4c: parse the off-digest grammar carrier (`GrammarSpec`) so a listwise-rerank
# turn applies its permutation schema as a strict whole-response Ollama `format`
# (the one constrained-output case that does NOT need a lazy/triggered mode — a
# rerank turn's entire output is the permutation). An FFI-free pure-string leaf.
kx-grammar   = { workspace = true }
# The blocking HTTP client (already a workspace dependency — no new top-level dep,
# no deny.toml change). `tls` is on for a future `https://` operator URL; the
# loopback default dials plaintext `http://127.0.0.1`.
ureq         = { workspace = true }
# Base64-encode an image's bytes for the Ollama `/api/generate` `images` array
# (PR-B2 vision). Already in the lock at `0.22.1` (a transitive dep) ⇒ Cargo.lock
# edge-only, no `deny.toml` change. FFI-free.
base64       = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }

[lints]
workspace = true
