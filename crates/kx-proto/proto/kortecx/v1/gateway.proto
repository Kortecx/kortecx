syntax = "proto3";

// ===========================================================================
// kortecx M8 / D120 — the external `KxGateway` contract (FROZEN).
//
// This is a SECOND, DISTINCT service from `Coordinator` (coordinator.proto is
// the internal coordinator/worker plane and stays byte-unchanged). KxGateway is
// the client-facing surface: render-a-run-as-a-DAG reads, fetch-a-committed-
// result reads, a resumable event cursor, and a propose-proxy submit path. It
// is realized by `kx-gateway-core` as a READ-FOLD (journal -> ProjectionView)
// + PROPOSE-PROXY (SubmitRun -> coordinator RegisterRun/SubmitMote). The
// gateway adds NO new journal write path.
//
// IDENTITY INVARIANT (load-bearing, same as coordinator.proto). Every MoteId /
// content ref / instance_id is computed Rust-side by the runtime. ProjectionView
// and MoteSnapshot are SERVER-DERIVED from the journal fold — the client NEVER
// computes a MoteId (SN-8 / D70). Protobuf carries field VALUES only.
//
// Every enum carries an explicit *_UNSPECIFIED = 0 sentinel; domain
// discriminants are +1-shifted; the Rust TryFrom boundary REJECTS UNSPECIFIED.
// 32-byte hashes are `bytes` validated length==32 Rust-side; instance_id is 16B.
//
// EVOLUTION (D120.6): additive only — new RPCs / optional fields / new `oneof`
// variants (proto3 unknown-field skipping). The external gateway proto version
// is SEPARATE from the journal-entry schema version (D107 is a journal concern).
// ===========================================================================

package kortecx.v1;

// Reuse the value messages + enums already pinned by the coordinator contract
// (Mote / MoteDef / WarrantSpec / ParentRef / NdClass / EdgeKind). The include
// root is `proto/` (build.rs), so the import path is rooted there.
import "kortecx/v1/coordinator.proto";

// ---------------------------------------------------------------------------
// Gateway-side enums (mirror the kx_projection read-model enums; +1-shifted)
// ---------------------------------------------------------------------------

// Mirrors kx_projection::MoteState.
enum MoteSnapshotState {
  MOTE_SNAPSHOT_STATE_UNSPECIFIED = 0;
  MOTE_SNAPSHOT_STATE_PENDING = 1;       // declared; no journal entry yet
  MOTE_SNAPSHOT_STATE_SCHEDULED = 2;     // Proposed; not yet Committed/Failed
  MOTE_SNAPSHOT_STATE_COMMITTED = 3;     // durable fact, not repudiated
  MOTE_SNAPSHOT_STATE_FAILED = 4;        // terminal failure
  MOTE_SNAPSHOT_STATE_REPUDIATED = 5;    // Committed then repudiated
  MOTE_SNAPSHOT_STATE_INCONSISTENT = 6;  // cell-8 anomaly
}

// Mirrors kx_projection::PromotionState (P1 read API stub = NOT_APPLICABLE).
enum PromotionState {
  PROMOTION_STATE_UNSPECIFIED = 0;
  PROMOTION_STATE_NOT_APPLICABLE = 1;
  PROMOTION_STATE_UNPROMOTED = 2;
  PROMOTION_STATE_PROMOTED = 3;
}

// Mirrors kx_projection::AnomalyKind.
enum MoteAnomaly {
  MOTE_ANOMALY_UNSPECIFIED = 0;
  MOTE_ANOMALY_EFFECT_STAGED_THEN_REPUDIATED_NO_COMMITTED = 1;
  MOTE_ANOMALY_QUARANTINED_AT_LEAST_ONCE_EFFECT = 2;
}

// ---------------------------------------------------------------------------
// SubmitRun — propose-proxy (RegisterRun + N x SubmitMote). Returns ONLY after
// the journaled instance_id (never acks ahead of the journal). D120.1.
// ---------------------------------------------------------------------------

message SubmitRunRequest {
  bytes recipe_fingerprint = 1;          // 32B — recipe def/content hash (discovery/dedup only; NEVER identity)
  repeated SubmitMoteSpec motes = 2;     // the run's Motes to admit under the registered instance
}

// One Mote to admit, mirrors SubmitMoteRequest (coordinator.proto). `mote_id`
// inside `mote` is advisory only; the coordinator re-derives identity Rust-side.
//
// `react_seed` (PR-2d-1, additive, default-false): mark this Mote as the SEED of
// a live ReAct chain. The coordinator swaps in a RUN-SALTED turn-0 Mote built
// from the seed's prompt + warrant + model route (the salt is the server-assigned
// `instance_id`, unknowable client-side — SN-8: no client-controlled identity)
// and anchors a durable `ReactRound` fact. A wire/admission flag ONLY — it never
// enters `MoteId`/any digest; old clients send `false` and behave byte-
// identically (the `accept_at_least_once` precedent).
message SubmitMoteSpec {
  Mote mote = 1;
  WarrantSpec warrant = 2;
  bool accept_at_least_once = 3;
  bool react_seed = 4;
}

message RunHandle {
  bytes instance_id = 1;                 // 16B — coordinator-assigned, journaled
  bytes recipe_fingerprint = 2;          // 32B — echoed for client-side discovery/dedup
  // (additive, mirrors InvokeResponse.react_chain_salt): the per-run key of a
  // tool-granted (agentic) MODEL step, so a client on serve's shared journal can scope
  // ListReactTurns / the answer poll to THIS submission's chain. A `SubmitWorkflow` /
  // `RunApp` bound recipe with EXACTLY ONE agentic step (a MODEL Mote whose server-built
  // warrant has non-empty tool_grants) reports that step's server-derived MoteId — which
  // the coordinator uses verbatim as the chain's `step_salt` (state.rs: `step_salt =
  // *launch_id.as_bytes()`). EMPTY (0 bytes) when there is no agentic step, or more than
  // one (ambiguous — the client falls back to instance_id-only scoping, like an old
  // server). Never client-supplied (SN-8).
  bytes react_chain_salt = 3;            // 32B — the agentic-step chain key; EMPTY if none / ambiguous
  // (additive, mirrors InvokeResponse.terminal_mote_id): the bound recipe's TERMINAL
  // (sink) Mote — the one whose committed result is the run's output. Server-derived from
  // the binder (SN-8); never client-supplied.
  //
  // WHY THIS EXISTS SEPARATELY FROM `react_chain_salt`. Both identify a Mote in THIS
  // submission, but they answer different questions and must not be conflated. The salt is
  // a ReAct CHAIN KEY: a client that sees it non-empty takes the react settle path and
  // polls `ListReactTurns` with it as `step_salt`, so it is EMPTY by design for anything
  // that is not exactly one tool-granted agentic step. This field is a RUN ANCHOR: it is
  // populated for EVERY shape — a plain single-agent App, a multi-step DAG, a pure
  // pipeline — which is what a client needs to scope a shared journal's projection down to
  // one run. Widening the salt's predicate to cover those shapes would send a plain DAG
  // down the react poll and hang it; adding a field costs nothing and says what it means.
  //
  // EMPTY (0 bytes) from an older server, in which case a client must say it cannot scope
  // rather than silently presenting the whole journal as the run.
  bytes terminal_mote_id = 4;            // 32B — the run's sink Mote; the scope anchor
}

// ---------------------------------------------------------------------------
// Invoke — bind a PUBLISHED recipe by handle to args and run it (R2 / D121).
// Additive RPC (D120.6). The caller's party is SERVER-DERIVED from the auth
// interceptor (there is NO party/principal field on the wire — SN-8). The
// gateway resolves handle+args under the party's authoritative Use warrant via
// the host's recipe binder (kx-invoke: resolve→validate→bind→intersect), then
// register-then-submits through the SAME propose-proxy as SubmitRun (no new
// journal write path).
//
// A run is keyed by recipe identity (RegisterRun dedups by recipe_fingerprint),
// so every invocation of the SAME recipe joins ONE run instance; distinct args
// yield distinct Motes WITHIN it (exactly-once-per-input). Invoke therefore
// returns the SERVER-DERIVED `terminal_mote_id` (never client-supplied — SN-8)
// so the caller knows which committed Mote in the run is THIS invocation's
// output: poll GetProjection on instance_id, find terminal_mote_id, then
// GetContent on its result_ref.
// ---------------------------------------------------------------------------

message InvokeRequest {
  string handle = 1;                     // "namespace/collection/name" recipe handle (AssetPath)
  bytes  args   = 2;                     // opaque JSON object bytes; validated server-side, fail-closed
  repeated string context_bundles = 3;   // PR-7: AssetPath handles of context bundles to attach (identity-bearing); empty = byte-identical to pre-PR-7
  repeated string context_refs = 4;      // D155 Phase-3: raw 64-hex content-store refs attached directly as context items (no bundles.db); identity-bearing; empty = byte-identical
}

message InvokeResponse {
  bytes instance_id = 1;                 // 16B — the run this invocation joined (coordinator-assigned)
  bytes recipe_fingerprint = 2;          // 32B — the resolved recipe identity
  bytes terminal_mote_id = 3;            // 32B — SERVER-DERIVED sink Mote; its committed result is THIS invocation's output
  // PR-R1 (additive): the per-invocation ReAct chain key for a react Invoke. A live
  // `kx serve` shares ONE journal/instance_id across every Invoke, so the chain key
  // (= the bound react seed Mote's id, server-derived from the bound args — SN-8)
  // scopes ListReactTurns/the answer poll to THIS invocation's chain. Empty (0 bytes)
  // for a non-react Invoke. An old client ignores it; a new client reads "" from an
  // old server (D120.6) and falls back to instance_id-only scoping.
  bytes react_chain_salt = 4;            // 32B — the react chain key; EMPTY for a non-react Invoke
}

// ---------------------------------------------------------------------------
// GetProjection — the "render my run as a DAG" READ query (missing today).
// All fields server-derived from the kx-projection fold. D120.2.
// ---------------------------------------------------------------------------

message GetProjectionRequest {
  bytes instance_id = 1;                 // 16B — the run to render (ownership ticket)
  optional uint64 at_seq = 2;            // fold up to and including this seq; absent = current head (clamped <= head)
}

message ProjectionView {
  bytes instance_id = 1;                 // 16B
  bytes recipe_fingerprint = 2;          // 32B
  uint64 current_seq = 3;                // the fold frontier this view reflects
  repeated MoteSnapshot motes = 4;       // all fields server-derived from the fold
}

message MoteSnapshot {
  bytes mote_id = 1;                     // 32B — SERVER-DERIVED (never client-supplied)
  MoteSnapshotState state = 2;
  NdClass nd_class = 3;                  // reuses coordinator.proto NdClass
  PromotionState promotion = 4;
  optional bytes result_ref = 5;         // 32B when committed
  optional bytes warrant_ref = 6;        // 32B — a REFERENCE only (never the warrant body / secret material)
  bytes mote_def_hash = 7;              // 32B
  optional uint64 committed_seq = 8;     // present iff committed
  repeated ParentRef parents = 9;        // reuses coordinator.proto ParentRef
  optional bytes verdict = 10;           // OPAQUE committed CriticVerdict bytes (never deserialized server-side); absent if none
  optional MoteAnomaly anomaly = 11;
}

// ---------------------------------------------------------------------------
// GetContent — fetch a committed result. instance_id = ownership ticket; the
// run's committed result_refs are the authorized set. Uniform "not authorized"
// (no existence oracle). D120.1.
//
// Batch A (D120.6): an EMPTY (zero-length) instance_id selects the UPLOADS
// scope — the caller-uploaded refs recorded by PutContent. Additive-safe: a
// zero-length instance_id was a hard invalid_argument since the freeze, so no
// conforming request changes behavior; 16-byte tickets take the old path
// byte-identically. The uploads authorized set lives in an off-journal sidecar,
// never the projection fold.
// ---------------------------------------------------------------------------

message GetContentRequest {
  bytes content_ref = 1;                 // 32B
  bytes instance_id = 2;                 // 16B — ownership ticket; EMPTY = uploads scope (Batch A)
}

message ContentBlob {
  bytes payload = 1;                     // raw bytes from the content store
}

// ---------------------------------------------------------------------------
// StreamEvents — resumable cursor (since_seq -> next_seq). Bounded queue; slow
// consumers resume from last ack (CatchupRequired); never ack ahead of the
// journal head. Deltas = Committed/Failed/Repudiated/EffectStaged. D120.3.
// ---------------------------------------------------------------------------

message StreamEventsRequest {
  bytes instance_id = 1;                 // 16B — the run to stream
  uint64 since_seq = 2;                  // resume cursor (0 = from start)
}

message EventFrame {
  uint64 seq = 1;                        // seq of the highest delta in this frame
  repeated EventDelta deltas = 2;
  uint64 next_seq = 3;                   // cursor to resume from (never > journal head)
  bool journal_boundary = 4;             // true when the frame reached the current head (caught up)
}

message EventDelta {
  uint64 seq = 1;
  oneof kind {
    CommittedDelta committed = 2;
    FailedDelta failed = 3;
    RepudiatedDelta repudiated = 4;
    EffectStagedDelta effect_staged = 5;
  }
}

message CommittedDelta {
  bytes mote_id = 1;                     // 32B
  bytes result_ref = 2;                  // 32B
  NdClass nd_class = 3;
}

message FailedDelta {
  bytes mote_id = 1;                     // 32B
  uint32 reason_class = 2;               // opaque-numeric (kx_journal::FailureReason discriminant)
}

message RepudiatedDelta {
  bytes target_mote_id = 1;              // 32B
  uint64 target_committed_seq = 2;
}

message EffectStagedDelta {
  bytes mote_id = 1;                     // 32B
}

// ---------------------------------------------------------------------------
// M7 catalog signature RPCs — STUBBED at the D120 freeze (the wire shape is
// frozen now; gateway-core returns UNIMPLEMENTED until the catalog read path
// is wired). D120.1.
// ---------------------------------------------------------------------------

message ListSignaturesRequest {}
message SignatureSummary {
  bytes signature_id = 1;                // 32B TaskSignatureHash
  string name = 2;
}
message ListSignaturesResponse {
  repeated SignatureSummary signatures = 1;
}
message GetSignatureRequest {
  bytes signature_id = 1;                // 32B
}
message GetSignatureResponse {
  bytes signature_id = 1;                // 32B
  bytes manifest = 2;                    // opaque encoded signature entry
}
message RegisterSignatureRequest {
  bytes manifest = 1;                    // opaque encoded signature entry
}
message RegisterSignatureResponse {
  bytes signature_id = 1;                // 32B
}

// ---------------------------------------------------------------------------
// UI-2 — run enumeration (the operational "list my runs" query). Additive RPC
// (D120.6). Folds the journal's RunRegistered facts into per-run identity +
// wall-clock — server-derived (the client never enumerates the journal). The
// registered timestamp is AUDIT-ONLY (excluded from every hash, kx-journal),
// so it is a legitimate observability field, NOT identity.
//
// SCOPE (single-node OSS): operator-global — the OSS journal records no party
// on RunRegistered, so this lists every run on the node (one operator, behind
// deny-all/bearer auth). CLOUD party-scopes this in the gateway-auth layer.
//
// Paginated newest-first: `before_seq` is the resume cursor (return runs whose
// registered_seq < before_seq); `limit` clamps the page (server caps it).
// ---------------------------------------------------------------------------

message ListRunsRequest {
  optional uint32 limit = 1;             // page size; server clamps to a max (absent = the default page)
  optional uint64 before_seq = 2;        // cursor: only runs registered strictly before this seq (absent = newest)
}
message RunSummary {
  bytes instance_id = 1;                 // 16B — the registered run id
  bytes recipe_fingerprint = 2;          // 32B — the recipe this run was registered for
  uint64 registered_seq = 3;             // seq of the RunRegistered fact (ordering + the pagination cursor)
  uint64 registered_unix_ms = 4;         // RunRegistered wall-clock (audit-only; off every hash)
}
message ListRunsResponse {
  repeated RunSummary runs = 1;          // newest-first (descending registered_seq)
  bool has_more = 2;                     // a further page exists before the last returned run
}

// ---------------------------------------------------------------------------
// PR-D — "Re-run with changes" / "Fork & re-run". Additive (D120.6).
//
// The Invoke args submitted with a run are captured into an OFF-JOURNAL,
// OFF-DIGEST sidecar (the feedback.db/uploads.db posture: rebuildable-to-EMPTY,
// principal server-resolved audit-only, NO read-time party filter — the
// kx-cloud SN-8 wall enforces tenancy above). GetRunInputs reads them back so a
// run recovered from ListRuns (no client-side localStorage) can pre-fill its
// recipe form and be re-invoked with edits. The args never become committed
// facts ⇒ the canonical projection digest is invariant by construction.
//
// Degrade: a serve without the sidecar wired returns UNIMPLEMENTED; a run with
// nothing captured (pre-PR-D, or a rebuilt-to-empty sidecar) returns NOT_FOUND.
// A re-run is just a new Invoke(handle, edited_args) — same admission, NEVER
// SubmitRun (the standing client-warrant finding).
// ---------------------------------------------------------------------------
message GetRunInputsRequest {
  bytes instance_id = 1;                 // 16B — the run whose captured Invoke args to read
}
message GetRunInputsResponse {
  bytes instance_id = 1;                 // 16B — echoed
  bytes recipe_fingerprint = 2;          // 32B — the recipe the run registered under (advisory)
  string handle = 3;                     // the Invoke handle (so GetRecipeForm can re-render the form)
  bytes args = 4;                        // opaque JSON object bytes — the captured Invoke args (off-digest, off-identity)
}

// ---------------------------------------------------------------------------
// UI-2 — recipe discovery (the "what can I run, and with what inputs" query).
// Additive RPCs (D120.6). DISTINCT from the signature catalog (ListSignatures
// is the TaskSignature/verdict-reuse registry); these enumerate the INVOCABLE
// recipe handles the gateway provisions and describe each recipe's free-param
// FORM so a client can render an input form, then Invoke(handle, args).
//
// A PUBLIC discovery surface (like the signature catalog) — honest codes (an
// unknown handle is not_found), no party secret (the free-param schema is
// public contract). Invoke remains the authorization gate (uniform refusal).
// ---------------------------------------------------------------------------

message ListRecipesRequest {}
message RecipeSummary {
  string handle = 1;                     // "namespace/collection/name" — the Invoke handle (AssetPath)
  bytes recipe_fingerprint = 2;          // PR-2.1 additive (D120.6): the published workflow fingerprint a bound run registers under (RunSummary.recipe_fingerprint joins on this) — display/join only, NEVER identity; empty when unknown
  // PR-4 Batch D additive (D120.6): ADVISORY metadata for discovery/display ONLY
  // (kx-catalog AdvisoryMetadataStore + VersionLedger) — NEVER identity, NEVER an
  // authorization. Empty when unknown. Invoke remains the sole authorization gate.
  string description = 3;                // free-form human text; NEVER parsed for enforcement
  repeated string tags = 4;             // advisory discovery tags (sorted, deduplicated)
  string version = 5;                   // advisory published version label (VersionLedger); empty when unversioned
}
message ListRecipesResponse {
  repeated RecipeSummary recipes = 1;    // the provisioned, invocable recipe handles
}

// Mirrors kx_tool_registry::ParamType (the free-param value domain). +1-shifted
// with a 0 sentinel; the Rust boundary maps UNSPECIFIED → an untyped field.
// NOTE: there is deliberately no Float (no float ever reaches an action schema)
// and no Json variant.
enum RecipeParamType {
  RECIPE_PARAM_TYPE_UNSPECIFIED = 0;
  RECIPE_PARAM_TYPE_STR = 1;             // ParamType::Str { max_len }
  RECIPE_PARAM_TYPE_INT = 2;             // ParamType::Int { .. }
  RECIPE_PARAM_TYPE_BOOL = 3;            // ParamType::Bool
  RECIPE_PARAM_TYPE_BYTES = 4;           // ParamType::Bytes { max_len }
  RECIPE_PARAM_TYPE_ENUM = 5;            // ParamType::Enum { allowed }
}

message GetRecipeFormRequest {
  string handle = 1;                     // the recipe to describe
}
// One free-param the caller must supply (only VARIABLE slots; constants are
// fixed by the recipe body and never surfaced).
message RecipeFormField {
  string name = 1;                       // the JSON arg key (the slot name)
  RecipeParamType type = 2;              // the value domain (UNSPECIFIED when the slot is untyped)
  bool required = 3;                     // a variable slot is required
  optional uint64 max_len = 4;           // for STR / BYTES
  repeated string allowed = 5;           // for ENUM (the permitted values)
}
message GetRecipeFormResponse {
  string handle = 1;                     // echoed
  repeated RecipeFormField fields = 2;   // the variable free-params, in canonical (name) order
}

// ---------------------------------------------------------------------------
// PR-4 Batch D — SearchRecipes: ADVISORY recipe discovery over the kx-catalog
// DiscoveryIndex (fuzzy-in/exact-out) + AdvisoryMetadataStore. Additive RPC
// (D120.6). SN-8: score_bp is DISPLAY-ONLY (integer basis points, never a float,
// never a committed fact, never an authorization) — a search can SURFACE a
// recipe, never invoke one. Invoke stays the sole authorization gate. An old
// gateway without the seam returns UNIMPLEMENTED.
// ---------------------------------------------------------------------------
message SearchRecipesRequest {
  string intent = 1;                     // the free-text task intent (size-capped; validated fail-closed)
  repeated string keywords = 2;          // optional normalized keyword filters (count/size-capped)
  optional uint32 limit = 3;             // cap on returned results (server-clamped); absent ⇒ server default
}
// One recipe's advisory rank against the intent, in integer basis points (floats
// never cross this wire — the SN-8 no-persisted-confidence rule): exact handle =
// 10000 > path-prefix > tag-match > fuzzy; absent string rungs alone decide.
message ScoredRecipe {
  RecipeSummary recipe = 1;              // the matched recipe (with advisory metadata)
  uint32 score_bp = 2;                   // 0..=10000 basis points (display-only; never authorizes)
}
message SearchRecipesResponse {
  repeated ScoredRecipe ranked = 1;      // best-first (deterministic tiebreak); capped by request limit
}

// ---------------------------------------------------------------------------
// UI-3 — teams (kx_fleet MembershipLedger) + sharing (kx_catalog GrantLedger)
// READ-ONLY viewers. Additive RPCs (D120.6). TWO SEPARATE TRUTHS, both
// off-journal + off-digest: teams = who-is-in-a-team, grants = who-can-do-what
// on an asset. Every field is a HUMAN-READABLE DISPLAY PROJECTION (string /
// repeated-string), server-derived from the fail-closed folds — NEVER identity,
// NEVER a warrant body/secret (the warrant_ref-is-a-reference rule). A None seam
// ⇒ UNIMPLEMENTED (old-gateway forward-compat degrade); an unknown team/asset ⇒
// not_found (a public viewer surface, honest codes — like the recipe catalog).
//
// SCOPE (single-node OSS): operator-global VIEW. MANAGING (found/admit/remove,
// grant/revoke), cross-party delegation + multi-tenant OIDC identity = CLOUD
// (D129). The OSS gateway seeds one demo team (the --auth-token parties) so the
// viewer is populated out-of-the-box.
// ---------------------------------------------------------------------------

message ListTeamsRequest {}
message TeamSummary {
  string team_id      = 1;               // the team's group PartyId (the principal grants are issued to)
  string display_name = 2;               // advisory human handle from the founding fact (NEVER parsed)
  string owner        = 3;               // the founding owner PartyId
  uint32 member_count = 4;               // count of effective (authority-checked) active members
}
message ListTeamsResponse {
  repeated TeamSummary teams = 1;        // founding (append) order
}

message ListTeamMembersRequest {
  string team_id            = 1;
  optional string asset_ref = 2;         // when set, populate resolved_warrant per member (resolve-member-warrant)
}
// A compact, human-readable warrant projection — NEVER the warrant body or any
// secret material; the load-bearing ceilings + scopes a member's resolved warrant
// conveys, pre-rendered as display strings/scalars (mirrors the `kx` CLI render).
message WarrantView {
  string executor_class = 1;             // e.g. "Bwrap" / "MacOsSandbox"
  string model_route    = 2;             // "model_id ×max_calls (in/out tok)" one-liner
  string net_scope      = 3;             // "None" / "EgressAllowlist(host:port,…)"
  string fs_scope       = 4;             // a "/path:ro, …" summary
  uint64 max_calls      = 5;             // model_route.max_calls (the headline narrowing axis)
  uint64 cpu_milli      = 6;             // resource_ceiling.cpu_milli
  uint64 wall_clock_ms  = 7;             // resource_ceiling.wall_clock_ms
}
message TeamMember {
  string party                = 1;       // the member PartyId
  string role                 = 2;       // the merged runtime-scope role NAME (advisory display)
  repeated string action_caps = 3;       // the merged catalog action cap, e.g. ["Read","Use","Delegate"]
  optional WarrantView resolved_warrant = 4; // present iff asset_ref set AND a membership path resolves
}
message ListTeamMembersResponse {
  string owner               = 1;        // the team owner (so the UI marks the owner row)
  repeated TeamMember members = 2;       // by member PartyId (deterministic)
}

message ListAssetGrantsRequest {
  string asset_ref = 1;                  // "namespace/collection/name" (AssetPath handle)
}
message GrantView {
  string grantor          = 1;
  string grantee          = 2;
  repeated string actions = 3;           // e.g. ["Read","Use"]
  string runtime_scope    = 4;           // the grant role NAME (advisory display)
  bool is_root            = 5;           // true iff grant.prior is None (a root grant from the owner)
  bool revoked            = 6;           // true iff an AUTHORIZED revocation makes it inert in the fold
}
message ListAssetGrantsResponse {
  string owner            = 1;           // the asset's bound owner ("" if unbound / unknown)
  repeated GrantView grants = 2;         // every grant fact on the asset (root + delegated), fold-classified
}

// ---------------------------------------------------------------------------
// T3.7 — the Datasets data-plane (RAG). Additive RPCs (D120.6). A dataset is a
// named retrieval corpus held in the gateway's catalog dir: content-addressed
// document bytes in the durable content store + a flat-LE (ContentRef,vector)
// cache rebuilt into an HNSW graph on open (kx-dataset-hnsw, off the default
// path / SN-8). FORWARD-COMPATIBLE embedding: every ingest document carries
// `content` bytes ALWAYS + an OPTIONAL client-computed `embedding`; a query
// carries `query_text` OR `query_embedding`. The client-vector path runs
// FFI-FREE (gateway `hnsw` feature) — the exact seam an external embedder
// (HuggingFace transformers in the Py/TS SDK, transformers.js in the browser)
// plugs into with no runtime change. The server-embed path (text only) needs
// the `inference` feature + a wired EmbeddingBackend, else FAILED_PRECONDITION.
//
// SN-8 (load-bearing): the similarity `score` here is DISPLAY-ONLY. It never
// enters a committed fact or a MoteId; only the ordered content-ref SET is the
// durable retrieval result (kx_workflow::retrieval_result_ref), matched
// downstream by EXACT hash. A client MUST NOT route identity through `score`.
// A None DatasetView seam ⇒ UNIMPLEMENTED (old-gateway forward-compat degrade);
// an unknown dataset ⇒ not_found (a public viewer surface, honest codes).
//
// SCOPE (single-node OSS): operator-global, like the teams/grants viewers. The
// document id is SERVER-DERIVED (the content-addressed ref) — an advisory
// client `doc_id` is never the identity. Per-party dataset isolation is CLOUD
// (D129).
// ---------------------------------------------------------------------------

// RC4a — the retrieval strategy for QueryDataset / FuzzyDiscovery. UNSPECIFIED ⇒
// the server-configured default (operator-authoritative), NOT an error (unlike the
// identity enums). HYBRID silently falls back to dense when there is no query_text
// (the FFI-free client-vector path has no text to BM25-match). The hybrid weights
// (RRF k, MMR lambda) are operator-config only — never a client float (SN-8).
enum RetrievalMode {
  RETRIEVAL_MODE_UNSPECIFIED = 0;        // use the server-configured default
  RETRIEVAL_MODE_DENSE       = 1;        // dense (embedding) ANN only — reproducible
  RETRIEVAL_MODE_HYBRID      = 2;        // BM25 + dense, RRF-fused (+ operator MMR rerank)
}

message ListDatasetsRequest {}
message DatasetSummary {
  string dataset_id = 1;                 // the dataset's stable host name (server-validated, not a hash)
  string name       = 2;                 // advisory human handle (today == dataset_id)
  uint64 doc_count  = 3;                 // distinct PARENT documents (RC4a: not chunks — see chunk_count)
  uint32 dim        = 4;                 // embedding dimension (0 until the first insert fixes it)
  int64  created_ms = 5;                 // unix-ms create time (display only; off every hash)
  bool   chunked                 = 6;    // RC4a: ingested under the chunking pipeline (hits are passages, not whole docs)
  string embed_model_fingerprint = 7;    // RC4a: hex of the index fingerprint (embed model/pooling/dim/chunk/tokenizer); "" = legacy/unstamped
  uint32 index_version           = 8;    // RC4a: on-disk retrieval-index schema version (cold-index / compat guard)
  uint64 chunk_count             = 9;    // RC4a: distinct retrievable chunks (== doc_count for legacy/un-chunked corpora)
}
message ListDatasetsResponse {
  repeated DatasetSummary datasets = 1;  // deterministic (name) order
}

message IngestDocument {
  bytes  content              = 1;       // the retrievable payload (ALWAYS present)
  repeated float embedding    = 2;       // OPTIONAL client-computed vector; empty ⇒ server-embed (needs `inference`)
  // RESERVED (forward-compat): accepted on the wire but NOT YET persisted or
  // returned. The durable id is ALWAYS the server-derived content hash (SN-8), so a
  // client `doc_id` is advisory only; per-document metadata is a planned CLOUD add.
  optional string doc_id      = 3;
  map<string,string> metadata = 4;
}
message IngestDocumentsRequest {
  string dataset            = 1;         // dataset NAME (created on first ingest)
  repeated IngestDocument documents = 2;
}
message IngestDocumentsResponse {
  string dataset_id = 1;                 // the validated dataset name
  uint64 doc_count  = 2;                 // total distinct docs in the dataset AFTER this ingest
  uint64 inserted   = 3;                 // NEW distinct docs added by this call (post content-addressed dedup)
  uint32 dim        = 4;                 // the dataset's embedding dimension
}

message QueryDatasetRequest {
  string dataset                 = 1;
  string query_text              = 2;    // server-embed path (needs `inference` + an embedder)
  repeated float query_embedding = 3;    // client-vector path (FFI-free); takes precedence when non-empty
  uint32 k                       = 4;    // top-k (server-clamped to a sane max)
  RetrievalMode retrieval_mode   = 5;    // RC4a: UNSPECIFIED ⇒ server default; HYBRID needs query_text (else falls back to dense)
  optional bool rerank           = 6;    // RC4c: per-query MMR diversity-rerank override; absent ⇒ server default (KX_SERVE_RAG_RERANK)
}
message DatasetHit {
  bytes content_ref = 1;                 // 32B content-addressed id of the retrieved CHUNK (RC4a: a chunk, not the whole doc)
  bytes content     = 2;                 // the chunk payload bytes (so a UI can show the snippet)
  float score       = 3;                 // SN-8: DISPLAY-ONLY similarity; NEVER an identity input
  bytes  parent_ref  = 4;                // RC4a: 32B content-addressed id of the PARENT document (== content_ref for legacy/un-chunked)
  uint32 chunk_index = 5;                // RC4a: 0-based ordinal of this chunk within the parent (display/ordering)
  uint32 chunk_count = 6;                // RC4a: total chunks in the parent (display)
}
message QueryDatasetResponse {
  repeated DatasetHit hits = 1;          // ordered: score desc, then ascending ref (deterministic)
}

// ---------------------------------------------------------------------------
// Slice-B (D151) — FuzzyDiscovery: ADVISORY fuzzy-in / exact-out retrieval over
// a dataset's RetrievalIndex. Additive RPC (D120.6). Unlike QueryDataset (which
// echoes content bytes + a float score for the inline RAG path), this returns
// ONLY content-addressed refs + a DISPLAY-ONLY integer basis-point score — the
// caller joins back to bytes with an EXACT GetContent on the ref. The "fuzzy in,
// exact out" contract: the approximate similarity ranking surfaces candidates,
// but identity is always the exact content hash (SN-8 — the score never enters a
// committed fact / a MoteId / an identity decision; it is off-digest, advisory).
// Same scope + degrade as the dataset RPCs: operator-global (per-party isolation
// is CLOUD, D129); a None FuzzyDiscoveryView seam ⇒ UNIMPLEMENTED; an unknown
// dataset ⇒ not_found; server-embed (text-only) needs `inference` else
// FAILED_PRECONDITION; the client-vector path runs FFI-free.
// ---------------------------------------------------------------------------
message FuzzyDiscoveryRequest {
  string dataset                 = 1;
  string query_text              = 2;    // server-embed path (needs `inference` + an embedder)
  repeated float query_embedding = 3;    // client-vector path (FFI-free); takes precedence when non-empty
  uint32 k                       = 4;    // top-k (server-clamped to a sane max)
  RetrievalMode retrieval_mode   = 5;    // RC4a: UNSPECIFIED ⇒ server default; HYBRID needs query_text (else falls back to dense)
}
message FuzzyHit {
  bytes  content_ref = 1;                // 32B content-addressed id — the EXACT-OUT join key (GetContent)
  uint32 score_bp    = 2;                // 0..=10000 DISPLAY-ONLY basis points; NEVER an identity input (SN-8)
  bytes  parent_ref  = 3;                // RC4a: 32B content-addressed id of the PARENT document (== content_ref for legacy/un-chunked)
  uint32 chunk_index = 4;                // RC4a: 0-based ordinal of this chunk within the parent (display/ordering)
}
message FuzzyDiscoveryResponse {
  repeated FuzzyHit hits = 1;            // best-first; deterministic tiebreak (score desc, then ascending ref)
}

// ---------------------------------------------------------------------------
// PR-2c-2 — re-plan-round observability (read-only). Enumerate the durable
// `ReplanRound` facts the live re-plan-on-failure loop commits, so an operator
// can SEE the runtime's self-correction (which rounds ran, what failed, whether
// the model escalated). A read-only fold over off-DAG metadata facts — never a
// write, never identity, never the projection digest. Additive (D120.6).
//
// SCOPE (single-node OSS): operator-global, like the run/teams/grants viewers.
// ---------------------------------------------------------------------------

message ListReplanRoundsRequest {
  optional uint32 limit = 1;             // page size; server clamps to a max (absent = the default page)
}
message ReplanRoundSummary {
  uint32 round            = 1;           // 0 = the run's initial-plan anchor; 1.. = corrective rounds
  bytes  shaper_mote_id   = 2;           // 32B — the round's shaper Mote id
  string model_id         = 3;           // the resolved model the round's shaper ran
  repeated bytes failed_step_ids = 4;    // 32B each — the steps that triggered this round (empty for round 0)
  bool   escalated        = 5;           // true iff the model flagged-a-human for this round (run quiesces)
  uint64 seq              = 6;           // journal seq of the ReplanRound fact (ordering)
}
message ListReplanRoundsResponse {
  repeated ReplanRoundSummary rounds = 1; // newest-first (descending seq)
  bool has_more = 2;                      // a further page exists beyond the last returned round
}

// ---------------------------------------------------------------------------
// PR-2d-1 — ReAct-turn observability (read-only). Enumerate the durable
// `ReactRound` facts the live ReAct chain commits (the turn-0 anchor, settled
// branches, budget caps), so an operator can SEE the chain unfold (which turns
// ran, how each settled, what budget the run was admitted under). A read-only
// fold over off-DAG metadata facts — never a write, never identity, never the
// projection digest. Additive (D120.6).
//
// SCOPE (single-node OSS): operator-global, like ListReplanRounds; an optional
// `instance_id` filter scopes to one run (serve's journal is shared).
// ---------------------------------------------------------------------------

message ListReactTurnsRequest {
  optional uint32 limit = 1;             // page size; server clamps to a max (absent = the default page)
  optional bytes instance_id = 2;        // 16B — scope to one run (absent = all runs)
  // PR-R1 (additive): scope to ONE chain within a run. A serve's shared journal can
  // carry many react chains under one instance_id (one per Invoke, since PR-R1, plus
  // agentic-step chains) — this is the per-chain key from InvokeResponse.react_chain_salt
  // / ReactTurnSummary.step_salt. 32B = match that chain; EMPTY (0 bytes, the encoded
  // form of a legacy run-level `None` salt) = the unsalted run-level chain; absent =
  // every chain under the instance_id filter (the pre-PR-R1 behaviour).
  optional bytes step_salt = 3;
}
message ReactTurnSummary {
  uint32 turn             = 1;           // 0 = the run's submit anchor; settles/advances reference 1..
  bytes  turn_mote_id     = 2;           // 32B — the turn's RUN-SALTED Mote id
  bytes  instance_id      = 3;           // 16B — the run this fact belongs to (the salt)
  string model_id         = 4;           // the resolved model the turns run
  string branch           = 5;           // "pending" | "answer" | "tool" | "rejected" | "dead_lettered" (frozen at append)
  string tool_id          = 6;           // set iff branch == "tool"
  string tool_version     = 7;           // set iff branch == "tool"
  uint32 max_turns        = 8;           // the run's durable turn cap (anchor-recorded)
  uint32 max_tool_calls   = 9;           // the run's durable tool-call cap
  uint64 seq              = 10;          // journal seq of the ReactRound fact (ordering)
  // PR-3 (A2): the fail-closed refusal detail for a "rejected" turn (the model's
  // tool proposal was refused at the decode/validate authority site — ungranted
  // name, schema-invalid args, or malformed) — the model re-prompts over it,
  // bounded by the budget. Empty unless branch == "rejected". Display + operator
  // troubleshooting only; derived from the durable ReactBranch::Rejected fact,
  // NOT a journal/identity/digest input. Additive (D120.6); an old client ignores
  // it, a new client reads "" from an old server.
  string rejection_reason = 11;          // set iff branch == "rejected"
  // PR-R1 (additive): the chain key this turn belongs to (the durable
  // ReactRound.step_salt). 32B = a per-invocation run-level chain (= the seed MoteId,
  // since PR-R1) OR an agentic-step chain (= the launch MoteId); EMPTY = a legacy
  // run-level chain (`None` salt, old journal). Lets a client group/scope turns by
  // chain on serve's shared journal. Additive (D120.6): old client ignores it; a new
  // client reads "" from an old server.
  bytes step_salt = 12;                  // 32B chain key; EMPTY for a legacy run-level chain
  // T-MULTI-ELEMENT-TOOLCALLS (additive): when a model emits N>1 tool calls in ONE
  // turn (a ToolBatch), the gateway FANS that one durable fact into N "tool" rows —
  // one per call — sharing this turn's turn/turn_mote_id/seq and distinguished by
  // call_index (0..N-1, in emission order). A single-call turn and every non-tool
  // branch carry call_index 0. Lets a client render the full multi-tool trajectory
  // (turn N.0, N.1, …). Additive (D120.6): an old client ignores it (sees N correctly-
  // typed "tool" rows); a new client reads 0 from an old server.
  uint32 call_index = 13;                // 0 for a single-call turn; 0..N-1 for a ToolBatch turn's N calls
  // Governance observability (additive): the chain's run-fixed warrant axes, decoded
  // from the anchor `ReactRound.warrant_ref` — the tool ids the chain may fire and the
  // secret refs it may resolve (D110.3). NAMES/REFS ONLY — never a secret value
  // (SN-8/D81), the same discipline as ListSecretNames. Every row of a chain repeats
  // its chain-level grants (the warrant is run-fixed); EMPTY when the warrant blob is
  // absent. Makes a dropped capability axis VISIBLE instead of silent (the class behind
  // T-RUNAPP-SECRET-SCOPE-OBSERVATION). Additive (D120.6): an old client ignores them; a
  // new client reads empty from an old server.
  repeated string granted_tools      = 14;   // sorted tool ids from warrant.tool_grants
  repeated string secret_scope_names = 15;    // sorted secret refs from warrant.secret_scope (empty = None)
}
message ListReactTurnsResponse {
  repeated ReactTurnSummary turns = 1;   // newest-first (descending seq)
  bool has_more = 2;                     // a further page exists beyond the last returned turn
}

// ---------------------------------------------------------------------------
// RC4c-2 — LLM-rerank-turn observability (read-only). Enumerate the durable
// `ReRankRound` facts the live RAG chain commits (the anchor + the frozen
// outcome) so an operator can SEE which reranks ran, on what model, and how the
// retrieved candidates were reordered. A read-only fold over off-DAG metadata
// facts — never a write, never identity, never the projection digest. Additive
// (D120.6).
//
// SCOPE (single-node OSS): operator-global, like ListReactTurns; an optional
// `instance_id` filter scopes to one run (serve's journal is shared).
// ---------------------------------------------------------------------------

message ListReRankTurnsRequest {
  optional uint32 limit = 1;             // page size; server clamps to a max (absent = the default page)
  optional bytes instance_id = 2;        // 16B — scope to one run (absent = all runs)
}
message ReRankTurnSummary {
  uint32 round            = 1;           // 0 today (rerank is one model turn); kept for symmetry
  bytes  rerank_mote_id   = 2;           // 32B — the rerank turn's RUN-SALTED Mote id
  bytes  instance_id      = 3;           // 16B — the run this fact belongs to (the salt)
  string model_id         = 4;           // the resolved model the rerank ran
  string outcome          = 5;           // "pending" | "reranked" | "failed_closed" (frozen at append)
  uint32 candidate_count  = 6;           // number of candidates reranked (the Permutation(n) bound)
  // The reordered SOURCE indices (a permutation of 0..candidate_count) — the Vec
  // index is the NEW rank. Set iff outcome == "reranked"; empty otherwise. SN-8:
  // an exact permutation the runtime enforced, never a similarity score.
  repeated uint32 permutation = 7;
  uint64 seq              = 8;           // journal seq of the ReRankRound fact (ordering)
}
message ListReRankTurnsResponse {
  repeated ReRankTurnSummary turns = 1;  // newest-first (descending seq)
  bool has_more = 2;                     // a further page exists beyond the last returned turn
}

// ---------------------------------------------------------------------------
// RC5a: durable multi-tier MEMORY — semantic recall + episodic store.
//
// A cross-run, per-namespace store of what an agent LEARNED. Off the truth path
// (SN-8): a recall returns only the ordered memory-ref SET; the similarity `score`
// is DISPLAY-ONLY, never an identity input. The store (memory.db) is a rebuildable
// projection — NO journal schema bump (the retrieve@1 precedent). `namespace` is the
// caller's ISOLATION scope; a "" request namespace ⇒ the server-derived caller
// default (a client never scopes into another principal's memories). These RPCs are
// the operator/SDK/CLI + episodic-log surface; the in-run recall@1 / remember@1 tools
// use the same store out-of-band under a server-injected namespace.
// ---------------------------------------------------------------------------
enum MemoryKind {
  MEMORY_KIND_UNSPECIFIED = 0;           // ⇒ SEMANTIC (the default)
  MEMORY_KIND_SEMANTIC    = 1;           // a durable fact the agent learned
  MEMORY_KIND_EPISODIC    = 2;           // an event/observation from a run
}

message StoreMemoryRequest {
  bytes  content           = 1;          // the payload to remember (ALWAYS present; content-addressed → memory_id)
  repeated float embedding = 2;          // OPTIONAL client vector; empty ⇒ server-embed (needs `inference`)
  MemoryKind kind          = 3;          // UNSPECIFIED ⇒ SEMANTIC
  string namespace         = 4;          // "" ⇒ the caller's server-derived default namespace
}
message StoreMemoryResponse {
  bytes  memory_id = 1;                  // 32B content-addressed id
  bool   inserted  = 2;                  // false ⇒ a content-addressed dedup hit (idempotent)
  uint32 dim       = 3;                  // the namespace's embedding dimension
}

message ListMemoriesRequest {
  optional uint32 limit       = 1;       // page size; server clamps (absent = default page)
  optional bytes  instance_id = 2;       // 16B — scope to one run (absent = all runs in the namespace)
  string namespace            = 3;       // "" ⇒ caller default
  bool include_tombstoned     = 4;       // RC5b: false (default) hides decayed memories; true = the decayed view
}
message MemorySummary {
  bytes  memory_id  = 1;                 // 32B content-addressed id (the citation key)
  bytes  content    = 2;                 // the remembered payload (UI snippet)
  string kind       = 3;                 // "semantic" | "episodic"
  bytes  instance_id = 4;                // 16B — the run that wrote it (all-zero = operator/SDK write)
  int64  created_ms = 5;                 // unix-ms (display only; off every hash)
  uint32 dim        = 6;                 // the memory vector's embedding dimension
  uint32 access_count     = 7;           // RC5b: recall count (salience; off-digest sidecar). Display only.
  int64  last_accessed_ms = 8;           // RC5b: last recall time, unix-ms (0 = never). Display only.
  int64  tombstoned_ms    = 9;           // RC5b: decay tombstone time, unix-ms (0 = live; >0 = soft-evicted, restorable)
}
message ListMemoriesResponse {
  repeated MemorySummary memories = 1;   // newest-first
  bool has_more = 2;                     // a further page exists beyond the last returned memory
}

message RecallMemoryRequest {
  string query_text              = 1;    // server-embed path (needs `inference` + an embedder)
  repeated float query_embedding = 2;    // client-vector path (FFI-free); takes precedence when non-empty
  uint32 k                       = 3;    // top-k (server-clamped to a sane max)
  string namespace               = 4;    // "" ⇒ caller default
}
message MemoryHit {
  bytes memory_id = 1;                   // 32B content-addressed id (the citation key)
  bytes content   = 2;                   // the remembered payload bytes
  float score     = 3;                   // SN-8: DISPLAY-ONLY similarity; NEVER an identity input
}
message RecallMemoryResponse {
  repeated MemoryHit hits = 1;           // ordered: score desc, then ascending ref (deterministic)
}

message ForgetMemoryRequest {
  bytes  memory_id = 1;                  // the memory to erase
  string namespace = 2;                  // "" ⇒ caller default
}
message ForgetMemoryResponse {
  bool forgotten = 1;                    // true ⇒ a row was removed
}

// RC5b additive: reversible TTL + salience DECAY (soft-tombstone; the `memories` row
// is never deleted — restorable), namespace STATS, and RESTORE. All off the truth
// path / off-digest (the memory_decay sidecar); NO journal schema bump.
message DecayMemoryRequest {
  string namespace  = 1;                 // "" ⇒ caller default
  uint32 ttl_days   = 2;                 // age threshold (0 ⇒ the server default)
  uint32 min_access = 3;                 // salience floor — a memory recalled >= this many times is protected
  bool   dry_run    = 4;                 // true (recommended default) ⇒ preview candidates, evict nothing
}
message DecayCandidate {
  bytes  memory_id       = 1;            // 32B content-addressed id
  bytes  content         = 2;            // the payload (preview snippet)
  string kind            = 3;            // "semantic" | "episodic"
  int64  created_ms      = 4;            // unix-ms write time
  uint32 access_count    = 5;            // recall count (salience)
  int64  last_accessed_ms = 6;           // last recall time, unix-ms (0 = never)
  uint32 age_days        = 7;            // derived age at sweep time (display)
}
message DecayMemoryResponse {
  repeated DecayCandidate candidates = 1; // the memories the policy matched
  uint32 would_evict = 2;                // candidates.len() (the preview/eviction count)
  uint32 evicted     = 3;                // actually tombstoned this call (0 on a dry run)
  uint32 kept        = 4;                // live memories that survived the sweep
  bool   dry_run     = 5;                // echoes the request
}
message MemoryStatsRequest {
  string namespace = 1;                  // "" ⇒ caller default
}
message MemoryStatsResponse {
  uint32 total      = 1;                 // live (non-tombstoned) memories
  uint32 semantic   = 2;                 // live semantic
  uint32 episodic   = 3;                 // live episodic
  uint32 tombstoned = 4;                 // decayed (restorable) memories
  uint32 dim        = 5;                 // namespace embedding dimension (0 = empty)
  string embed_fingerprint = 6;          // the embed-model fingerprint the namespace was indexed under
  int64  oldest_ms  = 7;                 // oldest live created_ms (0 = empty)
  int64  newest_ms  = 8;                 // newest live created_ms (0 = empty)
  string namespace  = 9;                 // the resolved (server-derived) namespace
}
message RestoreMemoryRequest {
  bytes  memory_id = 1;                  // the tombstoned memory to un-decay
  string namespace = 2;                  // "" ⇒ caller default
}
message RestoreMemoryResponse {
  bool restored = 1;                     // true ⇒ a tombstone was cleared
}

// The Morphic Data Engine read surface (campaign Batch 2): one durably-captured
// ACTION record — a committed Mote's join keys, mirrored into the gateway's
// capture.db sidecar (a rebuildable cache folded from the journal; the journal
// stays truth). JOIN-KEY-ONLY by construction (no payload/reasoning fields) —
// the default ActionsOnly capture scope. `react_turn`/`react_branch` are set
// when the captured Mote is a ReAct turn (joined from its ReactRound fact).
message ListCaptureRecordsRequest {
  optional uint32 limit = 1;             // page size; server clamps to a max (absent = the default page)
  optional bytes instance_id = 2;        // 16B — scope to one run; absent = every captured action
}
message CaptureRecordSummary {
  bytes  mote_id      = 1;               // 32B — the captured Mote (the action's identity)
  bytes  instance_id  = 2;               // 16B — the run this action belongs to
  bytes  result_ref   = 3;               // 32B — the committed action's content address (the truth join key)
  string nd_class     = 4;               // "pure" | "read_only_nondet" | "world_mutating"
  uint64 seq          = 5;               // journal seq of the Committed fact (ordering)
  optional uint32 react_turn = 6;        // set iff the Mote is a ReAct turn
  string react_branch = 7;               // the turn's settled branch iff a ReAct turn (else empty)
}
message ListCaptureRecordsResponse {
  repeated CaptureRecordSummary records = 1; // newest-first (descending seq)
  bool has_more = 2;                         // a further page exists beyond the last returned record
}

// ---------------------------------------------------------------------------
// W1.A5 toolscout additive (D120.6): ADVISORY tool discovery + TaskBundle
// preview. SN-8: every score/verdict below is DISPLAY-ONLY — never a committed
// fact, never an authorization. The sole grant gate stays the exact
// (name, version) equality check in lowering + the broker; a score can surface
// a tool, never grant one (advisory-never-authorizes is structural in
// kx-toolscout: the lowering signature admits no score).
// ---------------------------------------------------------------------------

message ListToolManifestsRequest {}
// Normalized intent keywords under one BCP-47-ish language tag.
message KeywordSet {
  string lang           = 1;             // e.g. "en", "hi", "ja"
  repeated string words = 2;             // pre-normalized (trim / lowercase / collapse whitespace)
}
// One registered tool's advisory manifest (ranking/display material ONLY —
// the broker never reads manifests; like the recipe catalog, registration is
// the public discovery surface, so listing it leaks no authority).
message ToolManifest {
  string tool_id               = 1;      // the grant-set identity half (exact)
  string tool_version          = 2;      // the other identity half (exact)
  string description           = 3;      // free-form human text; NEVER parsed for enforcement
  repeated KeywordSet keywords = 4;      // per language tag (sorted, deduplicated)
  bytes  fingerprint_hash      = 5;      // 32B blake3 ToolFingerprint content hash (display/join key)
  string kind                  = 6;      // "Builtin" | "Mcp" (display)
}
message ListToolManifestsResponse {
  repeated ToolManifest manifests = 1;   // deterministic (tool_id, tool_version) order
}

// One sequenced tool in a client-authored TaskBundle spec. Advisory metadata
// rides along; identity is the exact (tool_id, tool_version) pair.
message BundleToolSpec {
  string tool_id               = 1;
  string tool_version          = 2;
  string description           = 3;      // advisory ToolMeta description
  repeated KeywordSet keywords = 4;      // advisory ToolMeta keywords
}
message ScoreTaskBundleRequest {
  string intent                         = 1; // the task instruction (size-capped; validated fail-closed)
  repeated string language_tags         = 2; // advisory BCP-47-ish tags (count/size-capped)
  repeated BundleToolSpec tool_sequence = 3; // ordered; non-empty, count-capped, duplicate names refused
  uint32 tolerance_threshold_bp         = 4; // advisory ranking cut, 0..=10000 (an integer — never a float)
}
// One manifest's advisory rank against the bundle intent, in integer basis
// points (floats never cross this wire — the SN-8 no-persisted-confidence
// rule): exact keyword/phrase = 10000 > Jaro-Winkler fuzz ≤ 9000 > embedding
// cosine ≤ 8000 (absent without a server embedder — string rungs alone decide).
message ManifestScore {
  string tool_id          = 1;
  string tool_version     = 2;
  uint32 score_bp         = 3;
  bytes  fingerprint_hash = 4;           // joins back to ListToolManifests
}
// What the REAL lowering gate said about the bundle: a dry-run of
// kx-toolscout's lower_to_workflow_def against the SERVER-built react warrant
// (never a caller-supplied one — the Invoke binder precedent). The lowered
// WorkflowDef is DISCARDED: nothing submits, nothing journals, no identity is
// derived. The broker re-gates any future real dispatch.
enum LowerVerdict {
  LOWER_VERDICT_UNSPECIFIED = 0;
  LOWER_VERDICT_UNAVAILABLE = 1;         // no live react runtime on this serve (no server warrant to gate against)
  LOWER_VERDICT_WOULD_LOWER = 2;         // the grant gate passed; the bundle lowers to a valid WorkflowDef
  LOWER_VERDICT_REFUSED     = 3;         // the gate refused (verdict_detail names the reason)
}
message ScoreTaskBundleResponse {
  bytes bundle_fingerprint      = 1;     // 32B blake3 TaskBundle content fingerprint
  repeated ManifestScore ranked = 2;     // EVERY registered manifest, best-first (deterministic tiebreak)
  LowerVerdict verdict          = 3;
  string verdict_detail         = 4;     // display-only availability/refusal prose
}

// ---------------------------------------------------------------------------
// SubmitWorkflow — author a Tier-1 DAG from a VETTED palette and run it.
// Additive RPC (D120.6). The caller's party is SERVER-DERIVED from the auth
// interceptor (NO party field on the wire — SN-8). Unlike SubmitRun (which takes
// pre-derived Motes + a client warrant), the client here sends only TOPOLOGY +
// PARAMS: the server assigns each step's logic_ref from its StepKind (the client
// CANNOT inject an executable body — that is Tier 2 / W3, needs a D-number),
// builds every per-step warrant SERVER-SIDE from the party's grants (intersect;
// never a client warrant — the SubmitRun BLOCKER #5 lesson), derives all identity
// via kx_workflow::compile, then register-then-submits through the SAME
// propose-proxy + R-1..R-15 admission as Invoke. Returns RunHandle. An old
// gateway without the seam returns UNIMPLEMENTED.
// ---------------------------------------------------------------------------

// The VETTED step palette. +1-shifted with a 0 sentinel; the Rust boundary
// REJECTS UNSPECIFIED. New kinds are additive (append only). No critic/shaper
// kind in Tier-1 (keeps the cross-Mote refusal surface vacuous).
enum WorkflowStepKind {
  WORKFLOW_STEP_KIND_UNSPECIFIED = 0;
  WORKFLOW_STEP_KIND_PURE        = 1;  // deterministic transform; server logic_ref = content-derived sentinel
  WORKFLOW_STEP_KIND_MODEL       = 2;  // greedy model step routed by model_id + prompt (server logic_ref = MODEL sentinel)
  WORKFLOW_STEP_KIND_EXEC        = 3;  // references a REGISTERED body by signature id; server logic_ref = that body's content ref
  WORKFLOW_STEP_KIND_TOOL        = 4;  // PR-6a: a single registered tool step. The client sends kind + tool_contract={name:version}; the SERVER builds the per-step warrant narrowed against the party grant (client tool_grants stay structurally refused — BLOCKER #5/SN-8). The tool MUST resolve in the durable registry or the step is refused.
}

// Execution mode (blueprint-execution-modes.md). Additive, default = FROZEN.
enum WorkflowExecutionMode {
  WORKFLOW_EXECUTION_MODE_UNSPECIFIED = 0; // boundary maps to FROZEN (default-safe)
  WORKFLOW_EXECUTION_MODE_FROZEN      = 1; // memoize/reuse (content-addressed dedup — today's behavior)
  WORKFLOW_EXECUTION_MODE_DYNAMIC     = 2; // re-plan-fresh (reserved; PR-1 frozen-only, refused at the boundary)
}

// One authored step. The client supplies the kind + params; the server controls
// the logic_ref + identity + warrant.
message WorkflowStep {
  WorkflowStepKind kind    = 1;
  string model_id          = 2;          // required for MODEL (must equal the served model); ignored for PURE/EXEC
  string prompt            = 3;          // MODEL prompt (bound into config_subset[PROMPT_KEY]); empty otherwise
  bytes  body_signature_id = 4;          // 32B — EXEC only: the REGISTERED body's content/signature id
  map<string, string> tool_contract = 5; // TOOL: the single {tool_id: version} the step fires. MODEL (PR-9b/D161.1): a non-empty contract = the deterministic-agentic grant SET (`model@tool` in the chains DSL); authored cross-surface in PR-9b-1, the bounded reason→tool→observe LOOP executes in PR-9b-2 (until then the server fails closed). AUTHORITY still comes only from server vetting (client tool_grants stay refused — SN-8).
  map<string, bytes>  params        = 6; // free config_subset entries (size-capped server-side); an agentic MODEL step carries its bounded-loop budget under params["max_turns"]/["max_tool_calls"] (canonical-JSON u32)
}

// One authored edge between two steps (by their insertion index in steps[]).
message WorkflowEdge {
  uint32 parent      = 1;                // index into steps[] (the StepRef insertion order)
  uint32 child       = 2;                // index into steps[]
  EdgeKind edge_kind = 3;                // reuses coordinator.proto EdgeKind (DATA / CONTROL)
  bool   non_cascade = 4;                // EdgeMeta.non_cascade (control-only cascade opt-out)
}

message SubmitWorkflowRequest {
  uint32 seed                          = 1; // workflow-input seed (folds into entrypoint identity, D50)
  repeated WorkflowStep steps          = 2; // authored steps, in StepRef order (count-capped server-side)
  repeated WorkflowEdge edges          = 3; // authored edges (count-capped; acyclicity enforced by compile)
  WorkflowExecutionMode execution_mode = 4; // default FROZEN
  repeated string context_bundles      = 5; // PR-7: AssetPath handles of context bundles to attach to the entry step(s); empty = byte-identical to pre-PR-7
}

// ---------------------------------------------------------------------------
// NL workflow authoring — propose-then-confirm (D209.3 / SN-8). ProposeWorkflow
// runs the SERVED model ONCE to turn a natural-language goal into a PROPOSED
// multi-step DAG, then decodes + compiles it through the vetted kx-planner path:
// the model names ONLY role + intent + edges (the minimal trust surface); every
// capability axis (model_id, tool_contract, nd_class, …) comes from a
// server-vetted RoleRecipe keyed by exact role name, and `intersect(parent,
// role)` narrows-only (the planner can never escalate privilege). It VALIDATES
// ONLY (`compile_plan`) — it registers nothing and writes no journal (so it is
// unaffected by the run-registration dedup, and is digest-invariant). The client
// PREVIEWS the proposal and, on confirm, authors it via the normal builder →
// SaveApp / SubmitWorkflow path (which re-compiles server-side). Needs a served
// model (an `inference` / `serve-engine` build with a resolved model); with none
// it returns `rejected` (don't-fake-gaps, D142).
// ---------------------------------------------------------------------------
message ProposeWorkflowRequest {
  // The natural-language objective. Rejected only when EMPTY; there is no server-side size
  // cap on this field (an earlier comment claimed one — it never existed). The planner
  // interpolates it verbatim into the plan prompt, so a client MAY compose several authoring
  // inputs (name, goal, instruction, attached filenames) into one multi-line string; the
  // console does. What bounds the exchange is the planner's OUTPUT cap, not this input.
  string goal = 1;
}

// One proposed step. role/intent/kind are the model's plan (minimal trust
// surface); model_id + tool_contract are the SERVER-resolved recipe axes,
// returned for DISPLAY only so the client can render the granted capabilities —
// the authoritative axes are re-derived server-side at author/run (SN-8).
message ProposedStep {
  string role   = 1;                     // the vetted role name this step plays
  string intent = 2;                     // the model's free-form per-step instruction
  string kind   = 3;                     // structural kind: plain | critic | deterministic_critic | topology_shaper
  string model_id = 4;                   // resolved from the role recipe (display only)
  map<string, string> tool_contract = 5; // resolved grant set {tool_id: version} (display only)
}

// One proposed dependency edge (indices into ProposedPlan.steps[]).
message ProposedEdge {
  uint32 parent = 1;
  uint32 child  = 2;
}

message ProposedPlan {
  repeated ProposedStep steps = 1;
  repeated ProposedEdge edges = 2;
}

// The proposal was refused — no served model, an unknown/ungrantable role or
// tool, or a structurally invalid plan (cyclic / bad critic precedence). The
// reason is human-readable (surfaced to the author; never parsed for enforcement).
message ProposalRejected {
  string reason = 1;
}

message ProposeWorkflowResponse {
  oneof result {
    ProposedPlan plan         = 1;
    ProposalRejected rejected = 2;
  }
}

// ---------------------------------------------------------------------------
// Batch A — client uploads + batch content reads + model discovery. Additive
// RPCs (D120.6). PutContent is a CONTENT-STORE write, never a journal write:
// the returned ref is SERVER-DERIVED blake3 over the payload bytes (SN-8 — the
// client cannot name an identity), media_type/filename are ADVISORY audit
// fields only (recorded in an off-journal uploads sidecar that is rebuildable-
// to-empty; truth stays in the content store). The server caps the payload
// fail-closed (`kx serve --content-max-bytes`, default 32 MiB). GetContent and
// GetContentBatch accept the EMPTY instance_id as the uploads scope (see the
// GetContent block). Unauthorized / missing / malformed batch refs return a
// UNIFORMLY EMPTY item — no existence oracle (D120.1).
// ---------------------------------------------------------------------------

message PutContentRequest {
  bytes payload = 1;                     // raw bytes; server size-cap fail-closed
  string media_type = 2;                 // ADVISORY mime (audit/display only; never identity)
  string filename = 3;                   // ADVISORY display name (audit/display only)
}

message PutContentResponse {
  bytes content_ref = 1;                 // 32B — SERVER-DERIVED blake3 of payload (SN-8)
  uint64 size = 2;                       // stored byte count
  bool deduplicated = 3;                 // true iff the blob already existed in the store
}

message GetContentBatchRequest {
  bytes instance_id = 1;                 // 16B ownership ticket; EMPTY = uploads scope
  repeated bytes content_refs = 2;       // 32B each; >64 refs ⇒ INVALID_ARGUMENT (fail-closed)
  optional uint64 max_bytes_per_item = 3;// truncate payloads beyond this (full_size stays honest)
}

message ContentBatchItem {
  bytes content_ref = 1;                 // echoed; response preserves request order
  bytes payload = 2;                     // EMPTY when unauthorized/missing/malformed (uniform)
  bool truncated = 3;                    // true iff payload was cut at max_bytes_per_item
  uint64 full_size = 4;                  // stored size; 0 when unauthorized/missing (uniform)
}

message GetContentBatchResponse {
  repeated ContentBatchItem items = 1;   // one per requested ref, request order
}

// Model discovery is DISPLAY ONLY: model *selection* stays a recipe ENUM
// free-param validated server-side at binding (never a client warrant axis).
message ListModelsRequest {}

message ModelSummary {
  string model_id = 1;
  repeated string modalities = 2;        // display strings: "text" | "image" | "audio" | "video"
  string description = 3;                // host-synthesized display prose (GGUF name / file stem)
  bool serving = 4;                      // true iff this model is the PRIMARY/default serve route
  uint32 context_len = 5;                // served context window (tokens)
  bool loaded = 6;                       // POC-3: true iff the model is RESIDENT in RAM right now
                                         //   (live LRU residency; additive — old clients ignore it)
  string chat_handle = 7;                // POC-3: the recipe handle a client invokes to chat with
                                         //   THIS model (primary = kx/recipes/chat; secondary =
                                         //   kx/recipes/m-<id>) — the binder-free routing key
  string engine = 8;                     // the serving engine: "kx-llamacpp" (in-process llama.cpp)
                                         //   or "kx-ollama" (a local Ollama daemon). Display/audit
                                         //   only (never identity); empty on an old host (additive)
  bool can_embed = 9;                    // PR-B: true iff this model is the server's CONFIGURED
                                         //   dataset embedder (KX_SERVE_EMBED_MODEL else the
                                         //   primary). NOT a per-model capability claim — marks
                                         //   WHICH model the server-embed/RAG path uses. Display/
                                         //   audit only (never identity); additive (old host = false)
  string source = 10;                    // Model Control v2: provenance — "local" (startup GGUF) |
                                         //   "ollama" (daemon-discovered) | "pulled-ollama" |
                                         //   "pulled-url" (runtime `kx models pull`). Display/audit
                                         //   only (SN-8); empty on an old host (additive)
  bool active = 11;                      // Model Control v2: true iff this is the server's ACTIVE
                                         //   default (the SetActiveModel choice — an off-journal
                                         //   advisory hint; the server never silently re-routes
                                         //   kx/recipes/chat). Additive (old host = false)
  string chat_rag_handle = 12;           // Model Control v2: the RAG-grounded chat recipe handle for
                                         //   THIS model (kx/recipes/chat-rag[-m-<id>]) so New Chat can
                                         //   ground a switched model; empty when none. Additive
  bool embed_is_decoder = 13;            // RC4a (T-RAG-EMBED-QUALITY): set on the can_embed entry —
                                         //   true iff the server's embedder is a generative DECODER
                                         //   LLM, not a dedicated embed model (weak embeddings). The
                                         //   `kx models list` decoder-embedder marker. Display only
}

message ListModelsResponse {
  repeated ModelSummary models = 1;      // empty on an FFI-free build (honest, not an error)
}

// POC-3 (Models "Local lifecycle"): warm/evict a REGISTERED model in the
// owner-thread LRU. The model_id MUST be in the server's fixed registered set
// (startup-provisioned via KX_SERVE_MODELS) — an unregistered id is NOT_FOUND
// (fail-closed; never a load of an arbitrary path). Governed by an authenticated
// caller. Off-journal, off-digest: residency is ephemeral RAM state that rebuilds
// EMPTY on restart; these RPCs never write a journal fact.
message LoadModelRequest { string model_id = 1; }
message LoadModelResponse {
  string model_id = 1;
  bool loaded = 2;        // residency AFTER the op (true on success)
  bool was_resident = 3;  // residency BEFORE the op (false ⇒ a cold load happened)
}
message OffloadModelRequest { string model_id = 1; }
message OffloadModelResponse {
  string model_id = 1;
  bool loaded = 2;        // residency AFTER the op (false on success)
  bool was_resident = 3;  // residency BEFORE (false ⇒ idempotent no-op offload)
}

// Model Control v2 (model acquisition): download a model and REGISTER it at runtime
// so it is immediately usable WITHOUT restarting `kx serve`. HOST INFRASTRUCTURE, not
// a client Mote (SN-8): a download mutates operator/host state (filesystem, served
// set, network egress) — axes a client warrant never asserts. TWO-KEY GATE: an
// authenticated caller REQUESTS the pull; the operator's env opt-in
// (KX_SERVE_ALLOW_MODEL_PULL) AUTHORIZES the egress. Off-journal / off-digest.
message PullModelRequest {
  oneof source {
    string ollama_tag = 1;  // pull from the Ollama registry via /api/pull (the quick/easy path)
    string url = 2;          // a huggingface.co /resolve/<rev>/<file>.gguf URL (direct download)
  }
  string sha256 = 3;         // REQUIRED for `url` (hex; the download is verified before register);
                            //   ignored for `ollama_tag` (the registry digest-verifies)
  string model_id = 4;       // desired catalog id; empty ⇒ derive from the tag / filename
}
message PullModelResponse {
  string model_id = 1;       // the id GetPullStatus is keyed by (poll it for progress)
  bool accepted = 2;         // false ⇒ refused (downloads disabled / host not allowlisted / no sha256)
  string detail = 3;         // honest refusal reason on !accepted (the deny-by-default negative path)
}
message GetPullStatusRequest { string model_id = 1; }
message GetPullStatusResponse {
  enum Phase {
    PHASE_UNSPECIFIED = 0;
    RESOLVING = 1;           // validating the request (allowlist, sha presence)
    DOWNLOADING = 2;         // bytes in flight
    VERIFYING = 3;           // SHA-256 verify (direct-URL path)
    REGISTERING = 4;         // adding to the catalog + routing + chat recipe
    DONE = 5;                // registered + switchable
    FAILED = 6;              // the `detail` carries the advisory reason
  }
  Phase phase = 1;
  uint64 bytes_downloaded = 2;
  uint64 bytes_total = 3;    // 0 when unknown (Ollama may not report; HF Content-Length)
  string detail = 4;         // advisory progress / failure text (never authority)
}

// Model Control v2 (model switching): set the server's ACTIVE default model — an
// off-journal advisory hint a client uses to pick the per-model chat handle, so the
// default is switchable from CLI/SDK (a client-local default cannot be). The server
// NEVER silently re-routes kx/recipes/chat; routing stays the recipe-handle / ENUM
// free-param (SN-8). The model_id MUST be in the served catalog (fail-closed).
message SetActiveModelRequest { string model_id = 1; }  // empty ⇒ clear (back to the primary)
message SetActiveModelResponse {
  string active_model_id = 1;  // the active model AFTER the op ("" ⇒ cleared/primary)
}

// POC-4 (Apps "App-authoring + envelope"): the durable, reusable App catalog. An
// App is a `kortecx.app/v1` JSON envelope — a portable blueprint wrapped with
// by-REFERENCE context/tool/connection/dataset references, a minimal prompt/rule/
// skill/memory artifact rail, a 4-axis steering config, and per-step replay
// intent. The envelope carries NO authority (no warrant/grant/secret/credential/
// instance_id): `app run` re-compiles the blueprint and the server re-resolves
// every warrant from the caller's OWN grants (SN-8). Persisted in an off-journal,
// rebuildable-to-EMPTY `apps.db` sidecar scoped to the authoring party; the server
// derives `app_ref` from the canonical envelope (SN-8). Import/clone are LOCAL +
// client-orchestrated (PutContent the App's content closure, then SaveApp under the
// importer's OWN principal with `source_digest` recording local lineage) — there is
// no dedicated server import RPC. All three RPCs are off-journal / off-digest.
message AppSummary {
  string handle        = 1;  // 'namespace/collection/name' AssetPath catalog key (upsert key)
  bytes  app_ref       = 2;  // 16B SERVER-DERIVED canonical-envelope hash (display/dedup)
  string name          = 3;  // envelope name
  string version       = 4;  // envelope version
  string description   = 5;  // advisory (never parsed for enforcement)
  repeated string tags = 6;  // catalog tags
  uint32 step_count    = 7;  // blueprint step count (display only)
  bool   locked        = 8;  // POC-5b: the App's project branch is locked (agentic edits refused); false when no branch / not locked / lock store unwired
  string kind          = 9;  // D213 lane: "functional" (schedulable capability) or "experience" (hosted web app); empty on an old server ⇒ treat as functional
}
message SaveAppRequest {
  string handle        = 1;  // catalog key (upsert key within the caller's scope)
  bytes  envelope_json = 2;  // the kortecx.app/v1 JSON; server canonicalizes + derives app_ref
  bytes  source_digest = 3;  // OPTIONAL 32B lineage hint — the app_digest an import/clone came from (off-identity; NULL/authored-here when empty). A hint, never authenticity.
}
message SaveAppResponse {
  bytes  app_ref      = 1;   // 16B server-derived (SN-8)
  string handle       = 2;   // echoed canonical handle
  bool   deduplicated = 3;   // true iff an identical envelope was already bound to this handle
}
message ListAppsRequest {
  uint32 limit        = 1;   // 0 ⇒ server default; clamped to a server max
  string after_handle = 2;   // exclusive cursor (deterministic handle order)
}
message ListAppsResponse {
  repeated AppSummary apps = 1;
  bool has_more            = 2;
}
message GetAppRequest { string handle = 1; }
message GetAppResponse {
  bool       found         = 1;  // uniform not-found for absent OR not-owned (no oracle)
  bytes      envelope_json = 2;  // canonical stored bytes (empty when not found)
  AppSummary summary       = 3;  // the derived summary (absent when not found)
  bytes      app_digest    = 4;  // 32B HANDLE-FREE portable App identity (blake3 over the canonical envelope); the "same App" key; empty when not found
  bytes      source_digest = 5;  // OPTIONAL 32B lineage hint if this App was imported/cloned (the source's app_digest); empty when authored-here or not found. A hint, never authenticity.
}

// Server-authoritative, READ-ONLY capability manifest for a stored App ("what this
// App needs vs. what you have"). The host derives it from the stored envelope + the
// SAME live policy folds RunApp uses (fireable tools, served models, registered
// connections), so it can never report a capability in-policy that the run would drop.
// Advisory: it gates nothing, writes nothing; off-journal / off-digest, recomputed on
// demand. Additive — old clients never call it; a host without the seam returns
// UNIMPLEMENTED (the client then falls back to an envelope-only "needs" view).
message GetAppManifestRequest { string handle = 1; }
message AppCapability {
  string id        = 1;  // tool id (e.g. "mcp-echo/echo") or a connection descriptor
  string version   = 2;  // tool version; empty for a connection
  bool   requested = 3;  // the App named this capability
  bool   in_policy = 4;  // within the caller's resolvable policy (fireable+registered tool / registered connection)
  bool   inherited = 5;  // surfaced only because the tool axis is reach=inherit_principal
}
message GetAppManifestResponse {
  bool                   found              = 1;  // uniform not-found for absent OR not-owned (no oracle)
  bool                   reach_inherit      = 2;  // the effective tool reach (true ⇒ inherit the caller's whole ceiling)
  repeated AppCapability tools              = 3;
  repeated AppCapability connections        = 4;
  string                 model_route        = 5;  // the App's declared route ("" ⇒ served default)
  bool                   model_route_served = 6;  // route is offered here (always true when empty); false ⇒ a run would REFUSE
  repeated AppCapability datasets           = 7;  // declared grounding datasets; requested && !in_policy ⇒ the run HARD-FAILS (a missing dataset is the only such dependency)
}

// G2 (App-pointer -> run resolution). Run a caller-owned App SERVER-SIDE: the
// gateway reads the validated stored envelope from apps.db, lowers its blueprint
// through the SAME canonical path the client uses (kx-blueprint::to_request),
// resolves references.connections against the caller's OWN registered connections
// by name, and narrows the run warrant's SecretScope::AllowList to guards.secret_scope
// (bounded by the declared connections) so a credentialed connector (e.g. Gmail) can
// actually be dialed inside the agentic loop. The envelope carries NO authority (it is
// server-owned + validated; the client cannot forge references or run arbitrary steps
// under the App's credentials — SN-8). Returns the same RunHandle as SubmitWorkflow.
// Off-journal / off-digest for connection/secret resolution; the resolved warrant is
// deterministic (recovery replays it byte-identically). `args` (optional) merge into
// the blueprint's entry params (server-side, the same shape the CLI injected). A
// missing referenced connection -> FAILED_PRECONDITION("missing integration: <name>").
message RunAppRequest {
  string handle = 1;  // an existing saved App handle (caller-scoped)
  bytes  args   = 2;   // optional entry-arg JSON object (empty = none); merged server-side
  // Opt-in per-run human-in-the-loop posture. true => the entry agentic step runs
  // under the approval gate, so an irreversible / world-mutating tool call pauses
  // (staged-not-committed) for an explicit Grant/Deny before it fires. Absent/false =>
  // today's autonomous behavior (the serve-wide default applies) and injects nothing,
  // so a run without this field is byte-identical to before.
  bool require_approval = 3;
}

// ---------------------------------------------------------------------------
// POC-5a — App scaffold + POC-5b — per-App lock. Additive, off-journal,
// off-digest. ScaffoldApp drives a server-side async orchestration (plan step
// -> N fixed-skeleton write steps -> N AdvanceBranch) into a fresh CoW-on-CAS
// branch, reusing the proven single-step react-edit pattern; the frozen
// coordinator loop is UNTOUCHED. Warrants are SERVER-minted (SN-8/BLOCKER#5):
// the `instruction` is DATA only. The lock gates the single AdvanceBranch write
// chokepoint (a locked App refuses further agentic in-CAS edits).
// ---------------------------------------------------------------------------
message ScaffoldAppRequest {
  string handle        = 1;  // an existing saved App handle (caller-scoped)
  string branch_handle = 2;  // target project branch (created if absent); empty ⇒ server derives from `handle`
  string instruction   = 3;  // free-form authoring intent (UNTRUSTED model input; never names authority)
}
message ScaffoldAppResponse {
  bytes  instance_id   = 1;  // 16B — the plan run's instance (progress observable via GetProjection/StreamEvents)
  string branch_handle = 2;  // echoed (the branch the skeleton is scaffolded into)
  bool   resumed       = 3;  // true iff a prior in-flight scaffold was resumed (pending paths only)
}
message GetScaffoldStatusRequest { string branch_handle = 1; }
message GetScaffoldStatusResponse {
  enum Phase {
    PHASE_UNSPECIFIED = 0;
    PLANNING          = 1;  // the plan step is producing the file manifest
    WRITING           = 2;  // writing the skeleton files (files_pending non-empty)
    DONE              = 3;  // all skeleton files advanced into the branch
    FAILED            = 4;  // the orchestration failed (detail carries the advisory reason)
  }
  Phase phase = 1;
  repeated string files_done    = 2;  // planned project paths already present in the branch manifest
  repeated string files_pending = 3;  // planned project paths still to write
  string detail                 = 4;  // advisory progress / failure text (never authority)
  // POC-6 (agentic creation, additive): the file currently being authored + the live
  // token-stream ids so the browser can stream its decode into an editor (WS /tokens).
  // Empty outside the write/plan phases. `writing_instance_id` gates run ownership; the
  // pair `(writing_instance_id, writing_mote_id)` is the broker subscription key. Hex.
  string writing_path        = 5;  // the project path being authored right now ("" when idle)
  string writing_instance_id = 6;  // 16B run instance, lower-hex ("" when idle)
  string writing_mote_id     = 7;  // 32B write mote (the token-broker key), lower-hex ("" when idle)
}
// Delete a caller-owned App. The `DeleteBranch` idiom (":unbinds the branch; the CAS blobs
// stay") extended to the things an App uniquely owns. Apps are off-journal / off-digest by
// construction, so dropping the row cannot move the canonical projection digest and past runs
// stay exactly as committed — a delete removes the POINTER, never history.
//
// WHAT IT CASCADES (each caller-scoped, each reported back so the UI never has to guess):
//   • the App's cron/webhook triggers — otherwise a surviving trigger fires RunApp on a dead
//     handle every tick, forever, warning only to the server log. There is no FK to catch it.
//   • a running hosted supervisor — stopped and forgotten, so it also leaves ListHostedApps.
//   • the App's lock row, and its project branch BINDING (row only; the CAS blobs stay).
//
// WHAT IT CANNOT RECLAIM, and says so rather than implying a purge:
//   • content-addressed blobs (shared, immutable — the DeleteBranch posture);
//   • the hosted working directory on disk (node_modules et al) — no other delete in this
//     service writes the host filesystem, and this one does not start;
//   • the App's INGESTED RAG DATASET. There is no dataset-delete RPC anywhere in the surface,
//     so an App's corpus outlives it. A client MUST NOT present this as a full erase.
message DeleteAppRequest {
  string handle = 1;                     // exact App handle; caller-scoped
}
message DeleteAppResponse {
  bool removed          = 1;             // false iff absent / not owned (no existence oracle)
  bool branch_unbound   = 2;             // the project branch row was dropped (blobs stay)
  bool lock_cleared     = 3;             // a lock row existed and was released
  bool hosted_stopped   = 4;             // a running hosted supervisor was stopped + reaped
  uint32 triggers_removed = 5;           // cron/webhook triggers deregistered by the cascade
}
message LockAppRequest   { string branch_handle = 1; }  // lock the App's project branch (caller-scoped)
message LockAppResponse  { bool locked = 1; }
message UnlockAppRequest { string branch_handle = 1; }
message UnlockAppResponse{ bool unlocked = 1; }

// D213 Experience lane — the hosted-app supervisor. A hosted (experience) App is a real
// Vite-React / Next.js / Svelte project scaffolded into the App's branch; the supervisor
// materializes that file tree to disk, installs deps, and runs a server on a loopback port.
// Off-journal / off-digest (a plain host subprocess, never a Mote). Unimplemented when the
// hosted-apps seam is absent (built without the `hosted-apps` feature).
//
// THERE IS NO REVERSE PROXY. Earlier revisions of this comment promised a gateway-proxied
// `/apps/<handle>/live/` path; the supervisor has only ever emitted a DIRECT loopback origin
// (`http://127.0.0.1:<port>/`), which `hosted_supervisor_e2e` asserts. A proxy would also have
// to upgrade the dev server's HMR websocket to keep live editing working. The claim is removed
// rather than kept as an aspiration — a client that trusted it would build a broken iframe.
enum HostedAppState {
  HOSTED_APP_STATE_UNSPECIFIED = 0;
  HOSTED_STOPPED               = 1;  // not running (never started, or explicitly stopped)
  HOSTED_MATERIALIZING         = 2;  // writing the branch file tree to the working dir
  HOSTED_INSTALLING            = 3;  // `npm install` (first run / package.json changed)
  HOSTED_STARTING              = 4;  // server spawned, not yet accepting connections
  HOSTED_RUNNING               = 5;  // server accepting connections; `url` is live
  HOSTED_FAILED                = 6;  // install/build/start failed (detail carries the advisory reason)
  HOSTED_BUILDING              = 7;  // `npm run build` (production serve_mode only; never on the dev path)
}
message HostedAppStatus {
  string handle              = 1;  // the saved App handle
  HostedAppState state       = 2;
  // The ABSOLUTE loopback origin the app is served on when running — `http://127.0.0.1:<port>/`.
  // Not a gateway-relative path: there is no proxy (see the enum comment). Empty otherwise.
  string url                 = 3;
  repeated string recent_logs = 4; // tail of the install/build/server logs (advisory)
  string framework           = 5;  // "vite_react" | "next_js" | "svelte"
  uint32 port                = 6;  // the loopback server port (0 when not running)
  string detail              = 7;  // advisory status / failure text (never authority)
  // Which lane the app is being served on, echoed so a client never has to infer it from
  // the state sequence: "dev" (materialize -> install -> `npm run dev`, HMR, the default)
  // or "production" (… -> `npm run build` -> the framework's preview/start server). Carried
  // on the App ENVELOPE (HostedConfig.serve_mode), not settable per-request — a mode switch
  // is a property of the app, not of one press of Start. Empty ⇒ "dev" (an old server).
  string serve_mode          = 8;
}
// `rebuild` ⇒ force a re-materialize + a clean re-install (drop node_modules) before restarting.
// It is NOT a production build — it re-runs whatever lane `HostedConfig.serve_mode` selects. The
// console labels it "Restart clean" for exactly that reason.
message StartHostedAppRequest { string handle = 1; bool rebuild = 2; }
message StopHostedAppRequest  { string handle = 1; }
message StopHostedAppResponse { bool stopped = 1; }
message GetHostedAppStatusRequest { string handle = 1; }
message ListHostedAppsRequest {}
message ListHostedAppsResponse { repeated HostedAppStatus apps = 1; }

// ---------------------------------------------------------------------------
// Additive (D120.6/D175) — the per-principal SKILL catalog (skills.db,
// the apps.db posture: off-journal, off-digest, rebuildable-to-empty). A skill
// is a kortecx.skill/v1 manifest — instructions (content-store, by ref) plus a
// tool grant-WISH set (id -> version) the server re-resolves at bind
// (wish ∩ caller grants ∩ fireable). NO code, NO authority (deny-key
// validated); the executable leg is always an out-of-process connector or a
// bundled broker capability (D159/D174.4). UNIMPLEMENTED when the catalog
// seam is absent (an old gateway) — clients degrade honestly.
// ---------------------------------------------------------------------------

message SkillSummary {
  bytes  skill_ref          = 1;  // 16B SERVER-DERIVED canonical-manifest hash (display/dedup, never client-supplied)
  string name               = 2;  // catalog key within the caller's scope ([a-z0-9._-])
  string version            = 3;  // manifest version (integer string)
  string description        = 4;  // advisory (never parsed for enforcement)
  string instructions_ref   = 5;  // 64-hex content-store ref to the instructions body
  map<string, string> tools = 6;  // the grant-WISH set (id -> version); a wish, never a grant
  repeated string tags      = 7;  // catalog tags
}
message AddSkillRequest {
  bytes manifest_json     = 1;  // kortecx.skill/v1 JSON; the server validates (authority deny-keys, closed shape) + canonicalizes + derives skill_ref
  bytes instructions_body = 2;  // instructions markdown, stored via the content-write seam; empty iff the manifest already names instructions_ref
}
message AddSkillResponse {
  bytes  skill_ref        = 1;  // 16B server-derived (SN-8)
  string name             = 2;  // echoed canonical name
  string instructions_ref = 3;  // 64-hex — the stored (or echoed) instructions ref
  bool   deduplicated     = 4;  // true iff an identical canonical manifest was already bound to this name
}
message ListSkillsRequest {
  uint32 limit      = 1;  // 0 => server default (100); clamped (256)
  string after_name = 2;  // exclusive cursor (deterministic name order)
}
message ListSkillsResponse {
  repeated SkillSummary skills = 1;
  bool has_more                = 2;
}
message GetSkillFormRequest { string name = 1; }
message SkillWish {
  string tool_id      = 1;
  string tool_version = 2;
  bool   registered   = 3;  // ADVISORY display: currently resolvable in the tool registry (never a grant)
}
message GetSkillFormResponse {
  bool found                  = 1;  // uniform not-found for absent OR not-owned (no existence oracle)
  SkillSummary summary        = 2;  // absent when not found
  repeated SkillWish wishes   = 3;  // canonical (tool_id) order
  string instructions_preview = 4;  // server-capped display excerpt ('' when the skill was added by ref)
  bool   preview_truncated    = 5;
}
message RemoveSkillRequest  { string name = 1; }
message RemoveSkillResponse { bool removed = 1; }  // false: absent OR not-owned (uniform)

// ---------------------------------------------------------------------------
// Batch B — Mote definition inspection (PR-2). Additive RPC (D120.6).
// GetMoteDetail is a per-mote unary DISPLAY read: it resolves a committed
// Mote's `mote_def_hash` to the definition bytes the coordinator persisted
// content-addressed at admission (the def's blake3 IS its content ref) and
// returns a CAPPED, display-only summary. Deliberately NOT folded into
// MoteSnapshot — that would bloat every GetProjection poll by the def payload.
// `instance_id` is the same ownership ticket as GetProjection/GetContent
// (uniform "not authorized", no existence oracle — D120.1). A mote that has
// not committed, or one admitted by a pre-Batch-B binary, answers
// `def_found = false` (honest empty, never an error). Nothing in this message
// is authority: config values are OPAQUE bytes for display (SN-8 — secrets
// cannot reach config_subset by construction, D81; the caps are defensive
// bounds, not redaction).
// ---------------------------------------------------------------------------

message GetMoteDetailRequest {
  bytes instance_id = 1;                 // 16B ownership ticket
  bytes mote_id = 2;                     // 32B — the Mote to inspect
}

message MoteConfigEntry {
  string key = 1;                        // ConfigKey (curated allowlist; "prompt" excluded — it has a dedicated field)
  bytes value = 2;                       // OPAQUE display bytes, capped server-side
  bool truncated = 3;                    // true iff value was cut at the server cap
  uint64 full_len = 4;                   // stored value length (honest under truncation)
}

message MoteDetail {
  bytes mote_id = 1;                     // echoed
  bytes mote_def_hash = 2;               // 32B; EMPTY until the Mote commits
  bool def_found = 3;                    // false: uncommitted, or admitted pre-Batch-B
  string step_kind = 4;                  // display vocabulary: "pure"|"model"|"exec"|"shaper"|"critic"|"react-turn"
  string model_id = 5;
  string prompt = 6;                     // config_subset["prompt"], UTF-8 lossy, capped
  bool prompt_truncated = 7;
  repeated MoteConfigEntry config_subset = 8;  // canonical key order; entry-count capped
  map<string, string> tool_contract = 9; // tool name -> pinned version
  bytes logic_ref = 10;                  // 32B
  NdClass nd_class = 11;                 // reuses coordinator.proto NdClass
  EffectPattern effect_pattern = 12;     // reuses coordinator.proto EffectPattern
  optional bytes critic_for = 13;        // 32B producer this Mote critiques; absent if none
  bool is_topology_shaper = 14;
  uint32 schema_version = 15;            // MoteDef schema version the def was admitted under
}

// ---------------------------------------------------------------------------
// Batch C — the GLOBAL cross-run event tail (PR-3 Monitoring). Additive RPC
// (D120.6). A NEW RPC: the frozen per-run StreamEvents keeps its exact cursor
// semantics. The journal is single and `seq` is global, so the global tail is
// the natural primitive; the frame/cursor contract (`since_seq -> next_seq`,
// resumable, bounded, `journal_boundary` at head) is identical to EventFrame.
//
// Each delta is stamped with the run it belongs to via the registration
// WATERMARK (the capture.db precedent): the stamp is the latest RunRegistered
// at-or-below the delta's seq, EMPTY before any registration. Single-node OSS
// has no per-entry run linkage — the stamp is attribution for DISPLAY and
// observability, never identity.
//
// *** CLOUD SCOPE FLAG (MANDATORY): this RPC is OPERATOR-GLOBAL — it
// *** enumerates every run on the node over one stream. A multi-tenant
// *** deployment MUST party-scope the delta stream in its auth layer or DENY
// *** the RPC entirely. Serving it unscoped cross-party is a breach.
// ---------------------------------------------------------------------------

message StreamAllEventsRequest {
  uint64 since_seq = 1;                  // resume cursor (0 = from start)
}

// A run came into existence (NEW — the frozen per-run cursor never surfaces
// this; the global tail needs it to attribute + narrate run starts).
message RunRegisteredDelta {
  bytes recipe_fingerprint = 1;          // 32B — display/join only, never identity
  uint64 registered_unix_ms = 2;         // audit-only wall clock (off every hash)
}

message GlobalEventDelta {
  uint64 seq = 1;
  bytes instance_id = 2;                 // 16B watermark attribution; EMPTY before any registration
  oneof kind {
    CommittedDelta committed = 3;        // value messages reused from the frozen per-run cursor
    FailedDelta failed = 4;
    RepudiatedDelta repudiated = 5;
    EffectStagedDelta effect_staged = 6;
    RunRegisteredDelta run_registered = 7;
  }
}

message GlobalEventFrame {
  uint64 seq = 1;                        // seq of the highest delta in this frame
  repeated GlobalEventDelta deltas = 2;
  uint64 next_seq = 3;                   // resume cursor (never > journal head)
  bool journal_boundary = 4;             // true when the frame reached the current head
}

// ---------------------------------------------------------------------------
// Batch C — mote execution TELEMETRY (PR-3 Monitoring). Additive RPC (D120.6).
// Execution exhaust the HOST records as motes actually run: wall-clock, model
// usage, the fired tool. Lives in a rebuildable-to-EMPTY `telemetry.db`
// sidecar — AUDIT/DISPLAY ONLY, NEVER truth, NEVER identity, NEVER a digest
// input, NEVER a journal change. Exec metrics are not journal-derivable, so
// dropping `telemetry.db` loses observability, not truth (the uploads.db
// posture, not the capture.db refold). A serve without the sidecar answers
// `unimplemented` (forward-compat degrade).
// ---------------------------------------------------------------------------

message ListMoteTelemetryRequest {
  optional uint32 limit = 1;             // page size; server clamps 1..=500 (absent = 200)
  optional bytes instance_id = 2;        // 16B — scope to one run (watermark attribution)
  optional bytes mote_id = 3;            // 32B — scope to one mote
  optional uint64 before_seq = 4;        // cursor: rows with seq strictly below
}

message MoteTelemetryRow {
  bytes mote_id = 1;                     // 32B — the executed Mote
  bytes instance_id = 2;                 // 16B watermark attribution (may be EMPTY)
  uint64 wall_clock_ms = 3;              // host-measured execution wall time
  optional uint64 input_tokens = 4;      // NEVER set in OSS: the frozen backend seam reports no input count
  optional uint64 output_tokens = 5;     // model motes on an inference build only; absent otherwise
  string model_id = 6;                   // the model that ACTUALLY ran (empty for non-model motes / FFI-free)
  string tool_id = 7;                    // the pinned tool of a tool-bearing mote (else empty)
  uint64 started_unix_ms = 8;            // AUDIT-ONLY start wall clock (off every hash)
  uint64 seq = 9;                        // the Committed fact's journal seq (join + pagination cursor)
}

message ListMoteTelemetryResponse {
  repeated MoteTelemetryRow rows = 1;    // newest-first (descending seq)
  bool has_more = 2;
}

// ---------------------------------------------------------------------------
// W1a-3 additive (D120.6): the EXACT, cross-page per-model token-economy
// rollup. `ListMoteTelemetry` is page-clamped (1..=500), so a long ReAct run
// can NOT be honestly summed client-side from one page; this RPC folds the
// whole `telemetry.db` sidecar server-side (`SUM ... GROUP BY model_id`) so
// CLI/SDK/UI render ONE truth (no per-surface drift). Same boundary as
// `ListMoteTelemetry`: off-journal, off-digest, rebuildable-to-EMPTY,
// AUDIT/DISPLAY ONLY. No cost/$ field — billing is CLOUD (D129/D156/GR19). A
// serve without the sidecar answers `unimplemented` (forward-compat degrade).
message ListTelemetrySummaryRequest {
  optional bytes instance_id = 1;        // 16B — scope to one run (absent = all runs)
}

message ModelTokenRollup {
  string model_id = 1;                   // the model that ACTUALLY ran (per-model rows only; never empty)
  uint64 count = 2;                      // committed model motes that ran this model
  uint64 total_output_tokens = 3;        // SUM(output_tokens); 0 on an FFI-free serve (honest)
  uint64 total_wall_clock_ms = 4;        // SUM(wall_clock_ms) for this model
}

message ListTelemetrySummaryResponse {
  repeated ModelTokenRollup rows = 1;    // one per model_id, descending total_output_tokens
  uint64 total_motes = 2;                // ALL joined motes in scope (model + non-model)
  uint64 total_output_tokens = 3;        // window-wide SUM(output_tokens)
}

// ---------------------------------------------------------------------------
// PR-4.1 additive (D120.6): user feedback on an answer (👍/👎 + optional note).
// A CLIENT-ORIGIN write into a rebuildable-to-EMPTY `feedback.db` sidecar — the
// uploads.db posture (off-journal, off-digest, off-identity). NOTHING here is
// truth or authority: rating/comment/context are ADVISORY product-signal fields
// the host records. The TARGET keys (instance_id / mote_id / content_ref) are
// display/join only — feedback never gates execution, never a `MoteId` input,
// never a digest input. The caller PARTY is SERVER-resolved (the PutContent
// precedent), never trusted off the wire (SN-8). The `feedback_id` is SERVER-
// derived. A serve without the sidecar answers `unimplemented` (forward-compat
// degrade). `ListFeedback` is the read-back / inspection surface.
// ---------------------------------------------------------------------------

enum FeedbackRating {
  FEEDBACK_RATING_UNSPECIFIED = 0;       // never persisted — a submit MUST be UP/DOWN
  FEEDBACK_RATING_UP = 1;
  FEEDBACK_RATING_DOWN = 2;
}

message SubmitFeedbackRequest {
  FeedbackRating rating = 1;             // UP/DOWN; UNSPECIFIED ⇒ INVALID_ARGUMENT
  string message_id = 2;                 // client-local chat message id (the stable per-answer key; required)
  optional bytes instance_id = 3;        // 16B run backing the answer (absent for a local-only/restored turn)
  optional bytes mote_id = 4;            // 32B terminal mote (advisory join)
  optional bytes content_ref = 5;        // 32B answer content ref (advisory join/audit)
  string comment = 6;                    // optional free note (server-capped fail-closed)
  string recipe_handle = 7;              // advisory context: the backing blueprint handle
  string model_id = 8;                   // advisory context: the model that answered
}

message SubmitFeedbackResponse {
  bytes feedback_id = 1;                 // 16B SERVER-derived id (deterministic over (message_id, principal); SN-8)
}

message ListFeedbackRequest {
  optional uint32 limit = 1;             // page size; server clamps 1..=500 (absent = 200)
  optional bytes instance_id = 2;        // 16B — scope to one run
  optional uint64 before_rowid = 3;      // cursor: rows with rowid strictly below (newest-first)
}

message FeedbackRow {
  bytes feedback_id = 1;                 // 16B server-derived id
  FeedbackRating rating = 2;
  string message_id = 3;
  bytes instance_id = 4;                 // 16B — EMPTY when the turn had no run
  bytes mote_id = 5;                     // 32B (may be EMPTY)
  bytes content_ref = 6;                 // 32B (may be EMPTY)
  string comment = 7;
  string recipe_handle = 8;
  string model_id = 9;
  uint64 submitted_unix_ms = 10;         // AUDIT-ONLY wall clock (off every hash)
  uint64 rowid = 11;                     // pagination cursor (sqlite rowid; never identity)
}

message ListFeedbackResponse {
  repeated FeedbackRow rows = 1;         // newest-first (descending rowid)
  bool has_more = 2;
}

// ---------------------------------------------------------------------------
// PR-4.2 / T-STREAM1 — LIVE TOKEN STREAMING. Additive RPC (D120.6). ADVISORY +
// OUT-OF-BAND: the model's tokens as they generate, for time-to-first-token UX.
// NEVER truth, NEVER identity, NEVER a digest input, NEVER a journal change.
// The DURABLE fact stays the committed `result_ref` (the WHOLE result, fetched
// via GetContent). The token stream is the F-7 parent_results / Batch-C
// telemetry posture: a serve without the broker wired answers an immediately-
// ending EMPTY stream (honest, never an error). The committed result is the
// authority; a client MUST reconcile to it (overwrite streamed text on commit).
//
// SN-8 (load-bearing): `instance_id` is the ownership ticket — the SAME gate as
// per-run StreamEvents (uniform permission_denied, no existence oracle, caller
// must own the run). `mote_id` is the broker KEY (a server-derived, unguessable
// 32-byte id) selecting which model mote to stream — NOT a second journal gate,
// because a freshly-submitted terminal mote is not yet journaled when a client
// subscribes for time-to-first-token.
//
// *** PARTY-SCOPED by instance_id ownership (UNLIKE StreamAllEvents which is
// *** operator-global). Safe to serve multi-tenant: the gate is the SAME
// *** run-ownership fold as the frozen per-run StreamEvents; cross-tenant scoping
// *** is enforced by the cloud SN-8 wall ABOVE gateway-core (as for StreamEvents).
// ---------------------------------------------------------------------------

message StreamModelTokensRequest {
  bytes instance_id = 1;                 // 16B — the run that owns the mote (ownership ticket)
  bytes mote_id = 2;                     // 32B — the model mote whose tokens to stream
  uint64 since_seq = 3;                  // advisory replay cursor into the broker ring (0 = earliest retained)
}

// One ADVISORY token chunk. `seq` is a per-mote monotone counter assigned by the
// broker (NOT a journal seq — these never touch the journal). `text_piece` is
// the NEW detokenized bytes for this step; the cumulative completion is the
// concatenation of every chunk's `text_piece` in seq order, byte-identical to
// the committed result. `done` marks the final chunk (generation ended: EOG /
// cap / dispatch return); the stream ends after it. `text_piece` is raw UTF-8
// model bytes — DISPLAY ONLY, never parsed for authority (a ReAct turn's
// tool-call JSON may stream through; the COORDINATOR settle is the sole gate).
message TokenChunk {
  uint64 seq = 1;                        // broker-assigned per-mote monotone counter (advisory; NOT a journal seq)
  bytes mote_id = 2;                     // 32B — echoed (self-describing wire; a stream is single-mote)
  bytes text_piece = 3;                  // the NEW detokenized bytes this step (UTF-8; may split a codepoint at a token boundary)
  bool done = 4;                         // true on the terminal chunk (generation ended); the stream ends after it
}

// ---------------------------------------------------------------------------
// W1a-2 — ALERTS inbox (read-only VIEW; observability/operability). Additive RPC
// (D120.6). A rebuildable-to-EMPTY, off-journal, off-digest `alerts.db` read-
// cache the host FOLDS from the journal's TERMINAL `Failed` facts only
// (`!is_pre_commit_crash` — dead-letters + worker-reported terminal failures;
// the liveness `TimedOut`/`WorkerCrashed` retries are EXCLUDED). Serve-path
// admission refusals write NOTHING to the journal (they are synchronous
// SUBMIT_STATUS_REJECTED responses carrying `kx-refusal-code` metadata), so they
// are NOT foldable and NOT in this inbox. `alert_id` is SERVER-derived + re-fold-
// stable (deterministic over (mote_id, seq)); deleting `alerts.db` and re-folding
// re-materializes the SAME item set (derived, not stored). Display/triage-read
// ONLY: never truth, never a `MoteId` input, never a digest input, never a
// journal change. A serve without the sidecar answers `unimplemented` (forward-
// compat degrade).
//
// *** OSS = the read-only Alerts VIEW. The TRIAGE LIFECYCLE (acknowledge /
// *** resolve), the alert-RULE engine, and outbound NOTIFICATIONS (a new egress
// *** surface) are a CLOUD capability (D156 / D129) — deliberately NOT in this
// *** OSS contract (GR19: reserve production-grade management surfaces for Cloud).
// ---------------------------------------------------------------------------

message ListAlertsRequest {
  optional uint32 limit = 1;             // page size; server clamps 1..=500 (absent = 200)
  optional bytes instance_id = 2;        // 16B — scope to one run (watermark attribution)
  optional uint64 before_seq = 3;        // cursor: rows with seq strictly below (newest-first)
}

message AlertSummary {
  bytes alert_id = 1;                    // 16B SERVER-derived, re-fold-stable id (blake3 over (mote_id, seq); SN-8 — no existence oracle)
  bytes mote_id = 2;                     // 32B — the failed Mote (deep-link target)
  bytes instance_id = 3;                 // 16B watermark attribution (may be EMPTY)
  string reason_class = 4;               // the terminal FailureReason wire token (e.g. "dead_lettered", "validator_rejected")
  string severity = 5;                   // closed display vocabulary: "error" | "refused"
  uint64 seq = 6;                        // the Failed fact's journal seq (deep-link cursor + pagination)
  uint64 created_unix_ms = 7;            // AUDIT-ONLY first-folded wall clock (off every hash; may differ after a rebuild)
  uint32 reason_code = 8;                // the numeric FailureReason discriminant (0-8) — the UI reuses its single failure-label map
}

message ListAlertsResponse {
  repeated AlertSummary alerts = 1;      // newest-first (descending seq)
  bool has_more = 2;
}

// ---------------------------------------------------------------------------
// PR-6a — declarative tools registry. Additive RPCs (D120.6). The durable
// inventory + governance surface over the off-journal `tools.db`, DISTINCT from
// the advisory ListToolManifests (ranking). SN-8: `tool_id` is SERVER-DERIVED
// (blake3 of the canonical registration bytes, first 16 B) — the client NEVER
// names or forges a registration identity, and REGISTRATION GRANTS NO AUTHORITY:
// a registered tool fires only when a SERVER-issued warrant grants the exact
// (name, version) AND the broker precheck passes. `tools.db` is off-journal,
// off-digest, rebuildable (built-ins re-seeded on open) ⇒ the canonical digest
// is invariant by construction.
//
// *** OSS = the registry + view + admission-time SSRF vetting of `server_host`.
// *** DIALING external MCP servers (the live remote tool round), credentialed
// *** Connections, and parallel tool fan-out are the PR-6b / Cloud surface
// *** (D159/D132/GR19) — `server_host` here is vetted + stored, never dialed.
// ---------------------------------------------------------------------------

// A tool parameter's declared type + bound (the MCP inputSchema analogue;
// CLOSED set, NO float — SN-8). `ty`: "str"|"bytes"|"int"|"bool"|"enum".
message ToolParamSpec {
  string name            = 1;
  string ty              = 2;            // closed vocabulary (see above)
  uint32 max_len         = 3;            // str/bytes byte cap (ignored otherwise)
  bool   required        = 4;
  repeated string allowed = 5;           // enum: the permitted exact values
}
// A tool's declared typed parameter contract (validated fail-closed before any
// dispatch). Absent ⇒ no validation (pre-M5.3 behaviour).
message ToolInputSchema {
  repeated ToolParamSpec params = 1;
  bool deny_unknown             = 2;     // refuse keys not in params (fail-closed)
}

// Register a declarative EXTERNAL MCP tool into the durable registry. The server
// derives identity + capability: kind = Mcp{endpoint = server_host}; the tool's
// net_scope_required = egress to server_host (the MCP-as-egress monotonic rule).
// `server_host` is REQUIRED + SSRF-vetted at admission (deny-by-default; internal
// /link-local/metadata literals refused). The OSS register path is HumanAuthored.
message RegisterToolRequest {
  string tool_name          = 1;         // identity half (the grant-set key)
  string tool_version       = 2;         // identity half
  string description        = 3;         // free-form; NEVER parsed for enforcement (size-capped)
  string idempotency_class  = 4;         // "Token"|"Readback"|"Staged"|"AtLeastOnce" (validated)
  ToolInputSchema input_schema = 5;      // optional typed params (the "input parameters")
  string server_host        = 6;         // host[:port] the PR-6b gateway will dial; SSRF-vetted; REQUIRED
  string remote_name        = 7;         // the tool's name on the remote server (default = tool_name)
}
message RegisterToolResponse {
  bytes  tool_id              = 1;        // 16B SERVER-DERIVED id (SN-8)
  string registration_status  = 2;       // "Approved" (HumanAuthored)
}

message DeregisterToolRequest {
  string tool_name    = 1;
  string tool_version = 2;               // exact (name, version); built-ins refused
}
message DeregisterToolResponse {
  bool removed = 1;                       // false iff absent OR a built-in (not deregisterable)
}

message DiscoverToolsRequest {
  uint32 limit         = 1;              // page size; server clamps 1..=256 (absent = 100)
  string after_name    = 2;              // exclusive cursor: the (name) of the last row of the prior page
  string after_version = 3;              // cursor tiebreak: the (version)
}
// One registered tool's durable INVENTORY row (governance view). net_scope /
// fs_scope are DISPLAY summaries; authority never rides this wire (SN-8).
message RegisteredTool {
  bytes  tool_id            = 1;         // 16B server-derived
  string tool_name          = 2;
  string tool_version       = 3;
  string kind               = 4;         // "Builtin" | "Mcp" (display)
  string description        = 5;
  string idempotency_class  = 6;
  string provenance         = 7;         // "HumanAuthored" | "SelfGenerated"
  string registration_status = 8;        // "Approved" | "PendingHumanReview"
  string server_host        = 9;         // empty for a no-egress / built-in tool
  string net_scope_summary  = 10;        // display: "none" | "egress:host[,host]"
  bool   is_builtin         = 11;        // server-built (not deregisterable)
}
message DiscoverToolsResponse {
  repeated RegisteredTool tools = 1;     // deterministic (name, version) order
  bool has_more = 2;
}

// PR-6b-1 (D159): the EXTERNAL MCP gateway. Register an external MCP server
// (a local stdio command or a remote HTTP endpoint); the runtime DIALS it
// (initialize -> tools/list), discovers its tools into the SAME durable registry
// (each id namespaced `<server_name>/<remote>`), and governs the connection in an
// off-journal connections.db sidecar. SN-8: connection_id + tool ids are
// server-derived; the credential is referenced by NAME only (never the secret).
message RegisterMcpServerRequest {
  string server_name    = 1;             // unique handle; namespaces discovered tool ids; must not contain '/'
  string transport      = 2;             // "stdio" | "http"
  string endpoint       = 3;             // stdio: program path; http: URL (host SSRF-vetted at admission + dial)
  repeated string args  = 4;             // stdio command-line args (ignored for http)
  bool   tls_required   = 5;             // http: refuse plaintext http:// when true
  string credential_ref = 6;             // OPTIONAL secret-less ref NAME (env var / vault key); never the secret
  string session_mode   = 7;             // PR-6b-3: "stateful" | "stateless"; empty ⇒ "stateless" (stateless-first default)
}
message RegisterMcpServerResponse {
  bytes  connection_id = 1;              // 16B server-derived (SN-8)
  uint32 discovered    = 2;              // tools discovered + registered (0 when unreachable)
  string health        = 3;              // "connected" | "unreachable" | "unknown"
}

message ListMcpServersRequest {
  uint32 limit      = 1;                 // reserved for paging (server returns all today)
  string after_name = 2;                 // reserved cursor
}
// One registered external MCP server (governance view). The credential value is
// NEVER on this wire — only whether a ref NAME is attached (D81).
message McpServer {
  bytes  connection_id          = 1;     // 16B server-derived
  string server_name            = 2;
  string transport              = 3;     // "stdio" | "http"
  string endpoint               = 4;     // command (stdio) | URL (http)
  string health                 = 5;     // "connected" | "unreachable" | "unknown"
  uint32 tool_count             = 6;     // tools discovered on the last successful dial
  bool   credential_ref_present = 7;     // a credential ref NAME is attached (never the value)
  string session_mode          = 8;      // PR-6b-3: "stateful" | "stateless" (firing posture; empty ⇒ "stateless")
}
message ListMcpServersResponse {
  repeated McpServer servers = 1;        // deterministic (name) order
  bool has_more = 2;
}

message DiscoverServerToolsRequest {
  string server_name = 1;                // re-dial + re-discover this server
}
message DiscoverServerToolsResponse {
  repeated RegisteredTool tools = 1;     // the server's registered tools (reuses the inventory row)
  uint32 discovered = 2;
}

message TestMcpServerRequest {
  string server_name = 1;
}
message TestMcpServerResponse {
  bool   reachable = 1;                  // dial + initialize succeeded
  string detail    = 2;                  // short diagnostic on failure (no secret / why-leak)
}

message DeregisterMcpServerRequest {
  string server_name = 1;
}
message DeregisterMcpServerResponse {
  bool removed = 1;                       // false iff absent
}

// T-CONNECTOR-AUTOGRANT: an OPERATOR DIAGNOSTIC fire of ONE registered tool on a
// dialed connector — the deterministic, model-free "exercise this tool" affordance
// behind the UI Connections live-fire panel / `kx connections fire`. It routes
// through the SAME broker the agentic loop uses, so SN-8 is re-enforced (the tool
// must be registered + a single-grant warrant is synthesized server-side). NOT a
// durable agentic effect: no journal fact, no replay — like `TestMcpServer`/
// `DiscoverServerTools`, it is a live operator action, not a recorded run.
message CallMcpToolRequest {
  string server_name = 1;                 // the registered connector handle
  string remote_name = 2;                 // the tool's remote method (resolved to <server>/<remote>)
  string args_json   = 3;                 // JSON args object (validated against the tool's inputSchema)
}
message CallMcpToolResponse {
  bool   ok          = 1;                 // true iff the tool fired and returned
  string result_json = 2;                 // the tool's response payload (empty on error)
  string error       = 3;                 // a short non-sensitive diagnostic (empty on success)
}

// ---------------------------------------------------------------------------
// PR-7 (D120.6) — Context bundles. A named, content-addressed COLLECTION the
// caller assembles for a model to reason over (the "context" the model is GIVEN,
// distinct from the tools it reasons OVER). Each item references a blob already
// in the content store (PutContent); the bundle MANIFEST lives in an off-journal
// bundles.db sidecar (rebuildable-to-empty; the bundle_ref is SERVER-DERIVED,
// never a MoteId / journal / digest input). A run attaches bundles by handle via
// the `context_bundles` field on Invoke / SubmitWorkflow: the bind layer resolves
// the handle -> item refs and injects the sorted ref-set into the ENTRY Mote's
// identity-bearing config_subset (different context => different MoteId =>
// exactly-once-per-(input+context)). No new journal write path; the canonical
// digest is invariant (a run with no bundle is byte-identical). SN-8: the client
// names a handle; the server derives the ref + scopes List/Get/Delete to the
// caller's principal (no cross-party existence oracle).
// ---------------------------------------------------------------------------

message ContextItem {
  string name        = 1;                // advisory label (display / context heading; never identity)
  bytes  content_ref = 2;                // 32B — a blob already in the content store (PutContent)
  string media_type  = 3;                // ADVISORY mime (display / classify only)
}

message PutContextBundleRequest {
  string handle              = 1;        // "namespace/collection/name" AssetPath handle (upsert key)
  string description         = 2;        // free-form; NEVER parsed for enforcement (size-capped)
  repeated ContextItem items = 3;        // the bundle's items (each refs a PutContent blob; count-capped server-side)
}
message PutContextBundleResponse {
  bytes  bundle_ref   = 1;               // 16B SERVER-DERIVED manifest hash (SN-8)
  string handle       = 2;               // echoed canonical handle
  bool   deduplicated = 3;               // true iff an identical manifest was already bound to this handle
}

message ListContextBundlesRequest {
  uint32 limit        = 1;               // page size; server clamps 1..=256 (absent = 100)
  string after_handle = 2;               // exclusive cursor: the handle of the last row of the prior page
}
// One bundle's manifest (governance / display view). content_refs are DISPLAY;
// authority never rides this wire (SN-8).
message ContextBundle {
  bytes  bundle_ref          = 1;        // 16B server-derived
  string handle              = 2;
  string description         = 3;
  repeated ContextItem items = 4;        // the bound items
  uint32 item_count          = 5;
}
message ListContextBundlesResponse {
  repeated ContextBundle bundles = 1;    // deterministic (handle) order, caller-scoped
  bool has_more = 2;
}

message GetContextBundleRequest {
  string handle = 1;                     // exact handle
}
message GetContextBundleResponse {
  ContextBundle bundle = 1;              // the bound manifest; empty iff not found / not owned (uniform)
  bool found = 2;                        // false uniformly for absent OR not-owned (no existence oracle)
}

message DeleteContextBundleRequest {
  string handle = 1;                     // unbinds the handle; the CAS blobs stay
}
message DeleteContextBundleResponse {
  bool removed = 1;                       // false iff absent / not owned
}

// ---------------------------------------------------------------------------
// D155 Phase-A — branched data (read / snapshot). A BRANCH is a named,
// content-addressed manifest of {host-path -> ContentRef} entries: the operator
// snapshots approved host files (confined under KX_SERVE_FS_ROOT) INTO the
// content store, and the agent loop edits them IN-CAS (the host is NEVER written
// in Phase-A — governed write-back is Phase-B, after PR-8). Off-journal
// branches.db sidecar (rebuildable-to-empty; branch_ref is SERVER-DERIVED, never
// a MoteId / journal / digest input => the canonical projection digest is
// invariant). A sub-branch (parent_handle) is a point-in-time CoW fork: it
// inherits the parent's resolved refs at create time and re-points only the
// paths a later snapshot overrides (unchanged paths share the parent's CAS blob
// — zero-copy). SN-8: the client names a handle; the server derives the ref and
// scopes List/Get/Delete to the caller's principal (no cross-party oracle).
// ---------------------------------------------------------------------------

message BranchItem {
  string path        = 1;                // the snapshot-relative path (display + manifest key)
  bytes  content_ref = 2;                // 32B — the file's blob in the content store (fs-read@1 -> CAS)
}

message Branch {
  bytes  branch_ref          = 1;        // 16B SERVER-DERIVED manifest hash (SN-8; display + dedup)
  string handle              = 2;        // "namespace/collection/name" AssetPath handle
  string parent_handle       = 3;        // the CoW parent (lineage); empty = a root branch
  string description         = 4;        // free-form; NEVER parsed for enforcement
  repeated BranchItem items  = 5;        // the resolved {path -> ref} set, path-sorted
  uint32 item_count          = 6;
}

message CreateBranchRequest {
  string handle        = 1;              // "namespace/collection/name" AssetPath handle (upsert key)
  string description   = 2;              // free-form; size-capped
  string parent_handle = 3;              // optional: fork this branch (CoW); empty = a fresh root branch
}
message CreateBranchResponse {
  bytes  branch_ref   = 1;               // 16B SERVER-DERIVED
  string handle       = 2;               // echoed canonical handle
  bool   deduplicated = 3;               // true iff an identical manifest already existed
}

message SnapshotIntoRequest {
  string handle         = 1;             // the branch to ingest into (created if absent)
  repeated string paths = 2;             // host paths (confined under KX_SERVE_FS_ROOT) to read into CAS
  string description    = 3;             // free-form; size-capped (applied iff the branch is created)
  string parent_handle  = 4;             // optional CoW parent (applied iff the branch is created)
}
message SnapshotIntoResponse {
  bytes  branch_ref         = 1;
  string handle             = 2;
  repeated BranchItem items = 3;         // the resolved manifest after the snapshot
  uint32 ingested           = 4;         // how many paths were read into CAS this call
  bool   deduplicated       = 5;
}

message ListBranchesRequest {
  uint32 limit        = 1;               // page size; server clamps 1..=256 (absent = 100)
  string after_handle = 2;               // exclusive cursor: the handle of the last row of the prior page
}
message ListBranchesResponse {
  repeated Branch branches = 1;          // deterministic (handle) order, caller-scoped
  bool has_more = 2;
}

message GetBranchRequest {
  string handle = 1;                     // exact handle
}
message GetBranchResponse {
  Branch branch = 1;                     // the resolved manifest; empty iff not found / not owned (uniform)
  bool found = 2;                        // false uniformly for absent OR not-owned (no existence oracle)
}

message DeleteBranchRequest {
  string handle = 1;                     // unbinds the branch; the CAS blobs stay
}
message DeleteBranchResponse {
  bool removed = 1;                       // false iff absent / not owned
}

message AdvanceBranchRequest {
  string handle      = 1;                // the branch to advance (caller-scoped)
  string path        = 2;                // the manifest path to re-point (or insert — "enrich")
  bytes  content_ref = 3;                // 32B — the EXISTING content-store ref to point at (the edited body)
}
message AdvanceBranchResponse {
  bytes  branch_ref         = 1;         // 16B SERVER-DERIVED, recomputed over the advanced manifest
  string handle             = 2;
  repeated BranchItem items = 3;         // the resolved manifest after the advance
  bool   deduplicated       = 4;         // true iff the re-point was a no-op (idempotent)
}

// POC-5a — caller-scoped read of a branch FILE BODY (the F3 finding). GetContent
// is run/uploads-scoped; this resolves the body via the caller's OWN branch
// manifest (NotFound is uniform for absent branch / absent path / not-owned —
// no existence oracle). Powers the Apps FileTree+Monaco open view and the
// scaffold resume read of `.kx/scaffold-plan.json`.
message GetBranchContentRequest {
  string handle = 1;                     // the branch (caller-scoped)
  string path   = 2;                     // the manifest path whose body to resolve
}
message GetBranchContentResponse {
  bytes payload = 1;                     // the file body bytes (empty when not found)
  bool  found   = 2;                     // false uniformly for absent branch / absent path / not-owned
}

// ---------------------------------------------------------------------------
// Service — the external client-facing gateway (distinct from Coordinator).
// ---------------------------------------------------------------------------

// POC-1 (Settings "Workspace"): GetServerInfo request (no fields — the caller is
// server-resolved; SN-8) + a NON-SECRET response projection of GatewayConfig +
// the resolved serve model + the build's feature flags. Additive, read-only.
message GetServerInfoRequest {}
message GetServerInfoResponse {
  string model_id          = 1;   // resolved serve model id ("" on a model-less serve)
  string model_path        = 2;   // resolved GGUF path ("" on a model-less serve)
  string listen_addr       = 3;   // gRPC listener bind addr:port
  string ws_addr           = 4;   // R5 WebSocket live-event bridge addr:port
  string console_addr      = 5;   // embedded console addr:port ("" if disabled)
  string metrics_addr      = 6;   // Prometheus /metrics addr:port ("" if off)
  string content_root      = 7;   // content store directory
  string journal_path      = 8;   // SQLite journal path
  string catalog_dir       = 9;   // durable catalog directory
  uint64 max_lease         = 10;  // worker lease batch size
  uint64 content_max_bytes = 11;  // fail-closed PutContent payload cap (bytes)
  repeated string cors_origins = 12; // browser CORS allowlist (display; empty = deny)
  bool   tls_enabled       = 13;  // serving in-binary TLS (POSTURE — never the key)
  string auth_mode         = 14;  // "deny-all" | "dev-local" | "token" (label only)
  bool   feature_hnsw      = 15;  // datasets/RAG data-plane available
  bool   feature_inference = 16;  // live model inference available
  bool   feature_console   = 17;  // embedded console available
  bool   feature_vision    = 18;  // the serve model is image-capable
  bool   audit_log_enabled = 19;  // a JSONL operator audit log is configured
  // T-MULTI-ELEMENT-TOOLCALLS (additive): the server's DEFAULT agentic budget (also the
  // hard ceilings). A turn may fire several tools at once, so the two caps are
  // independent. Read-only display; a run overrides them per-invocation. Additive
  // (D120.6): an old client ignores them; a new client reads 0 from an old server.
  uint32 react_max_turns      = 20;  // default/ceiling model-turn budget (8)
  uint32 react_max_tool_calls = 21;  // default/ceiling total tool-call budget (20)
  // PR-B (additive): the configured dataset embed model id (KX_SERVE_EMBED_MODEL else
  // the primary). "" on a model-less serve or an old server. Display/Settings only.
  string embed_model_id       = 22;
  // Model Control v2 (additive): the server's ACTIVE default model (the SetActiveModel
  // choice; "" ⇒ the primary). An off-journal advisory hint the client uses to pick the
  // per-model chat handle. Display/Settings only.
  string active_model_id      = 23;
  // Model Control v2 (additive): true iff operator-enabled model downloads
  // (KX_SERVE_ALLOW_MODEL_PULL). false ⇒ PullModel refuses (deny-by-default). The UI
  // renders an honest-disabled Pull panel when false. Display only.
  bool   allow_model_pull     = 24;
  // RC4a (T-RAG-EMBED-QUALITY): true iff the configured dataset embedder is a
  // generative DECODER LLM, not a dedicated embedding model — weak sentence
  // embeddings (paraphrase mis-rank). The CLI/UI/Settings surface an honest
  // "recommend a dedicated embed model" advisory from this single flag. Display only.
  bool   embed_model_is_decoder = 25;
  // Additive: the resolved embedded-worker POOL size (--workers / KX_WORKERS /
  // KX_SERVE_WORKER_POOL; 1 = the historical single worker). >1 runs Pure/IO/tool Motes
  // concurrently (model Motes still serialize on the one ModelCache owner thread; Ollama
  // swarms get real concurrent inference). Display/Settings + Monitoring only; an old
  // server sends 0 ⇒ the client renders "1 (default)". Never identity/digest.
  uint64 worker_pool = 26;
}

// ===========================================================================
// MM-3 (D110) — the LOCAL OS-keychain secret store. Secrets are stored by NAME
// (a kx-warrant SecretRef) and resolved transiently at transport setup; the VALUE
// is NEVER journaled, in a MoteId/StepRecord, the model's context, or any RPC
// RESPONSE. `value` appears ONLY as a PutSecret request argument (write-only).
// PutSecret/DeleteSecret are gated loopback-only + an authenticated party (host
// credential material); ListSecretNames returns NAMES + timestamps only. SN-8: the
// broker secret_scope precheck remains the sole resolve-authorization gate.
// ===========================================================================
message PutSecretRequest {
  string name  = 1;  // the SecretRef NAME a connection's credential_ref points at
  string value = 2;  // write-only: the handler stores it in the keychain + drops it
}
message PutSecretResponse { bool stored = 1; }  // no value field, by construction

message ListSecretNamesRequest {
  uint32 limit      = 1;  // 0 ⇒ server default page
  string after_name = 2;  // keyset page cursor (exclusive)
}
message SecretName {
  string name            = 1;  // NAME only — never the value
  uint64 created_unix_ms = 2;
  uint64 updated_unix_ms = 3;
}
message ListSecretNamesResponse {
  repeated SecretName names = 1;
  bool has_more             = 2;
}

message DeleteSecretRequest  { string name = 1; }
message DeleteSecretResponse { bool removed = 1; }  // false iff absent

// ===========================================================================
// D113 (trigger seam) — event ingress. A trigger binds an inbound source
// (webhook | cron | grpc) to a recipe handle; on an event the gateway starts a
// FRESH registered run via the existing Invoke path (the coordinator stays the
// sole journal writer; the frozen trio is untouched). The trigger is the run's
// origin (an off-journal triggers.db record). Idempotency-key dedup makes a
// replayed event a no-op. SN-8: trigger_id is server-derived; the run binds under
// the REGISTRANT's party (D102.2); the auth secret is referenced by NAME only.
// The minimal-local trigger (single-user webhook/cron); the hosted multi-tenant
// trigger gateway at scale is CLOUD (D113/D170.b/GR19).
// ===========================================================================
enum TriggerKind {
  TRIGGER_KIND_UNSPECIFIED = 0;
  WEBHOOK = 1;  // an authenticated local HTTP POST (the --webhook-listen port)
  CRON    = 2;  // a local schedule (schedule_spec = interval seconds OR a 5-field crontab expr + timezone)
  GRPC    = 3;  // fired only via the SubmitTrigger RPC (no listener)
}
enum TriggerAuth {
  TRIGGER_AUTH_UNSPECIFIED = 0;
  NONE        = 1;  // permitted only on a loopback webhook bind
  HMAC_SHA256 = 2;  // X-Kx-Signature-256 over the raw body, key = auth_secret_ref
  BEARER      = 3;  // Authorization: Bearer <secret resolved from auth_secret_ref>
}

message RegisterTriggerRequest {
  string      name               = 1;  // unique operator handle (derives trigger_id)
  TriggerKind kind               = 2;
  string      recipe_handle      = 3;  // the kx/recipes/... handle the event Invokes
  TriggerAuth auth               = 4;  // webhook auth posture
  string      auth_secret_ref    = 5;  // SecretRef NAME of the HMAC/bearer secret (never the value)
  string      schedule_spec      = 6;  // cron: interval seconds ("300") OR a 5-field crontab expr ("0 9 * * *"); empty otherwise
  bool        enabled            = 7;
  // T-APP-TRIGGER-TARGET (additive; back-compat: absent ⇒ recipe target, UTC, no HITL).
  string      app_handle         = 8;  // a saved App handle to RunApp; EXACTLY ONE of recipe_handle | app_handle
  string      timezone           = 9;  // IANA zone for a 5-field cron expr (e.g. "America/New_York"); empty ⇒ UTC
  bool        require_approval   = 10; // per-trigger HITL (D114): withhold irreversible actions until an operator grant
}
message RegisterTriggerResponse { bytes trigger_id = 1; }  // 16B server-derived

message ListTriggersRequest {
  uint32 limit      = 1;
  string after_name = 2;
}
message TriggerView {                  // governance row — never a secret value
  bytes       trigger_id          = 1;
  string      name                = 2;
  TriggerKind kind                = 3;
  string      recipe_handle       = 4;
  TriggerAuth auth                = 5;
  bool        auth_secret_present = 6;  // a ref NAME is attached (never the value)
  string      schedule_spec       = 7;
  bool        enabled             = 8;
  uint64      last_fire_unix_ms   = 9;  // 0 ⇒ never fired
  // T-APP-TRIGGER-TARGET (additive governance fields).
  string      app_handle          = 10; // the App target handle ('' ⇒ a recipe target)
  string      timezone            = 11; // IANA zone for a 5-field cron expr ('' ⇒ UTC)
  bool        require_approval    = 12; // per-trigger HITL posture (D114)
}
message ListTriggersResponse {
  repeated TriggerView triggers = 1;
  bool has_more                 = 2;
}

message DeregisterTriggerRequest  { string name = 1; }
message DeregisterTriggerResponse { bool removed = 1; }

// The inbound EVENT verb (also the host webhook/cron adapter's internal call).
message SubmitTriggerRequest {
  string name            = 1;  // the registered trigger
  string idempotency_key = 2;  // event-level dedup; empty ⇒ server-derived from the payload
  string payload_json    = 3;  // the event body, passed as the recipe args (passthrough)
}
message SubmitTriggerResponse {
  bytes instance_id = 1;  // the registered run (the PRIOR run when deduped)
  bool  deduped     = 2;  // true ⇒ a prior identical event already started this run
}

// Dry-run: validate the binding (handle resolves, payload binds) WITHOUT firing.
message TestTriggerRequest  { string name = 1; string payload_json = 2; }
message TestTriggerResponse { bool ok = 1; string detail = 2; }

// ===========================================================================
// D114 — HITL pre-action approval gate. The OPERATOR control plane over pending
// world-mutating action approvals. request_id is SERVER-DERIVED 16B (SN-8); Grant/
// Deny RELEASE/REJECT a STAGED action (it fires exactly once, or the chain dead-
// letters) — never mint a client warrant. Off-DAG fold view; UNIMPLEMENTED on a
// serve without the approval substrate.
// ===========================================================================
message ListPendingApprovalsRequest { uint32 limit = 1; }  // 0 ⇒ all
message PendingApproval {
  bytes  request_id       = 1;  // 16B server-derived (the grant/deny key)
  bytes  instance_id      = 2;  // 16B the run awaiting approval
  bytes  mote_id          = 3;  // 32B the proposing observation Mote
  string tool_id          = 4;  // proposed tool name (display)
  string tool_version     = 5;
  string intent           = 6;  // display-only proposed-action summary
  uint64 deadline_unix_ms = 7;  // 0 ⇒ operator-driven (no auto-expiry)
  uint64 created_unix_ms  = 8;  // audit wall-clock
}
message ListPendingApprovalsResponse { repeated PendingApproval approvals = 1; }
message GrantApprovalRequest  { bytes request_id = 1; string reason = 2; }
message GrantApprovalResponse { bool granted = 1; }  // false ⇒ unknown/already-resolved
message DenyApprovalRequest   { bytes request_id = 1; string reason = 2; }
message DenyApprovalResponse  { bool denied  = 1; }

// ===========================================================================
// M11 — DISPLAY-ONLY deterministic LOCAL spend estimate over the durable turn/tool
// counters at operator-set micro_usd rates. A BUDGET GUARDRAIL readout, NOT Cloud
// per-expert billing — the D129/D156/GR19 boundary holds (no token / price-per-
// expert data crosses this wire). UNIMPLEMENTED on a serve without the counters.
// ===========================================================================
message GetRunCostRequest  { bytes instance_id = 1; }  // 16B ownership ticket
message GetRunCostResponse {
  bytes  instance_id             = 1;
  uint64 turns                   = 2;  // committed model turns counted
  uint64 tool_calls              = 3;  // committed tool calls counted
  uint64 estimated_micro_usd     = 4;  // turns*per_turn + tool_calls*per_tool_call
  uint64 ceiling_micro_usd       = 5;  // 0 ⇒ no ceiling
  uint64 per_turn_micro_usd      = 6;  // operator-configured rate (provenance)
  uint64 per_tool_call_micro_usd = 7;
  bool   over_ceiling            = 8;  // estimated >= ceiling (display flag)
}

// ===========================================================================
// RC1 (D172) — kx-eval per-run QUALITY readout. An EXPECTATION-FREE fold over the
// run's off-DAG ReactRound trajectory: did it reach an answer, how many turns /
// tool-calls it spent, how much of its budget it burned, how many proposals were
// rejected. The measure-first runtime's per-run lens (Monitoring "Quality"); the
// golden-suite GATE (task success / tool-call correctness / groundedness vs a known
// expectation) lives OFFLINE in `kx eval run` / `just eval`, never on this wire.
// Read-only, off-digest, operator-global — the same posture as ListReactTurns. The
// ReactRound facts are the source, so this is always available (no seam).
// ===========================================================================
message ScoreRunRequest { bytes instance_id = 1; }  // 16B run id
message RunScore {
  bytes  instance_id                = 1;
  string terminal                   = 2;   // answer | tool | rejected | dead_lettered | pending
  bool   reached_answer             = 3;
  uint32 turns_used                 = 4;
  uint32 tool_calls_used            = 5;
  uint32 max_turns                  = 6;
  uint32 max_tool_calls             = 7;
  uint32 rejections                 = 8;
  uint32 turn_budget_used_per_mille = 9;
  uint32 tool_budget_used_per_mille = 10;
}

service KxGateway {
  rpc SubmitRun(SubmitRunRequest) returns (RunHandle);
  rpc Invoke(InvokeRequest) returns (InvokeResponse);
  rpc GetProjection(GetProjectionRequest) returns (ProjectionView);
  rpc GetContent(GetContentRequest) returns (ContentBlob);
  rpc StreamEvents(StreamEventsRequest) returns (stream EventFrame);
  rpc ListSignatures(ListSignaturesRequest) returns (ListSignaturesResponse);
  rpc GetSignature(GetSignatureRequest) returns (GetSignatureResponse);
  rpc RegisterSignature(RegisterSignatureRequest) returns (RegisterSignatureResponse);
  // UI-2 additive (D120.6): run enumeration + recipe discovery.
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc ListRecipes(ListRecipesRequest) returns (ListRecipesResponse);
  rpc GetRecipeForm(GetRecipeFormRequest) returns (GetRecipeFormResponse);
  // PR-D additive (D120.6): the captured Invoke args for a run ("Re-run with
  // changes"). UNIMPLEMENTED with no sidecar; NOT_FOUND with nothing captured.
  rpc GetRunInputs(GetRunInputsRequest) returns (GetRunInputsResponse);
  // PR-4 Batch D additive (D120.6): ADVISORY recipe discovery (DiscoveryIndex +
  // AdvisoryMetadataStore). Display-only ranking; never authorizes. UNIMPLEMENTED
  // on an old gateway / when the seam yields None.
  rpc SearchRecipes(SearchRecipesRequest) returns (SearchRecipesResponse);
  // UI-3 additive (D120.6): teams (membership) + sharing (grants) read viewers.
  rpc ListTeams(ListTeamsRequest) returns (ListTeamsResponse);
  rpc ListTeamMembers(ListTeamMembersRequest) returns (ListTeamMembersResponse);
  rpc ListAssetGrants(ListAssetGrantsRequest) returns (ListAssetGrantsResponse);
  // T3.7 additive (D120.6): the Datasets data-plane (RAG).
  rpc ListDatasets(ListDatasetsRequest) returns (ListDatasetsResponse);
  rpc IngestDocuments(IngestDocumentsRequest) returns (IngestDocumentsResponse);
  rpc QueryDataset(QueryDatasetRequest) returns (QueryDatasetResponse);
  // Slice-B additive (D120.6/D151): advisory fuzzy-in/exact-out discovery.
  rpc FuzzyDiscovery(FuzzyDiscoveryRequest) returns (FuzzyDiscoveryResponse);
  // PR-2c-2 additive (D120.6): re-plan-round observability (read-only).
  rpc ListReplanRounds(ListReplanRoundsRequest) returns (ListReplanRoundsResponse);
  // PR-2d-1 additive (D120.6): ReAct-turn observability (read-only).
  rpc ListReactTurns(ListReactTurnsRequest) returns (ListReactTurnsResponse);

  // RC4c-2: enumerate the durable `ReRankRound` facts (live LLM listwise rerank).
  rpc ListReRankTurns(ListReRankTurnsRequest) returns (ListReRankTurnsResponse);
  // RC5a additive (D120.6): durable multi-tier MEMORY (semantic recall + episodic
  // store). Off the truth path; NO journal schema bump. UNIMPLEMENTED when the seam
  // yields None (an old gateway, or memory disabled / no `hnsw`).
  rpc StoreMemory(StoreMemoryRequest) returns (StoreMemoryResponse);
  rpc ListMemories(ListMemoriesRequest) returns (ListMemoriesResponse);
  rpc RecallMemory(RecallMemoryRequest) returns (RecallMemoryResponse);
  rpc ForgetMemory(ForgetMemoryRequest) returns (ForgetMemoryResponse);
  // RC5b additive (D120.6): reversible TTL+salience decay (dry-run preview default),
  // namespace stats, and restore. Off the truth path; NO journal schema bump.
  rpc DecayMemory(DecayMemoryRequest) returns (DecayMemoryResponse);
  rpc MemoryStats(MemoryStatsRequest) returns (MemoryStatsResponse);
  rpc RestoreMemory(RestoreMemoryRequest) returns (RestoreMemoryResponse);
  // Campaign Batch 2 additive (D120.6): the Morphic Data Engine capture read
  // surface (durable action exhaust; read-only, off-truth-path).
  rpc ListCaptureRecords(ListCaptureRecordsRequest) returns (ListCaptureRecordsResponse);
  // W1.A5 toolscout additive (D120.6): advisory tool discovery + TaskBundle
  // preview (read-only, display-only — scores/verdicts never authorize).
  rpc ListToolManifests(ListToolManifestsRequest) returns (ListToolManifestsResponse);
  rpc ScoreTaskBundle(ScoreTaskBundleRequest) returns (ScoreTaskBundleResponse);
  // Blueprint-builder additive (D120.6): author a Tier-1 DAG (vetted palette) and
  // run it — server-compiled identity + server-built warrants + R-1..R-15 admission.
  rpc SubmitWorkflow(SubmitWorkflowRequest) returns (RunHandle);
  // NL authoring additive (D209.3 / SN-8): propose a multi-step DAG from a
  // natural-language goal (served model → vetted kx-planner compile). Validates
  // only — never registers or runs; the client confirms via SubmitWorkflow/SaveApp.
  rpc ProposeWorkflow(ProposeWorkflowRequest) returns (ProposeWorkflowResponse);
  // Batch A additive (D120.6): client uploads (content-store write, never a
  // journal write) + batch content reads + model discovery (display only).
  rpc PutContent(PutContentRequest) returns (PutContentResponse);
  rpc GetContentBatch(GetContentBatchRequest) returns (GetContentBatchResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  // Batch B additive (D120.6): per-mote definition inspection (display only —
  // the committed def_hash resolved to capped summary fields, never authority).
  rpc GetMoteDetail(GetMoteDetailRequest) returns (MoteDetail);
  // Batch C additive (D120.6): the global cross-run event tail.
  // *** CLOUD MUST PARTY-SCOPE OR DENY (see the StreamAllEventsRequest block):
  // *** operator-global on single-node OSS; never serve unscoped multi-tenant.
  rpc StreamAllEvents(StreamAllEventsRequest) returns (stream GlobalEventFrame);
  // Batch C additive (D120.6): mote execution telemetry (rebuildable-to-empty
  // sidecar; audit/display only — never truth/identity/digest; never a journal
  // change).
  rpc ListMoteTelemetry(ListMoteTelemetryRequest) returns (ListMoteTelemetryResponse);
  // W1a-3 additive (D120.6): the exact, cross-page per-model token-economy
  // rollup (server-side SUM ... GROUP BY model_id over the same telemetry.db
  // sidecar). One truth for CLI/SDK/UI; no cost/$ field (billing is CLOUD).
  // UNIMPLEMENTED when the seam yields None (forward-compat degrade).
  rpc ListTelemetrySummary(ListTelemetrySummaryRequest) returns (ListTelemetrySummaryResponse);
  // PR-4.1 additive (D120.6): user 👍/👎 feedback on an answer — a client-origin
  // write into a rebuildable-to-empty feedback.db sidecar (advisory; off-journal,
  // off-digest, off-identity; SN-8 server-resolved principal). `ListFeedback` is
  // the read-back / inspection surface. UNIMPLEMENTED when the seam yields None.
  rpc SubmitFeedback(SubmitFeedbackRequest) returns (SubmitFeedbackResponse);
  rpc ListFeedback(ListFeedbackRequest) returns (ListFeedbackResponse);
  // PR-4.2 / T-STREAM1 additive (D120.6): live token streaming — ADVISORY +
  // out-of-band tokens as a model mote generates. Party-scoped by instance_id
  // ownership (the per-run StreamEvents gate). The committed result_ref stays
  // the authority. An EMPTY immediately-ending stream when the broker is not
  // wired (FFI-free build) — honest, never an error.
  rpc StreamModelTokens(StreamModelTokensRequest) returns (stream TokenChunk);
  // W1a-2 additive (D120.6): the read-only ALERTS inbox VIEW — a page over the
  // host's rebuildable-to-empty alerts.db (folded from terminal `Failed` facts).
  // Display/triage-read only; UNIMPLEMENTED when the seam yields None. The triage
  // LIFECYCLE (ack/resolve), the rule engine, and notifications are CLOUD (D156/D129).
  rpc ListAlerts(ListAlertsRequest) returns (ListAlertsResponse);
  // PR-6a additive (D120.6): the declarative tools registry. RegisterTool /
  // DeregisterTool write the durable off-journal tools.db (server-derived tool_id,
  // SSRF-vetted server_host); DiscoverTools is the inventory/governance VIEW
  // (distinct from the advisory ListToolManifests). SN-8: registration grants NO
  // authority; client tool_grants stay refused. DIALING external MCP servers +
  // Connections + parallel fan-out are PR-6b/Cloud (D159/GR19).
  rpc RegisterTool(RegisterToolRequest) returns (RegisterToolResponse);
  rpc DeregisterTool(DeregisterToolRequest) returns (DeregisterToolResponse);
  rpc DiscoverTools(DiscoverToolsRequest) returns (DiscoverToolsResponse);
  // PR-6b-1 additive (D159): the EXTERNAL MCP gateway. RegisterMcpServer dials a
  // remote MCP server (stdio + Streamable-HTTP) and registers its discovered
  // tools into the SAME tools.db (each namespaced `<server>/<remote>`, fireable
  // via the broker); List/Discover/Test/Deregister govern the connections. The
  // live untrusted-egress surface (GR8): admission + dial-time SSRF vetting,
  // per-server rate-limit, warrant-gated egress, secret-less CredentialRef.
  // SN-8: server-derived connection/tool ids; client tool_grants stay refused.
  // OAuth/device-flow + a hosted credential marketplace are CLOUD (D159/GR19).
  rpc RegisterMcpServer(RegisterMcpServerRequest) returns (RegisterMcpServerResponse);
  rpc ListMcpServers(ListMcpServersRequest) returns (ListMcpServersResponse);
  rpc DiscoverServerTools(DiscoverServerToolsRequest) returns (DiscoverServerToolsResponse);
  rpc TestMcpServer(TestMcpServerRequest) returns (TestMcpServerResponse);
  rpc DeregisterMcpServer(DeregisterMcpServerRequest) returns (DeregisterMcpServerResponse);
  // T-CONNECTOR-AUTOGRANT additive: an operator DIAGNOSTIC fire of one registered
  // tool through the broker (SN-8 re-enforced; no journal fact — see CallMcpToolRequest).
  rpc CallMcpTool(CallMcpToolRequest) returns (CallMcpToolResponse);

  // MM-3 (D110) additive — the LOCAL OS-keychain secret store. PutSecret/DeleteSecret
  // write host credential material (loopback-only + authed party); ListSecretNames
  // returns NAMES + timestamps only (never a value). Off-journal (the OS keychain +
  // an off-digest secret_index.db NAME index); the value is resolved transiently at
  // transport setup and never journaled (D81). UNIMPLEMENTED when no secret admin is
  // wired (e.g. a no-mcp-gateway build). The hardened KMS/HSM vault is CLOUD (D94).
  rpc PutSecret(PutSecretRequest) returns (PutSecretResponse);
  rpc ListSecretNames(ListSecretNamesRequest) returns (ListSecretNamesResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);

  // D113 (trigger seam) additive — event ingress. Register/List/Deregister govern
  // triggers; SubmitTrigger is the inbound EVENT verb (also called internally by the
  // host webhook/cron listeners); TestTrigger dry-runs the binding without firing.
  // Each event starts a fresh registered run via the existing Invoke path (no journal
  // writer dep added; frozen trio untouched). UNIMPLEMENTED when no trigger admin is
  // wired. The hosted multi-tenant trigger gateway is CLOUD (D113/D170.b/GR19).
  rpc RegisterTrigger(RegisterTriggerRequest) returns (RegisterTriggerResponse);
  rpc ListTriggers(ListTriggersRequest) returns (ListTriggersResponse);
  rpc DeregisterTrigger(DeregisterTriggerRequest) returns (DeregisterTriggerResponse);
  rpc SubmitTrigger(SubmitTriggerRequest) returns (SubmitTriggerResponse);
  rpc TestTrigger(TestTriggerRequest) returns (TestTriggerResponse);

  // D114 — HITL pre-action approval gate (operator control plane).
  rpc ListPendingApprovals(ListPendingApprovalsRequest) returns (ListPendingApprovalsResponse);
  rpc GrantApproval(GrantApprovalRequest) returns (GrantApprovalResponse);
  rpc DenyApproval(DenyApprovalRequest) returns (DenyApprovalResponse);
  // M11 — cost-spend guardrail readout (display-only local estimate).
  rpc GetRunCost(GetRunCostRequest) returns (GetRunCostResponse);
  // RC1 (D172) — kx-eval per-run quality readout (expectation-free trajectory fold).
  rpc ScoreRun(ScoreRunRequest) returns (RunScore);

  // PR-7 — context bundles (off-journal bundles.db sidecar; SN-8 server-derived ref).
  rpc PutContextBundle(PutContextBundleRequest) returns (PutContextBundleResponse);
  rpc ListContextBundles(ListContextBundlesRequest) returns (ListContextBundlesResponse);
  rpc GetContextBundle(GetContextBundleRequest) returns (GetContextBundleResponse);
  rpc DeleteContextBundle(DeleteContextBundleRequest) returns (DeleteContextBundleResponse);

  // D155 Phase-A — branched data (off-journal branches.db sidecar; SN-8
  // server-derived ref). SnapshotInto reads operator-approved host files
  // (confined under KX_SERVE_FS_ROOT, default-OFF) INTO the content store and
  // records the {path -> ref} manifest; the agent loop edits IN-CAS (no host
  // write in Phase-A — write-back is Phase-B, after PR-8). UNIMPLEMENTED with no
  // sidecar; FAILED_PRECONDITION on SnapshotInto when KX_SERVE_FS_ROOT is unset.
  rpc CreateBranch(CreateBranchRequest) returns (CreateBranchResponse);
  rpc SnapshotInto(SnapshotIntoRequest) returns (SnapshotIntoResponse);
  rpc ListBranches(ListBranchesRequest) returns (ListBranchesResponse);
  rpc GetBranch(GetBranchRequest) returns (GetBranchResponse);
  rpc DeleteBranch(DeleteBranchRequest) returns (DeleteBranchResponse);
  // D155 Phase-3 — agentic in-CAS edit: re-point a manifest path to an EXISTING
  // content-store ref (the edited body the ReAct loop just committed). Strictly
  // IN-CAS — never reads/writes the host (host write-back is Phase-B). NOT_FOUND
  // if the branch is unknown to the caller; INVALID_ARGUMENT if the ref does not
  // resolve in the content store (fail-closed — no dangling manifest).
  rpc AdvanceBranch(AdvanceBranchRequest) returns (AdvanceBranchResponse);
  // POC-5a — caller-scoped read of a branch file body (manifest path -> CAS body).
  // Uniform NotFound (found=false) for absent branch / absent path / not-owned.
  rpc GetBranchContent(GetBranchContentRequest) returns (GetBranchContentResponse);

  // POC-1 (Settings "Workspace") — a NON-SECRET projection of the resolved server
  // configuration: model/dirs/ports/flags + the auth/CORS/TLS POSTURE (labels +
  // booleans only). Governed by an authenticated caller (UNAUTHENTICATED otherwise).
  // NEVER carries a secret: no bearer-token value, no TLS private-key bytes (only
  // `tls_enabled` + an `auth_mode` label). Off-journal, off-digest, read-only.
  rpc GetServerInfo(GetServerInfoRequest) returns (GetServerInfoResponse);

  // POC-3 (Models "Local lifecycle") — warm/evict a REGISTERED local model in the
  // owner-thread LRU (real load / `llama_model_free`). model_id must be in the
  // server's fixed registered set (else NOT_FOUND, fail-closed). Authenticated
  // caller required (UNAUTHENTICATED otherwise). Off-journal, off-digest.
  rpc LoadModel(LoadModelRequest) returns (LoadModelResponse);
  rpc OffloadModel(OffloadModelRequest) returns (OffloadModelResponse);

  // Model Control v2 (Models "acquire + switch") — HOST-INFRASTRUCTURE, off-journal.
  // PullModel downloads a model (Ollama /api/pull or a huggingface.co /resolve/ GGUF
  // URL) and REGISTERS it at runtime so it is immediately usable WITHOUT restart;
  // it returns immediately (poll GetPullStatus). Deny-by-default: refused unless the
  // operator sets KX_SERVE_ALLOW_MODEL_PULL and the URL host is allowlisted (SN-8 —
  // a client requests, the operator authorizes). SetActiveModel switches the server's
  // active default (an advisory hint; the server never silently re-routes chat).
  // Authenticated caller required (UNAUTHENTICATED otherwise).
  rpc PullModel(PullModelRequest) returns (PullModelResponse);
  rpc GetPullStatus(GetPullStatusRequest) returns (GetPullStatusResponse);
  rpc SetActiveModel(SetActiveModelRequest) returns (SetActiveModelResponse);

  // POC-4 (Apps "App-authoring + envelope") — save / list / get a durable App
  // envelope in the caller-scoped, off-journal apps.db catalog. SaveApp validates
  // + canonicalizes the kortecx.app/v1 envelope and derives app_ref (SN-8); the
  // envelope carries NO authority. Authenticated caller required (UNAUTHENTICATED
  // otherwise); unimplemented when the apps.db sidecar is absent. NO cross-instance
  // import entrypoint (deferred). Off-journal, off-digest.
  rpc SaveApp(SaveAppRequest) returns (SaveAppResponse);
  rpc ListApps(ListAppsRequest) returns (ListAppsResponse);
  rpc GetApp(GetAppRequest) returns (GetAppResponse);

  // Delete a caller-owned App and cascade the things it uniquely owns (triggers, a running
  // hosted supervisor, its lock row, its project-branch binding). Off-journal / off-digest,
  // so it cannot move the canonical digest and never rewrites history. It is NOT a full
  // erase: CAS blobs, the hosted workdir, and the App's ingested RAG dataset all survive —
  // see DeleteAppRequest for why, and say so in any UI that offers this.
  rpc DeleteApp(DeleteAppRequest) returns (DeleteAppResponse);

  // Permission-aware Apps — a READ-ONLY capability manifest ("what this App needs vs.
  // what you have"): the requested tools/connections/model diffed against the caller's
  // live policy (fireable tools, served models, registered connections). Advisory
  // (gates nothing); server-authoritative (the host reuses the RunApp policy folds);
  // off-journal / off-digest. Authenticated caller required; unimplemented when the
  // seam is absent (clients then fall back to an envelope-only "needs" view).
  rpc GetAppManifest(GetAppManifestRequest) returns (GetAppManifestResponse);

  // G2 (App-pointer -> run resolution) — run a caller-owned App server-side so its
  // references.connections + guards.secret_scope are honored (they are dropped by the
  // client-orchestrated GetApp -> SubmitWorkflow path). The server reads the validated
  // envelope, lowers its blueprint through the canonical path, resolves connections
  // against the caller's own registry, and narrows the run warrant's secret scope to
  // the App's declared secrets. Server-minted warrants (SN-8). Authenticated caller
  // required; unimplemented when the app-run seam (apps.db + MCP gateway) is absent
  // (clients then fall back to the legacy GetApp -> SubmitWorkflow path).
  rpc RunApp(RunAppRequest) returns (RunHandle);

  // POC-5a (Apps "scaffold") — drive a server-side async scaffold of the App's
  // fixed skeleton into a fresh CoW-on-CAS branch (plan -> N writes -> N
  // AdvanceBranch). Returns immediately (the orchestration runs in the
  // background; observe via GetScaffoldStatus + GetBranch + StreamEvents).
  // Warrants are server-minted (SN-8). Unimplemented when no served model /
  // branch store. Off-journal, off-digest.
  rpc ScaffoldApp(ScaffoldAppRequest) returns (ScaffoldAppResponse);
  rpc GetScaffoldStatus(GetScaffoldStatusRequest) returns (GetScaffoldStatusResponse);

  // D213 Experience lane — the hosted-app run/build/serve supervisor. Start materializes
  // the App's branch file tree to disk, `npm install`s, then either runs the dev server
  // (`serve_mode: "dev"`, the default — HMR, live editing) or `npm run build`s and runs the
  // framework's preview/start server (`serve_mode: "production"`). It binds a LOOPBACK PORT
  // and `url` is that absolute origin — there is no reverse proxy (see HostedAppState).
  // Stop kills + reaps the child; Get/List report state + the live URL + recent logs.
  // A plain host subprocess — never a Mote, never journaled, off-digest. Unimplemented when
  // built without the `hosted-apps` feature.
  rpc StartHostedApp(StartHostedAppRequest) returns (HostedAppStatus);
  rpc StopHostedApp(StopHostedAppRequest) returns (StopHostedAppResponse);
  rpc GetHostedAppStatus(GetHostedAppStatusRequest) returns (HostedAppStatus);
  rpc ListHostedApps(ListHostedAppsRequest) returns (ListHostedAppsResponse);

  // POC-5b (Policies "per-App lock") — lock / unlock the App's project branch.
  // A locked branch refuses agentic in-CAS edits at the AdvanceBranch chokepoint
  // (FAILED_PRECONDITION + kx-refusal-code: LOCKED_BRANCH). Caller-scoped;
  // unimplemented when the locks sidecar is absent (degrade-open). Off-journal.
  rpc LockApp(LockAppRequest) returns (LockAppResponse);
  rpc UnlockApp(UnlockAppRequest) returns (UnlockAppResponse);

  // Additive (D120.6/D175) — the per-principal skill catalog (skills.db).
  // AddSkill validates the manifest fail-closed (kortecx.skill/v1 closed shape +
  // authority deny-keys) and stores the instructions body via the content-write
  // seam; skill_ref is server-derived over the canonical bytes (SN-8). A skill
  // is a WISH bundle — attaching one grants nothing; the bind intersects its
  // tool wishes against the caller's grants and the live broker. Authenticated
  // caller required; UNIMPLEMENTED when the catalog seam is absent.
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
  rpc GetSkillForm(GetSkillFormRequest) returns (GetSkillFormResponse);
  rpc AddSkill(AddSkillRequest) returns (AddSkillResponse);
  rpc RemoveSkill(RemoveSkillRequest) returns (RemoveSkillResponse);
}
