[package]
name         = "kx-tool-registry"
version      = "0.1.1"
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
authors      = { workspace = true }
repository   = { workspace = true }
description  = "kortecx tool layer (D32) — per-workflow file with typed front-matter + shared registry. Tool grants are REFERENCES into the registry. MCP tools are EGRESS (monotonic). Self-generated tools INERT until human review with capability ⊆ generating lineage."

[lib]
path = "src/lib.rs"

[dependencies]
kx-mote    = { workspace = true }
kx-content = { workspace = true }
kx-warrant = { workspace = true }
bincode    = { workspace = true }
blake3     = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true, features = ["raw_value"] }
thiserror  = { workspace = true }
tracing    = { workspace = true }
# Durable `tools.db` backend (PR-6a) — the same off-journal SQLite store the
# fleet/catalog ledgers use, behind the unchanged `ToolRegistry` trait. rusqlite
# is already in the closure (kx-journal/kx-catalog/kx-fleet pull it), so this is
# a Cargo.lock EDGE only — no new package; FFI-free (pure-C via cc, no C++).
rusqlite   = { workspace = true }

[dev-dependencies]
proptest           = { workspace = true }
tracing-subscriber = { workspace = true }
tempfile           = { workspace = true }

[lints]
workspace = true
